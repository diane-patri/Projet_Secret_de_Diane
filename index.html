<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Les Arcanes du Métro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amarante&family=Archivo:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* ===================================================================
   METROPOLITAIN — identité Guimard / Art Nouveau
   =================================================================== */

/* Parisine auto-hébergée : déposez vos fichiers dans un dossier /fonts
   à côté de ce fichier, sous ces noms exacts. En leur absence, le
   navigateur bascule automatiquement sur Archivo (aucune erreur). */
@font-face {
    font-family: 'Parisine';
    src: url('fonts/Parisine-Regular.woff2') format('woff2');
    font-weight: 400;
    font-style: normal;
    font-display: swap;
}

@font-face {
    font-family: 'Parisine';
    src: url('fonts/Parisine-Bold.woff2') format('woff2');
    font-weight: 700;
    font-style: normal;
    font-display: swap;
}

:root {
    --vert-guimard: #133a2d;
    --vert-fonce: #071e18;
    --bronze-patine: #6f8f78;
    --ambre: #d68a2e;
    --ambre-clair: #f0bd6c;
    --ambre-verriere: #c97b1f;
    --ivoire: #f3ede0;
    --ivoire-ombre: #e6ddc9;
    --encre: #1a1a1a;
    --rouille: #b5451b;
    --vert-succes: #4c7a5e;

    --display: 'Amarante', serif;
    --corps: 'Parisine', 'Archivo', sans-serif;
    --mono: 'IBM Plex Mono', monospace;
}

* {
    box-sizing: border-box;
}

html,
body {
    height: 100%;
    margin: 0;
    padding: 0;
    background: var(--vert-fonce);
    color: var(--encre);
    font-family: var(--corps);
}

body {
    position: relative;
    display: flex;
    justify-content: center;
    overflow: hidden;
}

/* toile de fond : dégradé profond + halo + motifs de ferronnerie en écho */
.metro-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    background:
        radial-gradient(ellipse 900px 500px at 50% -10%, rgba(214, 138, 46, 0.14), transparent 60%),
        linear-gradient(180deg, var(--vert-fonce) 0%, #0a2a20 45%, #081f19 100%);
    overflow: hidden;
}

.container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 900px;
    height: 100dvh;
    display: flex;
    flex-direction: column;
}

/* ---------- en-tête : plaque ovale façon panneau de station ---------- */
.metro-header {
    position: relative;
    flex-shrink: 0;
    background: var(--vert-guimard);
    color: var(--ivoire);
    padding: 26px 32px 20px;
    text-align: center;
}

.metro-header__frieze {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 22px;
    color: var(--ambre-clair);
    opacity: 0.55;
}

.metro-header__title-wrap {
    position: relative;
    margin: 14px auto 4px;
    padding: 20px 10px;
    max-width: 560px;
}

.metro-header__cartouche {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: clamp(300px, 82%, 480px);
    aspect-ratio: 380 / 110;
    height: auto;
    color: var(--ambre-clair);
    opacity: 0.85;
}

.metro-header h1,
.metro-header__subtitle {
    position: relative;
}

.metro-header h1 {
    font-family: var(--display);
    font-weight: 400;
    font-size: clamp(1.6rem, 4.6vw, 2.3rem);
    letter-spacing: 0.02em;
    margin: 0;
}

.metro-header__subtitle {
    font-size: 0.9rem;
    color: var(--ivoire-ombre);
    opacity: 0.85;
    margin: 0 0 10px;
}

.metro-header__bracket {
    display: block;
    width: min(70%, 320px);
    height: auto;
    margin: 0 auto;
    color: var(--ambre-clair);
    opacity: 0.8;
}

/* ---------- corps principal ---------- */
main {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    background: var(--ivoire);
    padding: 28px 30px 24px;
    box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.3);
    overflow-y: auto;
}

#ecran-categories,
#ecran-sessions {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    text-align: center;
}

#ecran-jeu {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.hidden {
    display: none !important;
}

.screen-lead {
    text-align: center;
    color: var(--vert-guimard);
    font-size: 1rem;
    margin-bottom: 22px;
}

#titre-categorie {
    font-family: var(--display);
    font-weight: 400;
    color: var(--vert-guimard);
    font-size: 1.5rem;
    margin: 0 0 6px;
}

/* ---------- grilles de boutons (catégories / sessions) ---------- */
.grille-boutons {
    display: flex;
    flex-direction: column;
    gap: 12px;
    max-width: 420px;
    margin: 0 auto;
    width: 100%;
}

.grille-boutons button {
    font-family: var(--corps);
    font-weight: 700;
    font-size: 0.98rem;
    color: var(--vert-fonce);
    background: linear-gradient(180deg, var(--ambre-clair), var(--ambre));
    border: none;
    padding: 14px 22px;
    border-radius: 999px;
    cursor: pointer;
    box-shadow:
        0 4px 0 var(--ambre-verriere),
        0 8px 16px rgba(19, 58, 45, 0.25),
        0 0 0 3px rgba(19, 58, 45, 0.08) inset;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
}

.grille-boutons button:hover {
    transform: translateY(-2px);
    box-shadow:
        0 6px 0 var(--ambre-verriere),
        0 12px 20px rgba(19, 58, 45, 0.3),
        0 0 0 3px rgba(19, 58, 45, 0.08) inset;
}

.grille-boutons button:active {
    transform: translateY(1px);
    box-shadow: 0 2px 0 var(--ambre-verriere), 0 4px 8px rgba(19, 58, 45, 0.25);
}

/* ---------- boutons de retour / sortie ---------- */
.bouton-menu {
    font-family: var(--corps);
    font-weight: 700;
    font-size: 0.9rem;
    border-radius: 3px;
    padding: 10px 18px;
    cursor: pointer;
    transition: transform 0.12s ease, background 0.15s ease;
}

.bouton-menu:active {
    transform: translateY(1px);
}

.bouton-retour {
    align-self: center;
    margin-top: 22px;
    background: transparent;
    color: var(--rouille);
    border: 2px solid var(--rouille);
}

.bouton-retour:hover {
    background: rgba(181, 69, 27, 0.06);
}

/* ---------- écran de jeu ---------- */
.game-topbar {
    flex-shrink: 0;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    border-bottom: 2px solid var(--vert-guimard);
    padding-bottom: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 6px;
}

#titre-session-en-cours {
    font-family: var(--display);
    font-weight: 400;
    color: var(--vert-guimard);
    font-size: 1.5rem;
    margin: 0;
}

#progress-text {
    font-family: var(--mono);
    font-size: 0.85rem;
    color: var(--rouille);
    margin: 0;
    letter-spacing: 0.03em;
}

/* ---------- disposition à deux colonnes : jeu + panneau documentaire ---------- */
.jeu-layout {
    flex: 1;
    min-height: 0;
    display: flex;
    gap: 26px;
    align-items: stretch;
    flex-wrap: nowrap;
    overflow: hidden;
}

.jeu-interaction {
    flex: 1 1 320px;
    min-width: 280px;
    display: flex;
    flex-direction: column;
    min-height: 0;
    overflow-y: auto;
    padding-right: 8px;
}

/* ---------- champ de saisie encadré ---------- */
.input-row {
    flex-shrink: 0;
    display: flex;
    gap: 10px;
    margin-bottom: 8px;
}

.ornate-frame {
    position: relative;
    flex: 1;
    padding: 6px;
}

.ornate-frame .corner {
    position: absolute;
    width: 22px;
    height: 22px;
    color: var(--vert-guimard);
    opacity: 0.8;
}

.corner--tl {
    top: -2px;
    left: -2px;
}

.corner--br {
    bottom: -2px;
    right: -2px;
    transform: rotate(180deg);
}

#champ-saisie {
    width: 100%;
    font-family: var(--corps);
    font-size: 1rem;
    color: var(--encre);
    background: #fff;
    border: 2px solid var(--vert-guimard);
    border-radius: 3px;
    padding: 12px 16px;
    outline: none;
    transition: box-shadow 0.15s ease;
}

#champ-saisie:focus {
    box-shadow: 0 0 0 3px rgba(201, 123, 31, 0.4);
    border-color: var(--ambre-verriere);
}

/* ---------- boutons ---------- */
button {
    font-family: var(--corps);
    font-weight: 700;
    font-size: 0.95rem;
    border: none;
    border-radius: 3px;
    padding: 12px 22px;
    cursor: pointer;
    transition: transform 0.12s ease, filter 0.15s ease;
}

#bouton-valider {
    flex-shrink: 0;
    background: var(--vert-guimard);
    color: var(--ivoire);
}

#bouton-valider:hover {
    filter: brightness(1.15);
}

.button-row {
    flex-shrink: 0;
    display: flex;
    gap: 10px;
    margin: 14px 0;
}

button.secondary {
    flex: 1;
    background: transparent;
    color: var(--vert-guimard);
    border: 2px solid var(--vert-guimard);
}

button.secondary:hover {
    background: rgba(19, 58, 45, 0.06);
}

button.secondary:disabled {
    color: var(--ivoire-ombre);
    border-color: var(--ivoire-ombre);
    cursor: not-allowed;
}

button:active {
    transform: translateY(1px);
}

.quit-btn {
    align-self: center;
    margin-top: auto;
    font-size: 0.85rem;
    padding: 8px 16px;
}

/* ---------- messages de retour ---------- */
.feedback {
    flex-shrink: 0;
    text-align: center;
    font-family: var(--mono);
    font-weight: 600;
    font-size: 0.9rem;
    min-height: 1.2em;
    margin: 0 0 10px;
    color: var(--rouille);
}

.feedback.success {
    color: var(--vert-succes);
}

.feedback.error {
    color: var(--rouille);
}

/* ---------- Zone des stations validées ---------- */
#zone-stations-validees {
    max-height: 150px;
    overflow-y: auto;
    overflow-x: hidden;
    padding-right: 10px;
    margin-bottom: 12px;
    -webkit-overflow-scrolling: touch;
}

#zone-stations-validees p, 
#zone-stations-validees span,
#zone-stations-validees div {
    font-family: var(--corps);
    font-weight: 600;
    font-size: 0.9rem;
    color: var(--vert-guimard);
    background: rgba(19, 58, 45, 0.06);
    border-radius: 4px;
    padding: 6px 12px;
    margin-bottom: 6px;
}

/* ---------- zone d'indice ---------- */
#zone-indices {
    flex-shrink: 0;
    position: relative;
    background: #fff;
    border: 1px solid var(--ivoire-ombre);
    border-left: 4px solid var(--vert-guimard);
    border-radius: 3px;
    padding: 14px 40px 14px 18px;
    margin-bottom: 4px;
    background-image:
        url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 60 60'><path d='M2 58 C 2 30, 6 14, 22 8 C 34 3.5, 44 8, 48 18 C 51 25, 48 31, 41 31 C 36 31, 34 27, 36 23' fill='none' stroke='%23133a2d' stroke-width='3' stroke-linecap='round'/><circle cx='36' cy='23' r='3' fill='%23133a2d'/></svg>");
    background-repeat: no-repeat;
    background-position: right -6px bottom -6px;
    background-size: 30px 30px;
}

#texte-indice {
    margin: 0;
    font-size: 0.95rem;
    line-height: 1.4;
    color: var(--encre);
    min-height: 1.3em;
}

/* ---------- panneau documentaire ---------- */
#panneau-informations {
    flex: 1 1 260px;
    min-width: 240px;
    align-self: stretch;
    overflow-y: auto;
    background: #fff;
    border: 1px solid var(--ivoire-ombre);
    border-left: 4px solid var(--ambre-verriere);
    border-radius: 3px;
    padding: 16px 20px;
    font-size: 0.9rem;
    line-height: 1.5;
    color: var(--encre);
}

#panneau-informations:empty {
    display: none;
}

#panneau-informations h3 {
    font-family: var(--display);
    font-weight: 400;
    color: var(--vert-guimard);
    font-size: 1.1rem;
    margin: 0 0 8px;
}

#panneau-informations img {
    max-width: 100%;
    border-radius: 3px;
    margin: 8px 0;
}

/* ---------- responsive ---------- */
@media (max-width: 680px) {
    .jeu-layout {
        flex-direction: column;
    }
    
    .jeu-interaction {
        flex: 0 0 auto;
        width: 100%;
        overflow-y: visible; 
    }

    #panneau-informations {
        flex: 1 1 auto;
        max-height: none;
        width: 100%;
    }
}

@media (max-width: 480px) {
    .metro-header {
        padding: 20px 20px 20px;
    }

    .metro-header h1 {
        font-size: 1.5rem;
    }

    main {
        padding: 20px 18px 18px;
    }

    .input-row {
        flex-direction: column;
    }
}

/* ---------- accessibilité ---------- */
:focus-visible {
    outline: 3px solid var(--ambre-verriere);
    outline-offset: 2px;
}

@media (prefers-reduced-motion: reduce) {

    * {
        transition: none !important;
    }
}
    </style>
</head>

<body>

    <!-- Motifs de ferronnerie Guimard, dessinés une seule fois et réutilisés partout via <use> -->
    <svg width="0" height="0" style="position:absolute" aria-hidden="true">
        <defs>
            <symbol id="guimard-corner" viewBox="0 0 60 60">
                <path d="M2 58 C 2 30, 6 14, 22 8 C 34 3.5, 44 8, 48 18 C 51 25, 48 31, 41 31 C 36 31, 34 27, 36 23"
                    fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" />
                <circle cx="36" cy="23" r="2.6" fill="currentColor" />
            </symbol>

            <!-- plaque ovale façon "ABBESSES" / "METROPOLITAIN", avec volutes aux pointes et fleuron sommital -->
            <symbol id="guimard-cartouche" viewBox="0 0 380 110">
                <path d="M40 55 C 40 25, 80 12, 130 12 L 250 12 C 300 12, 340 25, 340 55 C 340 85, 300 98, 250 98 L 130 98 C 80 98, 40 85, 40 55 Z"
                    fill="none" stroke="currentColor" stroke-width="3" />
                <path d="M54 55 C 54 33, 88 23, 130 23 L 250 23 C 292 23, 326 33, 326 55 C 326 77, 292 87, 250 87 L 130 87 C 88 87, 54 77, 54 55 Z"
                    fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.6" />
                <path d="M40 55 C 25 50, 12 52, 8 42 C 6 36, 12 30, 18 33 C 22 35, 21 40, 17 41" fill="none"
                    stroke="currentColor" stroke-width="2.2" stroke-linecap="round" />
                <path d="M340 55 C 355 50, 368 52, 372 42 C 374 36, 368 30, 362 33 C 358 35, 359 40, 363 41" fill="none"
                    stroke="currentColor" stroke-width="2.2" stroke-linecap="round" />
                <path d="M190 12 L190 2 M182 6 C 182 2, 198 2, 198 6" fill="none" stroke="currentColor"
                    stroke-width="1.8" stroke-linecap="round" />
                <circle cx="190" cy="2" r="2.2" fill="currentColor" />
                <circle cx="66" cy="55" r="2" fill="currentColor" opacity="0.8" />
                <circle cx="314" cy="55" r="2" fill="currentColor" opacity="0.8" />
            </symbol>

            <!-- console en fonte : arc en accolade perforé + écusson central à cornes et cœur, façon balustrade d'édicule -->
            <symbol id="guimard-bracket" viewBox="0 0 600 170">
                <path d="M40 150 C 120 60, 220 20, 300 20 C 380 20, 480 60, 560 150" fill="none"
                    stroke="currentColor" stroke-width="3.5" stroke-linecap="round" />
                <path d="M55 145 C 130 75, 225 38, 300 38 C 375 38, 470 75, 545 145" fill="none"
                    stroke="currentColor" stroke-width="1.4" opacity="0.7" />
                <path d="M40 150 C 25 140, 20 125, 30 115 C 38 108, 50 112, 50 122" fill="none"
                    stroke="currentColor" stroke-width="2.4" stroke-linecap="round" />
                <path d="M560 150 C 575 140, 580 125, 570 115 C 562 108, 550 112, 550 122" fill="none"
                    stroke="currentColor" stroke-width="2.4" stroke-linecap="round" />
                <!-- rang de perforations le long de l'arc principal, comme la fonte ajourée des balustrades -->
                <g fill="none" stroke="currentColor" stroke-width="1.3" opacity="0.8">
                    <circle cx="95.3" cy="97.8" r="3.4" />
                    <circle cx="143.0" cy="65.4" r="3.4" />
                    <circle cx="191.6" cy="41.9" r="3.4" />
                    <circle cx="239.5" cy="27.1" r="3.4" />
                    <circle cx="504.7" cy="97.8" r="3.4" />
                    <circle cx="457.0" cy="65.4" r="3.4" />
                    <circle cx="408.4" cy="41.9" r="3.4" />
                    <circle cx="360.5" cy="27.1" r="3.4" />
                </g>
                <!-- écusson central : amande, cœur et cornes en volute -->
                <path d="M300 18 C 322 18, 338 34, 338 55 C 338 78, 320 95, 300 108 C 280 95, 262 78, 262 55 C 262 34, 278 18, 300 18 Z"
                    fill="none" stroke="currentColor" stroke-width="2.6" />
                <path d="M300 108 C 292 98, 280 92, 280 82 C 280 75, 288 72, 294 78 C 297 81, 300 85, 300 88 C 300 85, 303 81, 306 78 C 312 72, 320 75, 320 82 C 320 92, 308 98, 300 108 Z"
                    fill="none" stroke="currentColor" stroke-width="1.6" opacity="0.85" />
                <circle cx="300" cy="45" r="7" fill="none" stroke="currentColor" stroke-width="1.6" />
                <path d="M282 22 C 265 12, 250 14, 248 26 C 247 34, 255 38, 260 32" fill="none"
                    stroke="currentColor" stroke-width="1.7" stroke-linecap="round" />
                <path d="M318 22 C 335 12, 350 14, 352 26 C 353 34, 345 38, 340 32" fill="none"
                    stroke="currentColor" stroke-width="1.7" stroke-linecap="round" />
                <circle cx="249" cy="25" r="2.4" fill="currentColor" opacity="0.85" />
                <circle cx="351" cy="25" r="2.4" fill="currentColor" opacity="0.85" />
            </symbol>

            <!-- tige et double volute, façon motifs sur les verrières ambrées -->
            <symbol id="guimard-reed" viewBox="0 0 40 50">
                <path d="M20 50 L20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                <path d="M20 20 C 10 20, 3 14, 5 6 C 6 2, 12 0, 15 4 C 17 7, 15 11, 12 12" fill="none"
                    stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                <path d="M20 20 C 30 20, 37 14, 35 6 C 34 2, 28 0, 25 4 C 23 7, 25 11, 28 12" fill="none"
                    stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                <circle cx="20" cy="5" r="2.4" fill="currentColor" />
                <circle cx="20" cy="40" r="1.6" fill="none" stroke="currentColor" stroke-width="1.2" />
            </symbol>
            <pattern id="guimard-frieze" width="46" height="50" patternUnits="userSpaceOnUse">
                <use href="#guimard-reed" x="3" width="40" height="50" />
            </pattern>
        </defs>
    </svg>

    <div class="metro-bg" aria-hidden="true"></div>

    <div class="container">
        <header class="metro-header">
            <svg class="metro-header__frieze" viewBox="0 0 700 46" preserveAspectRatio="none">
                <rect width="700" height="46" fill="url(#guimard-frieze)" />
            </svg>
            <div class="metro-header__title-wrap">
                <svg class="metro-header__cartouche" viewBox="0 0 380 110" preserveAspectRatio="none">
                    <use href="#guimard-cartouche" />
                </svg>
                <h1>Les Arcanes du Métro</h1>
            </div>
            <p class="metro-header__subtitle">Retrouvez le nom de chaque station à l'aide des indices</p>
            <svg class="metro-header__bracket" viewBox="0 0 600 170" preserveAspectRatio="xMidYMid meet">
                <use href="#guimard-bracket" />
            </svg>
        </header>

        <main>
            <!-- Étape 1 : Sélection de la catégorie principale -->
            <div id="ecran-categories">
                <p class="screen-lead">Sélectionnez une catégorie :</p>
                <div id="conteneur-categories" class="grille-boutons">
                    <!-- Les boutons de catégories seront injectés ici par JavaScript -->
                </div>
            </div>

            <!-- Étape 2 : Sélection de la session spécifique -->
            <div id="ecran-sessions" class="hidden">
                <h2 id="titre-categorie"></h2>
                <p class="screen-lead">Choisissez votre parcours :</p>
                <div id="conteneur-sessions" class="grille-boutons">
                    <!-- Les boutons de sessions seront injectés ici -->
                </div>
                <button id="bouton-retour-categories" class="bouton-menu bouton-retour">Retour aux catégories</button>
            </div>

            <!-- Étape 3 : Écran de jeu -->
            <div id="ecran-jeu" class="hidden">
                <div class="game-topbar">
                    <h2 id="titre-session-en-cours">Session</h2>
                    <div style="text-align: right;">
                        <p id="progress-text">Progression : <span id="compteur-stations">0</span> / <span id="total-stations">0</span></p>
                        <!-- Nouvelle ligne à insérer pour le score -->
                        <p id="score-text" style="font-family: var(--mono); font-size: 0.9rem; color: var(--vert-guimard); margin: 4px 0 0 0; font-weight: bold;">Score : <span id="valeur-score">0</span></p>
                    </div>
                </div>

                <div class="jeu-layout">

                    <!-- Espace d'interaction -->
                    <section class="jeu-interaction">
                        <div class="input-row">
                            <div class="ornate-frame">
                                <svg class="corner corner--tl"><use href="#guimard-corner" /></svg>
                                <svg class="corner corner--br"><use href="#guimard-corner" /></svg>
                                <input type="text" id="champ-saisie" placeholder="Nom de la station..."
                                    autocomplete="off">
                            </div>

    <script>
        const STATIONS = {"Abbesses": {"geographie": {"lignes": ["12"], "commune": "Paris", "code_insee": "75056", "latitude": 48.884392717991425, "longitude": 2.338394635220906}, "histoire": {"type_origine": "Lieu géographique", "sous_type_origine": "Place", "siecles": [], "details_personne": null, "description courte": "La place des Abbesses se situe sur la butte Montmartre. Son nom fait référence aux dirigeantes de l'ancienne abbaye des Dames de Montmartre.", "description longue": "La station doit sa dénomination à son implantation sous la place des Abbesses, laquelle fait référence aux dirigeantes de l'abbaye des Dames de Montmartre, figures du quartier à l'époque, et dont plusieurs ont des rues à leur nom dans les 9e et 18e arrondissements. Abbesses se situe en première position des stations du réseau classées par ordre alphabétique."}, "description courte": "Nommée d'après la place éponyme, elle rend hommage aux abbesses de l'ancienne abbaye de Montmartre, fondée en 1133 par le roi Louis VI.", "description longue": "La station de métro 'Abbesses' tire son nom de la place des Abbesses, située sur la butte Montmartre. Ce toponyme rend hommage aux quarante-six abbesses qui ont dirigé l'Abbaye royale de Montmartre, une influente communauté de bénédictines fondée en 1133 par le roi Louis VI le Gros et son épouse Adélaïde de Savoie. L'abbaye fut entièrement démantelée sous la Révolution française et sa dernière abbesse, Marie-Louise de Laval-Montmorency, mourut sur l'échafaud en 1794. Sur le plan de l'exploitation, Abbesses est célèbre pour être la station la plus profonde du réseau parisien, avec ses quais situés à 36 mètres sous le niveau du sol. Ses couloirs et ses escaliers hélicoïdaux sont ornés de fresques évoquant l'histoire de la Butte, tandis que son accès extérieur s'orne d'un édicule Guimard de style Art nouveau, transféré de la station Hôtel de Ville en 1974.", "ambiguite": false, "tags": ["L'architecture religieuse", "Les Femmes Illustres"]}, "Aimé Césaire": {"geographie": {"lignes": ["12"], "commune": "Aubervilliers", "code_insee": "93001", "latitude": 48.90838312983791, "longitude": 2.378035995881576}, "histoire": {"type_origine": "Personne", "sous_type_origine": "Auteur", "siecles": ["XXe siècle", "XXIe siècle"], "details_personne": {"nom": "Aimé Césaire", "annee_naissance": 1913, "annee_deces": 2008, "siecles_vecus": ["XXe siècle", "XXIe siècle"]}, "description courte": "Aimé Césaire (1913-2008) est un poète, dramaturge et homme politique français de la Martinique, fondateur et représentant majeur du mouvement littéraire de la négritude.", "description longue": "La station a été nommée pour honorer la mémoire de l'écrivain et homme politique martiniquais Aimé Césaire, figure incontournable de la lutte anticoloniale. Elle perpétue son héritage littéraire humaniste et son long engagement en tant que député et maire de Fort-de-France."}, "description courte": "Station nommée en hommage à Aimé Césaire (1913-2008), célèbre poète martiniquais, théoricien de la négritude et homme politique engagé français.", "description longue": "Inaugurée le 18 décembre 2012 lors du prolongement de la ligne 12 vers le nord à Aubervilliers, cette station rend hommage à Aimé Césaire (1913-2008). Écrivain et poète de premier plan, il est le cofondateur du concept littéraire et politique de la « négritude » aux côtés de Léopold Sédar Senghor et Léon-Gontran Damas. Parallèlement à son œuvre littéraire immense, Césaire a mené une carrière politique d'envergure nationale en tant que maire de Fort-de-France et député de la Martinique pendant plus de cinquante ans. L'attribution de son nom à cette station de Seine-Saint-Denis, territoire marqué par la diversité, célèbre la mémoire décoloniale, l'engagement civique et le patrimoine littéraire francophone hors des frontières de Paris intra-muros.", "ambiguite": false, "tags": ["Écrivains et Philosophes", "Institutions Civiques et Politiques", "Arts et Culture"]}, "Alexandre Dumas": {"geographie": {"lignes": ["2"], "commune": "Paris", "code_insee": "75056", "latitude": 48.856199097341126, "longitude": 2.3945914186721278}, "histoire": {"type_origine": "Personne", "sous_type_origine": "Auteur", "siecles": ["XIXe siècle"], "details_personne": {"nom": "Alexandre Dumas", "annee_naissance": 1802, "annee_deces": 1870, "siecles_vecus": ["XIXe siècle"]}, "description courte": "Alexandre Dumas (1802-1870) est un célèbre écrivain et dramaturge français, auteur de chefs-d'œuvre historiques mondiaux comme Les Trois Mousquetaires et Le Comte de Monte-Cristo.", "description longue": "Le 13 septembre 1970, afin d'éviter toute confusion avec la nouvelle station Porte de Bagnolet, la station de la ligne 2 a été rebaptisée Alexandre Dumas en référence à la rue voisine éponyme, rendant hommage à l'un des plus grands romanciers français du XIXe siècle."}, "description courte": "Station de la ligne 2 nommée d'après le célèbre écrivain Alexandre Dumas père, auteur des Trois Mousquetaires, située sous la rue éponyme.", "description longue": "La station est ouverte le 31 janvier 1903 sous le nom de « Bagnolet ». Elle est rebaptisée « Alexandre Dumas » le 13 septembre 1970 afin d'éviter toute confusion avec la station « Porte de Bagnolet » alors en construction sur la ligne 3 (qui ouvrira en 1971). Le nom rend hommage à Alexandre Dumas père (1802-1870), auteur prolifique de romans historiques incontournables comme « Les Trois Mousquetaires » et « Le Comte de Monte-Cristo ». Bien que son fils, également nommé Alexandre Dumas (auteur de « La Dame aux camélias »), fasse partie du patrimoine littéraire, la rue et la station honorent principalement le père, dont les cendres ont été transférées au Panthéon en 2002.", "ambiguite": false, "tags": ["Arts et Culture", "Écrivains et Philosophes"]}, "Alma - Marceau": {"geographie": {"lignes": ["9"], "commune": "Paris", "code_insee": "75056", "latitude": 48.8647282422178, "longitude": 2.301130527470699}, "histoire": {"type_origine": "Lieu géographique", "sous_type_origine": "Bataille", "siecles": ["XVIIIe siècle"], "details_personne": {"nom": "François Séverin Marceau", "annee_naissance": 1769, "annee_deces": 1796, "siecles_vecus": ["XVIIIe siècle"]}, "description courte": "La station rappelle la victoire franco-britannique de l'Alma en 1854 et le général de la Révolution française François Séverin Marceau (1769-1796).", "description longue": "Son nom provient du pont de l'Alma, célébrant la bataille victorieuse de la guerre de Crimée, et de l'avenue Marceau, qui rend hommage au général révolutionnaire français tombé au champ d'honneur."}, "description courte": "Cette station rend hommage à la bataille de l'Alma (1854) et au général de la Révolution française François Séverin Marceau.", "description longue": "La station Alma - Marceau, située sur la ligne 9, tire son nom de sa situation géographique au croisement de la place de l'Alma et de l'avenue Marceau. Il s'agit d'un nom composé qui associe deux périodes de l'histoire militaire française. D'une part, « Alma » commémore la bataille de l'Alma (20 septembre 1854), première victoire des forces franco-britanniques durant la guerre de Crimée, tirant son nom du fleuve Alma. D'autre part, « Marceau » rend hommage au général François Séverin Marceau-Desgraviers (1769-1796), un jeune général de la Révolution française mort héroïquement au combat à l'âge de 27 ans. Le quartier est également célèbre pour le Pont de l'Alma et sa statue du Zouave, servant de repère populaire lors des crues de la Seine, ainsi que pour la Flamme de la Liberté, devenue monument commémoratif à la princesse Diana.", "ambiguite": false, "tags": ["Les victoires et batailles militaires", "Révolution et République"]}, "Alésia": {"geographie": {"lignes": ["4"], "commune": "Paris", "code_insee": "75056", "latitude": 48.82820106421924, "longitude": 2.3270932349484528}, "histoire": {"type_origine": "Lieu géographique", "sous_type_origine": "Bataille", "siecles": [], "details_personne": null, "description courte": "Le nom fait référence au siège d'Alésia de 52 av. J.-C., bataille marquant la défaite de Vercingétorix face aux légions romaines de Jules César.", "description longue": "La station est située sous la place Victor-et-Hélène-Basch, anciennement place d'Alésia. Ce nom de voie a été choisi au XIXe siècle pour commémorer la célèbre bataille de la guerre des Gaules."}, "description courte": "La station doit son nom à la rue d'Alésia, qui commémore la célèbre bataille de 52 avant J.-C. opposant Jules César à Vercingétorix.", "description longue": "Inaugurée le 30 octobre 1909 sur la ligne 4 du métro de Paris, la station 'Alésia' est située au cœur du 14e arrondissement. Elle tire son nom de la rue d'Alésia, qui traverse le quartier. Ce nom fait référence au célèbre siège d'Alésia en 52 avant J.-C., où le chef gaulois Vercingétorix dut capituler face à Jules César, marquant la fin de la guerre des Gaules et le début de l'époque gallo-romaine.\n\nLe choix de ce nom pour la voirie parisienne en 1868 s'inscrit dans le contexte du Second Empire. L'empereur Napoléon III portait un intérêt passionné à l'histoire romaine et gauloise, finançant personnellement de grandes fouilles archéologiques à Alise-Sainte-Reine (Côte-d'Or) pour localiser précisément le site de la bataille. \n\nSur le plan architectural, la station a perdu ses faïences d'origine lors d'une rénovation dans les années 1950 en style 'carrossé' (plaques métalliques), avant d'être restaurée dans le style 'Ouï-dire' puis modernisée entièrement dans le cadre de l'automatisation de la ligne 4 achevée dans les années 2020.", "ambiguite": false, "tags": ["Les victoires et batailles militaires", "Topographie et Urbanisme"]}, "Anatole France": {"geographie": {"lignes": ["3"], "commune": "Levallois-Perret", "code_insee": "92044", "latitude": 48.89223258539651, "longitude": 2.2848122193525104}, "histoire": {"type_origine": "Personne", "sous_type_origine": "Auteur", "siecles": ["XIXe siècle", "XXe siècle"], "details_personne": {"nom": "Anatole France", "annee_naissance": 1844, "annee_deces": 1924, "siecles_vecus": ["XIXe siècle", "XXe siècle"]}, "description courte": "Anatole France (1844-1924) est un écrivain, critique littéraire et académicien français. Il a reçu le prestigieux prix Nobel de littérature en 1921.", "description longue": "La station dessert la rue Anatole-France à Levallois-Perret, une artère nommée pour honorer ce grand auteur de la Troisième République, célèbre pour son érudition et ses engagements politiques en faveur des grandes causes sociales."}, "description courte": "La station rend hommage à Anatole France (1844-1924), écrivain français, critique littéraire et prix Nobel de littérature, à Levallois-Perret.", "description longue": "Située sur la ligne 3 dans la commune de Levallois-Perret et ouverte en 1937, la station célèbre François-Anatole Thibault, dit Anatole France (1844-1924). Écrivain, conteur et critique littéraire majeur de la Troisième République, membre de l'Académie française, il reçut le prix Nobel de littérature en 1921 pour l'ensemble de son œuvre. Humaniste et engagé, il prit notamment la défense d'Alfred Dreyfus. Sur le plan de l'architecture ferroviaire, la station présente la particularité d'avoir des quais décalés. En raison de l'étroitesse de la rue éponyme sous laquelle elle passe, cette disposition asymétrique a été adoptée pour préserver les fondations des immeubles riverains.", "ambiguite": false, "tags": ["Arts et Culture", "Écrivains et Philosophes"]}, "Anvers": {"geographie": {"lignes": ["2"], "commune": "Paris", "code_insee": "75056", "latitude": 48.882868568843925, "longitude": 2.3441548403302916}, "histoire": {"type_origine": "Lieu géographique", "sous_type_origine": "Ville", "siecles": [], "details_personne": null, "description courte": "Anvers est une grande ville de la Région flamande en Belgique, réputée comme un centre majeur du commerce international des diamants et un grand port.", "description longue": "La station tire son nom de la place d'Anvers toute proche. L'attribution de ce toponyme célèbre la victoire des troupes françaises lors de la prise de la citadelle d'Anvers en 1832."}, "description courte": "La station doit son nom au square d'Anvers, commémorant la victoire française lors du siège de la ville belge d'Anvers en 1832.", "description longue": "La station de métro 'Anvers' tire son nom du square d'Anvers situé en surface, au pied de la butte Montmartre. Ce square célèbre la victoire militaire française remportée par le maréchal Gérard en décembre 1832 lors du siège de la citadelle d'Anvers, une intervention décisive qui permit d'assurer l'indépendance de la Belgique face aux troupes néerlandaises. Outre cette référence historique, la station est célèbre mondialement pour son édicule d'accès de style Art nouveau conçu par Hector Guimard. Cet édicule de type B, avec sa célèbre verrière rappelant des ailes de libellule, est l'un des rares exemplaires d'origine entièrement préservés et classés monuments historiques.", "ambiguite": false, "tags": ["Géographie et International", "Les victoires et batailles militaires", "Monuments et Lieux Emblématiques"]}, "Argentine": {"geographie": {"lignes": ["1"], "commune": "Paris", "code_insee": "75056", "latitude": 48.875383816476266, "longitude": 2.290148271742768}, "histoire": {"type_origine": "Lieu géographique", "sous_type_origine": "Pays", "siecles": [], "details_personne": null, "description courte": "L'Argentine est un vaste pays d'Amérique du Sud, organisé en république fédérale, dont la capitale et plus grande ville est Buenos Aires.", "description longue": "Initialement nommée Obligado, la station fut solennellement rebaptisée Argentine en 1948. Ce changement marque la reconnaissance de la France envers l'aide alimentaire généreuse apportée par cette nation sud-américaine après la Seconde Guerre mondiale."}, "description courte": "Anciennement \"Obligado\", la station fut renommée \"Argentine\" en 1948 en reconnaissance de l'aide alimentaire généreuse apportée par l'Argentine à la France après-guerre.", "description longue": "Inaugurée en 1900 sous le nom de « Obligado » (en référence à une victoire militaire franco-anglaise en Argentine en 1845), la station est renommée « Argentine » le 25 mai 1948. Ce changement fait suite à celui de la rue d'Obligado, rebaptisée rue d'Argentine. Il s'agit d'un geste de gratitude du gouvernement français envers l'Argentine pour son aide alimentaire cruciale (notamment des cargaisons de viande et de blé) fournie à la population française durant la Seconde Guerre mondiale et lors de la reconstruction. En 2011, la station a été décorée de fresques thématiques célébrant les paysages et la culture argentine, en présence des autorités des deux pays.", "ambiguite": false, "tags": ["Géographie et International"]}, "Arts et Métiers": {"geographie": {"lignes": ["11", "3"], "commune": "Paris", "code_insee": "75056", "latitude": 48.86553459885931, "longitude": 2.3567233472754983}, "histoire": {"type_origine": "Institution", "sous_type_origine": "Enseignement", "siecles": [], "details_personne": null, "description courte": "L'École nationale supérieure d'arts et métiers, fondée en 1780, est l'une des plus prestigieuses et anciennes écoles d'ingénieurs de France.", "description longue": "La station doit son nom à sa proximité directe avec le Conservatoire national des arts et métiers (CNAM). Elle bénéficie d'une architecture unique sur la ligne 11, recouverte de plaques de cuivre inspirées des œuvres de Jules Verne."}, "description courte": "La station tire son nom du Conservatoire national des arts et métiers, institution scientifique et technique majeure fondée en 1794 à proximité.", "description longue": "La station 'Arts et Métiers' (desservie par les lignes 3 et 11) doit son nom au Conservatoire national des arts et métiers (CNAM), fondé en 1794 par l'abbé Henri Grégoire durant la Révolution française. Installé dans les murs de l'ancien prieuré Saint-Martin-des-Champs, cet établissement d'enseignement supérieur et de recherche abrite également le Musée des Arts et Métiers, qui conserve une collection exceptionnelle d'inventions scientifiques et industrielles. L'anecdote la plus célèbre de la station concerne le quai de la ligne 11 : en 1994, pour le bicentenaire du Conservatoire, il a été entièrement redessiné par le dessinateur de bande dessinée belge François Schuiten. Revêtue de plaques de cuivre rivetées et dotée de hublots présentant des maquettes, la station évoque l'univers de science-fiction steampunk et le célèbre sous-marin Nautilus de Jules Verne.", "ambiguite": false, "tags": ["Sciences, Médecine et Techniques", "Monuments et Lieux Emblématiques", "Révolution et République"]}, "Asnières - Gennevilliers - Les Courtilles": {"geographie": {"lignes": ["13"], "commune": "Gennevilliers", "code_insee": "92036", "latitude": 48.93076460500162, "longitude": 2.2842197492931637}, "histoire": {"type_origine": "Lieu géographique", "sous_type_origine": "Quartier", "siecles": [], "details_personne": null, "description courte": "Les Courtilles désigne un quartier situé à la frontière des communes franciliennes d'Asnières-sur-Seine et de Gennevilliers, au nord-ouest de Paris.", "description longue": "Le nom de la station indique sa situation géographique stratégique, desservant le grand quartier résidentiel des Courtilles tout en assurant une liaison essentielle entre les villes d'Asnières et de Gennevilliers."}, "description courte": "Cette station dessert les communes d'Asnières-sur-Seine et Gennevilliers, au niveau du lieu-dit « Les Courtilles », qui désignait historiquement de petits jardins clos.", "description longue": "Inaugurée le 14 juin 2008, la station constitue le terminus de la branche nord-ouest de la ligne 13. Son nom complexe à triple tiroir reflète sa situation géographique et historique. Elle dessert à la fois les communes d'Asnières-sur-Seine (dont le nom provient du latin 'asinaria', désignant un élevage d'ânes) et de Gennevilliers. La spécificité 'Les Courtilles' fait référence à un très ancien toponyme local. En vieux français, un 'courtil' (dérivé du bas-latin 'curtile') désignait un petit jardin clos, un potager ou une cour attenante à une maison rurale. Ce secteur, autrefois agricole et dédié aux cultures maraîchères sur la plaine de Gennevilliers, a été profondément métamorphosé au XXe siècle par l'urbanisation et la construction de grands ensembles, tout en conservant la mémoire de ses anciens espaces verts dans sa toponymie.", "ambiguite": false, "tags": ["Anciens Villages et Hameaux", "Topographie et Urbanisme"]}, "Assemblée Nationale": {"geographie": {"lignes": ["12"], "commune": "Paris", "code_insee": "75056", "latitude": 48.861071939526084, "longitude": 2.320575836647556}, "histoire": {"type_origine": "Institution", "sous_type_origine": "Politique", "siecles": [], "details_personne": null, "description courte": "L'Assemblée nationale est la chambre basse du Parlement français, siégeant au palais Bourbon et détenant le principal pouvoir législatif du pays.", "description longue": "Anciennement nommée Chambre des députés, la station a été renommée en 1989 pour correspondre à l'appellation actuelle de l'institution constitutionnelle, dont le prestigieux siège, le palais Bourbon, s'élève juste au-dessus des quais."}, "description courte": "Nommée d'après l'Assemblée nationale siégeant au Palais Bourbon voisin, cette station s'appelait « Chambre des Députés » jusqu'en 1989.", "description longue": "Inaugurée le 5 novembre 1910 sous le nom de « Chambre des Députés » sur la ligne A du réseau Nord-Sud (aujourd'hui la ligne 12), la station est rebaptisée « Assemblée Nationale » le 30 juin 1989, afin de correspondre à l'appellation officielle de la chambre basse du Parlement sous la Ve République. Elle dessert directement le Palais Bourbon, édifice historique construit au XVIIIe siècle. La station possède une particularité culturelle unique : depuis 1990, ses quais sont exempts de toute publicité commerciale. À la suite d'une collaboration avec l'artiste Jean-Charles Blais, les murs sont régulièrement habillés de fresques thématiques et artistiques représentant les députés, les grands débats républicains ou des événements citoyens, transformant l'attente sur le quai en une véritable exposition civique.", "ambiguite": false, "tags": ["Institutions Civiques et Politiques", "Révolution et République"]}, "Aubervilliers - Pantin - Quatre Chemins": {"geographie": {"lignes": ["7"], "commune": "Pantin", "code_insee": "93055", "latitude": 48.90375706036556, "longitude": 2.3922205712292195}, "histoire": {"type_origine": "Lieu géographique", "sous_type_origine": "Carrefour", "siecles": [], "details_personne": null, "description courte": "Les Quatre Chemins est le nom d'un carrefour routier majeur situé à la frontière entre les villes d'Aubervilliers et de Pantin.", "description longue": "La station est nommée d'après le carrefour des Quatre Chemins, un point de jonction historique situé sur l'ancienne route de Flandre, qui matérialise l'intersection exacte entre les territoires communaux d'Aubervilliers et de Pantin."}, "description courte": "Cette station doit son nom aux communes limitrophes d'Aubervilliers et Pantin, et au carrefour historique des « Quatre Chemins » situé à leur frontière.", "description longue": "Inaugurée le 4 octobre 1979 lors du prolongement de la ligne 7 du métro de Paris, la station est implantée au cœur d'un secteur historiquement très industriel et populaire. Son nom composite associe les territoires des deux communes limitrophes de Seine-Saint-Denis sur lesquelles elle se situe, Aubervilliers et Pantin, à un lieu-dit emblématique : le carrefour des « Quatre Chemins ». Ce croisement historique superpose l'ancienne route impériale 2 (route de Flandre, actuelle avenue Jean-Jaurès) et l'axe reliant les centres d'Aubervilliers et de Pantin. À la fin du XIXe siècle, ce carrefour devint un pôle d'activité économique majeur, accueillant de nombreuses verreries et manufactures. Il attira une population ouvrière dense, notamment des familles d'Alsace-Lorraine après la guerre de 1870, ce qui valut un temps au quartier le surnom de « Petite Prusse ».", "ambiguite": false, "tags": ["Topographie et Urbanisme", "Anciens Villages et Hameaux"]}, "Avenue Émile Zola": {"geographie": {"lignes": ["10"], "commune": "Paris", "code_insee": "75056", "latitude": 48.84695722990175, "longitude": 2.2950459810371475}, "histoire": {"type_origine": "Personne", "sous_type_origine": "Auteur", "siecles": ["XIXe siècle", "XXe siècle"], "details_personne": {"nom": "Émile Zola", "annee_naissance": 1840, "annee_deces": 1902, "siecles_vecus": ["XIXe siècle", "XXe siècle"]}, "description courte": "Émile Zola (1840-1902) est un immense écrivain et journaliste français, célèbre pour avoir été le chef de file du mouvement littéraire du naturalisme.", "description longue": "La station est située sous l'avenue Émile-Zola dans le 15e arrondissement. Cette voie a été baptisée en hommage au brillant romancier des Rougon-Macquart, figure morale de son époque grâce à son texte J'accuse."}, "description courte": "Nommée d'après l'avenue honorant Émile Zola, célèbre écrivain naturaliste du XIXe siècle et défenseur de Dreyfus, lors de la restructuration du réseau en 1937.", "description longue": "La station, située sur la ligne 10 dans le 15e arrondissement, a ouvert ses portes en 1913 sous le nom de « Commerce ». Lors de la grande restructuration des lignes du métro parisien en 1937, elle est rattachée à la ligne 10. Pour éviter toute confusion avec la station « Commerce » conservée sur la ligne 8, elle est rebaptisée « Avenue Émile Zola ». L'avenue elle-même, ancienne section de l'avenue de Grenelle, avait été renommée en 1905 pour rendre hommage à l'illustre écrivain Émile Zola (1840-1902), chef de file du courant naturaliste et auteur engagé, célèbre pour son rôle déterminant dans l'affaire Dreyfus avec la publication de son pamphlet « J'accuse… ! ».", "ambiguite": false, "tags": ["Écrivains et Philosophes", "Topographie et Urbanisme"]}, "Avron": {"geographie": {"lignes": ["2"], "commune": "Paris", "code_insee": "75056", "latitude": 48.85161645805963, "longitude": 2.3980666384995177}, "histoire": {"type_origine": "Lieu géographique", "sous_type_origine": "Plateau", "siecles": [], "details_personne": null, "description courte": "Le plateau d'Avron est un relief situé en Seine-Saint-Denis, connu pour son rôle défensif stratégique lors de la guerre franco-prussienne de 1870.", "description longue": "La station doit son nom à sa proximité avec la rue d'Avron, artère de l'est parisien dont l'orientation mène historiquement en direction du célèbre plateau d'Avron."}, "description courte": "La station doit son nom à la rue d'Avron, évoquant le plateau d'Avron, haut lieu de défense de Paris durant la guerre de 1870.", "description longue": "Ouverte en 1903 sur la ligne 2 du métro parisien, la station Avron tire son nom de la rue d'Avron, qui s'étire en direction de l'ancien plateau d'Avron, situé sur les communes de Rosny-sous-Bois, Villemomble et Neuilly-Plaisance. Ce plateau a joué un rôle stratégique majeur durant la guerre franco-allemande de 1870. Lors du siège de Paris, l'armée française y avait installé des batteries d'artillerie pour tenter de desserrer l'étau prussien. Les violents combats et les bombardements intensifs de décembre 1870 menèrent à l'évacuation du plateau, un épisode marquant de la résistance parisienne commémoré par l'odonyme.", "ambiguite": false, "tags": ["Les victoires et batailles militaires", "Topographie et Urbanisme"]}, "Aéroport d'Orly": {"geographie": {"lignes": ["14"], "commune": "Paray-Vieille-Poste", "code_insee": "91479", "latitude": 48.72769656117165, "longitude": 2.362458738946496}, "histoire": {"type_origine": "Lieu géographique", "sous_type_origine": "Aéroport", "siecles": [], "details_personne": null, "description courte": "L'aéroport de Paris-Orly est la deuxième plus grande plateforme aéroportuaire de France, située à quatorze kilomètres au sud de la capitale.", "description longue": "Le nom de la station désigne directement le lieu monumental qu'elle dessert : les terminaux de l'aéroport d'Orly, désormais connectés au réseau métropolitain grâce au grand prolongement sud de la ligne 14."}, "description courte": "La station dessert l'aéroport de Paris-Orly, aménagé dès 1918 et nommé d'après la commune d'Orly sur laquelle il est implanté.", "description longue": "La station 'Aéroport d'Orly', mise en service en juin 2024 avec le prolongement de la ligne 14, dessert le deuxième pôle aéroportuaire de France. L'histoire du site débute durant la Première Guerre mondiale, en 1918, lorsque l'armée américaine y installe un terrain d'aviation militaire. Dans les années 1920, le site acquiert une renommée mondiale grâce aux gigantesques hangars à dirigeables en béton armé conçus par l'ingénieur Eugène Freyssinet, détruits lors des bombardements de 1944. Reconstruit pour l'aviation civile après la guerre, Orly devient un symbole de modernité et des Trente Glorieuses, notamment avec l'inauguration du terminal d'Orly Sud par Charles de Gaulle en 1961. Le lieu est alors si populaire qu'il attire des visiteurs du dimanche venus simplement admirer les avions depuis ses terrasses, une ambiance immortalisée par Gilbert Bécaud dans sa célèbre chanson 'Dimanche à Orly'. Le nom de la commune d'Orly provient quant à lui du gallo-romain 'Aureliacum', signifiant le domaine d'Aurelius.", "ambiguite": false, "tags": ["Monuments et Lieux Emblématiques", "Topographie et Urbanisme"]}, "Bagneux - Lucie Aubrac": {"geographie": {"lignes": ["4"], "commune": "Bagneux", "code_insee": "92007", "latitude": 48.80354822259104, "longitude": 2.317458362049886}, "histoire": {"type_origine": "Personne", "sous_type_origine": "Résistante", "siecles": ["XXe siècle", "XXIe siècle"], "details_personne": {"nom": "Lucie Aubrac", "annee_naissance": 1912, "annee_deces": 2007, "siecles_vecus": ["XXe siècle", "XXIe siècle"]}, "description courte": "Lucie Aubrac (1912-2007) est une héroïne de la Résistance intérieure française, militante pacifiste et cofondatrice du mouvement Libération-Sud pendant la Seconde Guerre mondiale.", "description longue": "La station est nommée d'après la ville de Bagneux qu'elle dessert et rend hommage à Lucie Aubrac, professeure et figure majeure de la Résistance, suite à une vaste consultation publique francilienne."}, "description courte": "La station associe le nom de la commune de Bagneux à celui de Lucie Aubrac, héroïne emblématique de la Résistance française.", "description longue": "Inaugurée le 13 janvier 2022 lors du prolongement de la ligne 4, cette station présente un nom composé à double signification. D'une part, 'Bagneux' fait référence à la commune des Hauts-de-Seine où elle se situe, dont le nom proviendrait du latin 'Balneolum' (petits bains), évoquant la présence d'eau ou de thermes romains. D'autre part, 'Lucie Aubrac' (1912-2007) rend hommage à l'une des figures féminines les plus importantes de la Résistance intérieure française pendant la Seconde Guerre mondiale. Agrégée d'histoire, elle s'engagea activement dans le mouvement Libération-Sud et organisa des opérations d'évasion audacieuses pour libérer son mari, Raymond Aubrac, des mains de la Gestapo de Klaus Barbie. Le choix de son nom résulte d'une consultation publique, répondant également à une volonté de la RATP de féminiser les noms des stations du réseau.", "ambiguite": false, "tags": ["Les Femmes Illustres", "Les figures de la Résistance", "Anciens Villages et Hameaux"]}, "Balard": {"geographie": {"lignes": ["8"], "commune": "Paris", "code_insee": "75056", "latitude": 48.83666789483108, "longitude": 2.2783626618092008}, "histoire": {"type_origine": "Personne", "sous_type_origine": "Scientifique", "siecles": ["XIXe siècle"], "details_personne": {"nom": "Antoine-Jérôme Balard", "annee_naissance": 1802, "annee_deces": 1876, "siecles_vecus": ["XIXe siècle"]}, "description courte": "Antoine-Jérôme Balard (1802-1876) est un pharmacien et grand chimiste français, passé à la postérité pour avoir découvert l'élément chimique brome en 1826.", "description longue": "La station tire son nom de la place Balard, située à proximité, honorant la mémoire du chercheur Antoine-Jérôme Balard qui accomplit des avancées significatives dans l'extraction des éléments marins."}, "description courte": "La station rend hommage au chimiste français Antoine-Jérôme Balard (1802-1876), célèbre pour avoir découvert le brome en 1826.", "description longue": "Inaugurée en 1937 en tant que terminus sud-ouest de la ligne 8, la station Balard doit son nom à la rue et à la place éponymes situées en surface. Ces voies honorent Antoine-Jérôme Balard (1802-1876), un brillant chimiste et pharmacien français. Il est entré dans l'histoire des sciences en découvrant le brome en 1826, alors qu'il étudiait la composition de l'eau de mer et des algues de Montpellier. Cette prouesse lui permit d'intégrer l'Académie des sciences et de succéder à Louis-Jacques Thénard au Collège de France. Sur le plan urbain, le quartier de la station a connu une immense métamorphose : autrefois caractérisé par les fortifications de Thiers et les usines d'aviation Voisin, il accueille aujourd'hui l'Hexagone Balard, le vaste complexe regroupant les états-majors des forces armées françaises.", "ambiguite": false, "tags": ["Sciences, Médecine et Techniques"]}, "Barbara": {"geographie": {"lignes": ["4"], "commune": "Bagneux", "code_insee": "92007", "latitude": 48.8097987811254, "longitude": 2.3174174096489284}, "histoire": {"type_origine": "Personne", "sous_type_origine": "Artiste", "siecles": ["XXe siècle"], "details_personne": {"nom": "Barbara", "annee_naissance": 1930, "annee_deces": 1997, "siecles_vecus": ["XXe siècle"]}, "description courte": "Barbara (1930-1997), née Monique Serf, est une célèbre autrice-compositrice-interprète française, connue pour des chansons intemporelles comme L'Aigle noir et Nantes.", "description longue": "Inaugurée en 2022, la station rend un hommage appuyé à la chanteuse Barbara. Cet emplacement est symbolique car l'artiste repose au cimetière parisien de Bagneux, que la station dessert directement."}, "description courte": "Nommée en hommage à la célèbre chanteuse française Barbara (1930-1997), inhumée à proximité au cimetière parisien de Bagneux.", "description longue": "Inaugurée le 13 janvier 2022 lors du prolongement de la ligne 4, la station rend hommage à Barbara (Monique Andrée Serf), icône de la chanson française disparue en 1997. Ce choix résulte d'une consultation publique menée en 2018, qui a permis aux usagers de voter pour le nom de la future station parmi plusieurs propositions féminines, répondant ainsi à une volonté de féminiser le réseau de métro. Le lien géographique avec la station est direct : l'interprète de 'L'Aigle noir' et 'Dis, quand reviendras-tu ?' repose non loin de là, au cimetière parisien de Bagneux, dans la sépulture familiale.", "ambiguite": false, "tags": ["Arts et Culture", "Les Femmes Illustres"]}, "Barbès - Rochechouart": {"geographie": {"lignes": ["2", "4"], "commune": "Paris", "code_insee": "75056", "latitude": 48.883852349861876, "longitude": 2.350573400888514}, "histoire": {"type_origine": "Personnes", "sous_type_origine": "Politique / Religieuse", "siecles": ["XVIIe siècle", "XVIIIe siècle", "XIXe siècle"], "details_personne": {"nom": "Armand Barbès / Marguerite de Rochechouart", "annee_naissance": 1665, "annee_deces": 1870, "siecles_vecus": ["XVIIe siècle", "XVIIIe siècle", "XIXe siècle"]}, "description courte": "Armand Barbès est un homme politique républicain, et Marguerite de Rochechouart fut une éminente abbesse dirigeant l'abbaye de Montmartre au XVIIIe siècle.", "description longue": "La station croise le boulevard Barbès et le boulevard Marguerite-de-Rochechouart, combinant astucieusement les noms d'un féroce opposant à la monarchie de Juillet et d'une ancienne abbesse locale très respectée."}, "description courte": "Cette station rend hommage au républicain Armand Barbès et à Marguerite de Rochechouart, abbesse de Montmartre, unissant deux figures historiques contrastées du quartier.", "description longue": "La station 'Barbès - Rochechouart' témoigne de la rencontre de deux histoires de France distinctes à travers sa topographie. La première partie de son nom rend hommage à Armand Barbès (1809-1870), homme politique républicain et opposant farouche à la Monarchie de Juillet, surnommé le « Bayard de la démocratie » pour son engagement révolutionnaire. La seconde partie honore Marguerite de Rochechouart de Montpipeau (1665-1727), abbesse de Montmartre, qui dirigea l'abbaye avec rigueur et sagesse sous la Régence. Initialement inaugurée en 1903 sous le nom de 'Boulevard Barbès', la station prend son nom double actuel en 1907. Sa structure aérienne sur la ligne 2, conçue par Jean-Camille Formigé, en fait un repère architectural et populaire emblématique du nord de Paris, reliant les 9e, 10e et 18e arrondissements.", "ambiguite": true, "tags": ["Révolution et République", "Les Femmes Illustres"]}, "Basilique de Saint-Denis": {"geographie": {"lignes": ["13"], "commune": "Saint-Denis", "code_insee": "93066", "latitude": 48.93659371717278, "longitude": 2.359202621115829}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "La basilique de Saint-Denis est un chef-d'œuvre de l'art gothique, célèbre pour abriter la nécropole des rois et reines de France.", "description longue": "La station permet de se rendre directement à la cathédrale basilique de Saint-Denis, ancien monastère d'une importance capitale et haut lieu de la mémoire de la monarchie française."}, "description courte": "La station doit son nom à la basilique de Saint-Denis, chef-d'œuvre de l'art gothique et nécropole historique des rois de France.", "description longue": "Inaugurée en 1976 sous le nom de 'Saint-Denis - Basilique' puis renommée en 1998, la station dessert la célèbre basilique-cathédrale de Saint-Denis. Fondée sur le lieu de sépulture de saint Denis, premier évêque de Paris martyrisé au IIIe siècle, elle est devenue la nécropole des rois et reines de France dès le Moyen Âge. Reconstruite par l'abbé Suger au XIIe siècle, la basilique est considérée comme le premier chef-d'œuvre de l'art gothique, introduisant la lumière au cœur de l'architecture sacrée. La station de métro, par sa structure moderne avec verrières, cherche à faire écho à cette luminosité historique.", "ambiguite": false, "tags": ["L'architecture religieuse", "Monuments et Lieux Emblématiques"]}, "Bastille": {"geographie": {"lignes": ["1", "5", "8"], "commune": "Paris", "code_insee": "75056", "latitude": 48.85196422011205, "longitude": 2.368692796099789}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "La forteresse de la Bastille était une célèbre prison parisienne dont la prise d'assaut le 14 juillet 1789 marqua le début de la Révolution.", "description longue": "La station se situe sous la vaste place de la Bastille, aménagée à l'emplacement exact de l'ancienne forteresse royale massive, symbole de l'absolutisme, détruite au début de la Révolution française."}, "description courte": "La station tire son nom de l'ancienne forteresse médiévale de la Bastille, dont la prise le 14 juillet 1789 symbolise la Révolution française.", "description longue": "La station 'Bastille' doit son nom à la célèbre place éponyme, aménagée sur les ruines de l'ancienne forteresse militaire de la Bastille (ou Bastille Saint-Antoine). Construite à la fin du XIVe siècle sous le règne de Charles V pour défendre l'est de Paris, elle devint par la suite une prison d'État sous l'impulsion du Cardinal de Richelieu, symbolisant l'arbitraire royal. Sa prise d'assaut le 14 juillet 1789 par les révolutionnaires parisiens marque le début de la Révolution française. La forteresse fut démantelée dès les mois suivants. Anecdote archéologique majeure : lors de la construction de la ligne 5 du métro en 1905, les ingénieurs ont mis au jour les fondations de la muraille de contre-escarpe du fossé de la forteresse. Ces vestiges historiques sont aujourd'hui toujours visibles sur le quai de la ligne 5 en direction de Bobigny. De plus, les quais de la ligne 1 sont richement décorés de fresques en céramique qui dépeignent les moments clés de l'année historique de 1789.", "ambiguite": false, "tags": ["Révolution et République", "Monuments et Lieux Emblématiques"]}, "Bel-Air": {"geographie": {"lignes": ["6"], "commune": "Paris", "code_insee": "75056", "latitude": 48.84142733223358, "longitude": 2.400867131995259}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Le terme Bel-Air désigne un quartier aéré et agréable de l'est parisien, réputé autrefois pour la qualité de son atmosphère.", "description longue": "La station aérienne emprunte son nom au quartier de Bel-Air et à l'avenue éponyme, un toponyme désignant historiquement une zone bénéficiant d'un environnement sain et d'une excellente ventilation naturelle."}, "description courte": "La station tire son nom du quartier de Bel-Air, un ancien hameau champêtre réputé pour la salubrité de son air avant son annexion.", "description longue": "La station Bel-Air, située sur la ligne 6, doit son nom au quartier éponyme du 12e arrondissement de Paris. À l'origine, ce territoire était un plateau agricole situé à l'extérieur du mur des Fermiers généraux, caractérisé par un hameau et des moulins bénéficiant d'un air sain et pur, contrastant avec l'insalubrité de l'époque dans le centre de Paris. Urbanisé après l'annexion de 1860, ce secteur a conservé cette appellation bucolique. Sur le plan technique, la station possède une histoire ferroviaire unique : elle est construite au niveau du sol afin de permettre au métro de croiser l'ancienne ligne de Vincennes (aujourd'hui réhabilitée en Coulée Verte René-Dumont), ce qui explique sa configuration atypique de station de plein air encadrée par des sections souterraines et aériennes sur viaduc.", "ambiguite": false, "tags": ["Anciens Villages et Hameaux", "Topographie et Urbanisme"]}, "Belleville": {"geographie": {"lignes": ["11", "2"], "commune": "Paris", "code_insee": "75056", "latitude": 48.871908975367674, "longitude": 2.376753738418521}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Belleville est un quartier animé et cosmopolite de l'est parisien, autrefois commune indépendante rattachée à Paris lors de l'extension de 1860.", "description longue": "Le nom de la station vient du boulevard et du quartier de Belleville, ancienne commune viticole et maraîchère de la banlieue parisienne, dont le toponyme bucolique signifie littéralement belle ville."}, "description courte": "Le nom évoque la « belle vue » dont bénéficiait ce village perché sur une colline, ancienne commune indépendante annexée à Paris en 1860.", "description longue": "Le nom de Belleville, apparu au XIIe siècle sous la forme « Bella Villa », désigne littéralement un lieu offrant une perspective remarquable sur la capitale. À l'origine, il s'agissait d'un modeste hameau nommé Savies. Devenu un village viticole prisé par les Parisiens pour ses guinguettes et son air pur, Belleville a été une commune autonome jusqu'à son intégration totale dans le 20e arrondissement en 1860. Le quartier est célèbre pour avoir été un haut lieu de la résistance populaire, notamment lors de la Commune de Paris en 1871, dont Belleville fut l'un des derniers bastions insurgés avant la chute de la « Semaine sanglante ». La station, située à la jonction des 10e, 11e, 19e et 20e arrondissements, marque le cœur battant de ce village devenu une mosaïque multiculturelle, conservant encore aujourd'hui une identité ouvrière et artistique forte.", "ambiguite": false, "tags": ["Anciens Villages et Hameaux", "Topographie et Urbanisme"]}, "Bercy": {"geographie": {"lignes": ["14", "6"], "commune": "Paris", "code_insee": "75056", "latitude": 48.84014763512746, "longitude": 2.3791909087742873}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Bercy est un ancien village de vignerons devenu un grand quartier de Paris, connu aujourd'hui pour son ministère de l'Économie et son palais omnisports.", "description longue": "La station est située dans le quartier de Bercy, ancienne commune réputée pour abriter les plus immenses entrepôts de vins d'Europe, rattachée administrativement à la capitale en 1860."}, "description courte": "La station tire son nom du quartier de Bercy, lui-même issu de l'ancien domaine seigneurial et du château de Bercy, situés autrefois dans ce secteur.", "description longue": "Le nom 'Bercy' trouve son origine dans l'ancienne seigneurie de Bercy, dont les terres s'étendaient le long de la Seine. Le domaine est devenu célèbre au XVIIe siècle grâce à la construction d'un somptueux château par l'architecte Louis Le Vau pour Charles Henri de Malon, ministre des finances. Ce domaine abritait une vaste propriété boisée. Avec le développement de l'urbanisation au XIXe siècle, le site s'est transformé en un centre majeur du commerce des vins et spiritueux, les fameux 'entrepôts de Bercy', avant de devenir le quartier moderne que l'on connaît aujourd'hui, marqué par le ministère de l'Économie et le Palais Omnisports. Contrairement à d'autres stations, il n'y a ici aucune ambiguïté étymologique, le nom étant intimement lié à la mémoire topographique et seigneuriale du lieu.", "ambiguite": false, "tags": ["Anciens Villages et Hameaux", "Châteaux et Palais historiques", "Topographie et Urbanisme"]}, "Bibliothèque François Mitterrand": {"geographie": {"lignes": ["14"], "commune": "Paris", "code_insee": "75056", "latitude": 48.830006377536904, "longitude": 2.3764237443204546}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "La Bibliothèque nationale de France, dont ce site porte le nom de l'ancien président de la République François Mitterrand, est la plus grande de France.", "description longue": "Ouverte en 1998, la station porte le nom de la nouvelle Bibliothèque nationale de France voulue par François Mitterrand, et offre un accès direct au cœur de ce pôle culturel majeur."}, "description courte": "La station tire son nom de la Bibliothèque nationale de France, nommée en hommage au président François Mitterrand, grand architecte de ce projet culturel majeur.", "description longue": "Inaugurée en 1998 lors du prolongement de la ligne 14, la station 'Bibliothèque François Mitterrand' doit son appellation à la proximité immédiate du site Tolbiac de la Bibliothèque nationale de France (BnF). Ce site, pièce maîtresse des 'Grands Travaux' du président François Mitterrand, a été conçu par l'architecte Dominique Perrault. La dénomination est caractéristique des stations parisiennes nommées d'après un équipement public phare, lui-même dédié à une figure politique. Le nom composé souligne le lien entre l'institution académique et l'héritage politique du président, transformant le 13e arrondissement en un centre intellectuel. Une anecdote notable concerne le défi architectural du site : les quatre tours en forme de livres ouverts ont nécessité des innovations techniques majeures pour protéger les manuscrits de la lumière directe, façonnant ainsi l'identité visuelle de tout le quartier environnant.", "ambiguite": false, "tags": ["Institutions Civiques et Politiques", "Monuments et Lieux Emblématiques"]}, "Billancourt": {"geographie": {"lignes": ["9"], "commune": "Boulogne-Billancourt", "code_insee": "92012", "latitude": 48.83191997405451, "longitude": 2.237891101038026}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Billancourt est un quartier rattaché à Boulogne en 1860, devenu mondialement célèbre au XXe siècle pour avoir abrité les vastes usines du constructeur Renault.", "description longue": "La station tire son nom de l'avenue de Billancourt et de l'ancienne commune éponyme, intégrée à Boulogne pour former la grande ville industrielle de Boulogne-Billancourt."}, "description courte": "La station tire son nom de l'ancien village de Billancourt, intégré à Boulogne-Billancourt, célèbre pour avoir accueilli les usines Renault au XXe siècle.", "description longue": "Le nom 'Billancourt' provient d'un ancien hameau rattaché à la paroisse de Boulogne sous l'Ancien Régime. Le toponyme remonterait à un domaine gallo-romain appartenant à un certain 'Billus'. Historiquement, ce territoire rural et maraîcher a radicalement changé de visage avec l'industrialisation massive. À partir de 1898, l'installation des usines Renault sur l'île Seguin et les terrains avoisinants a transformé Billancourt en un bastion emblématique de la classe ouvrière française. La station, ouverte en 1934 sur la ligne 9, témoigne de cette mutation industrielle profonde. Une anecdote notable concerne la difficulté historique à distinguer nettement les limites entre Boulogne et Billancourt, ces deux entités n'ayant fusionné officiellement pour former la commune actuelle qu'en 1926.", "ambiguite": false, "tags": ["Anciens Villages et Hameaux", "Topographie et Urbanisme"]}, "Bir-Hakeim": {"geographie": {"lignes": ["6"], "commune": "Paris", "code_insee": "75056", "latitude": 48.85388427726308, "longitude": 2.2892963570634604}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Bir Hakeim est un point d'eau en Libye, devenu célèbre pour la défense héroïque des Forces Françaises Libres en 1942 pendant la Seconde Guerre mondiale.", "description longue": "Initialement nommée Grenelle, la station aérienne fut rebaptisée en 1949 en mémoire de la bataille de Bir Hakeim, où les troupes du général Kœnig s'illustrèrent victorieusement face à l'Afrika Korps."}, "description courte": "La station commémore la bataille de Bir-Hakeim, haut fait d'armes de la France libre en Libye contre l'Afrika Korps en 1942.", "description longue": "Initialement nommée 'Grenelle' lors de l'ouverture de la ligne 6 en 1906, la station est rebaptisée 'Bir-Hakeim' en 1948. Ce nom rend hommage à la bataille éponyme qui s'est déroulée du 26 mai au 11 juin 1942, durant la Seconde Guerre mondiale. Les Forces françaises libres, sous le commandement du général Kœnig, y ont résisté héroïquement face aux troupes de l'Axe, permettant la réorganisation des forces alliées avant la bataille d'El Alamein. Le nom 'Bir-Hakeim' signifie 'puits du sage' en arabe, désignant le site désertique libyen. Anecdote historique : le pont traversant la Seine à proximité, le pont de Bir-Hakeim, porte le même nom, créant une unité mémorielle forte dans ce quartier du 15e arrondissement.", "ambiguite": false, "tags": ["Les victoires et batailles militaires", "Les figures de la Résistance"]}, "Blanche": {"geographie": {"lignes": ["2"], "commune": "Paris", "code_insee": "75056", "latitude": 48.88376635447715, "longitude": 2.3324843754343627}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "La rue Blanche doit son nom aux voitures chargées de plâtre provenant des carrières de Montmartre, qui recouvraient la voie d'une fine poussière blanche.", "description longue": "La station tire son nom de la place et de la rue Blanche, historiquement situées sur l'ancien itinéraire poudreux des plâtriers redescendant lourdement chargés des moulins de la butte."}, "description courte": "La station tire son nom de la place Blanche, nommée ainsi en raison de la poussière crayeuse provenant des carrières de gypse du quartier Montmartre.", "description longue": "La station Blanche, située sur la ligne 2, doit son nom à la place Blanche, qui elle-même tire son appellation de la couleur blanchâtre de la chaussée. Au XVIIIe siècle, cette zone était un centre majeur d'extraction de gypse, une roche calcaire utilisée pour fabriquer le plâtre de Paris. La poussière issue des carrières et du transport du minerai par charrettes recouvrait continuellement le sol, donnant à la place son aspect caractéristique. Cette station est également indissociable de la culture populaire parisienne, étant située au pied de la butte Montmartre et à proximité immédiate du célèbre cabaret du Moulin Rouge, inauguré en 1889, qui a contribué à la renommée mondiale de ce carrefour.", "ambiguite": false, "tags": ["Anciens Villages et Hameaux", "Topographie et Urbanisme", "Monuments et Lieux Emblématiques"]}, "Bobigny - Pablo Picasso": {"geographie": {"lignes": ["5"], "commune": "Bobigny", "code_insee": "93008", "latitude": 48.9063655341063, "longitude": 2.4490271414582585}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": ["XIXe siècle", "XXe siècle"], "details_personne": {"nom": "Pablo Picasso", "annee_naissance": 1881, "annee_deces": 1973, "siecles_vecus": ["XIXe siècle", "XXe siècle"]}, "description courte": "Pablo Picasso (1881-1973) est un génie de la peinture et sculpture espagnole, cofondateur du cubisme et figure majeure de l'art du XXe siècle.", "description longue": "La station, desservant le centre préfectoral de Bobigny, rend un hommage appuyé au grand artiste Pablo Picasso. Son nom a été ajouté à l'ouverture pour célébrer son œuvre colossale."}, "description courte": "La station tire son nom de la commune de Bobigny et de la place Pablo Picasso, rendant hommage au célèbre peintre espagnol du XXe siècle.", "description longue": "Inaugurée en 1985 lors du prolongement de la ligne 5, cette station constitue le terminus nord-est du réseau. Le nom est composé de deux entités distinctes : 'Bobigny', chef-lieu du département de la Seine-Saint-Denis dont l'étymologie remonterait à un domaine gallo-romain nommé 'Balbiniacus', et 'Pablo Picasso', en référence à la place majeure de la ville où se situent la préfecture et l'hôtel de ville. Le choix du nom de l'artiste espagnol, figure centrale de l'art moderne, s'inscrit dans la volonté de la municipalité de doter son centre administratif d'une identité culturelle forte et prestigieuse. Cette station est également un pôle multimodal majeur, connectant le métro au tramway T1.", "ambiguite": false, "tags": ["Arts et Culture", "Topographie et Urbanisme"]}, "Bobigny-Pantin - Raymond Queneau": {"geographie": {"lignes": ["5"], "commune": "Bobigny", "code_insee": "93008", "latitude": 48.89563789793626, "longitude": 2.426277595760804}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Raymond Queneau (1903-1976) est un romancier, poète et dramaturge français, cofondateur du groupe littéraire l'Oulipo et auteur du célèbre Zazie dans le métro.", "description longue": "Située avec précision à la frontière de Bobigny et Pantin, la station honore l'imaginatif Raymond Queneau, écrivain dont l'œuvre populaire a été intimement et durablement liée au métro parisien."}, "description courte": "Station située à la limite des communes de Bobigny et Pantin, rendant hommage à l'écrivain Raymond Queneau, auteur du célèbre roman Zazie dans le métro.", "description longue": "Inaugurée en 1985 sur le prolongement de la ligne 5, la station tire son nom d'une double référence. D'une part, une localisation géographique précise à la frontière des communes de Bobigny et Pantin. D'autre part, une dimension littéraire majeure : le choix de Raymond Queneau (1903-1976) est un clin d'œil savoureux à son œuvre emblématique 'Zazie dans le métro', publiée en 1959. Queneau, membre fondateur de l'Oulipo et habitué des jeux de langage, est ainsi immortalisé là où le métro franchit la limite départementale. Cette dénomination souligne l'ancrage de la ligne dans la culture populaire et lettrée, transformant une infrastructure de transport en un lieu de mémoire littéraire.", "ambiguite": false, "tags": ["Écrivains et Philosophes", "Topographie et Urbanisme"]}, "Boissière": {"geographie": {"lignes": ["6"], "commune": "Paris", "code_insee": "75056", "latitude": 48.8668483434173, "longitude": 2.2900328376074373}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "La rue Boissière tire son nom d'une ancienne coutume où l'on accrochait la croix de buis (la boissière) les jours des Rameaux.", "description longue": "La station doit son nom à la rue Boissière qu'elle croise, une voie rappelant le terme ancien boissière, désignant le buis béni utilisé abondamment lors des cérémonies religieuses traditionnelles."}, "description courte": "La station tire son nom de la rue Boissière, ancienne voie du village de Chaillot, elle-même nommée d'après un lieu-dit historique, la « Boissière ».", "description longue": "La station Boissière, située sur la ligne 6, tire son nom de la rue éponyme. Historiquement, le secteur faisait partie de l'ancien village de Chaillot, annexé à Paris lors de l'extension de la ville au XIXe siècle. Le toponyme « Boissière » désigne un lieu planté de buis (bois sacré ou forêt de buis). Bien que le nom semble simple, il témoigne de la transformation radicale de ce quartier aristocratique du 16e arrondissement, qui était autrefois un territoire rural couvert de bosquets avant de devenir une zone de villégiature pour la haute bourgeoisie et la noblesse, puis un quartier résidentiel prestigieux. Contrairement à d'autres stations aux noms de personnages illustres, Boissière conserve la mémoire topographique et végétale du terroir original du village de Chaillot.", "ambiguite": false, "tags": ["Anciens Villages et Hameaux", "Topographie et Urbanisme"]}, "Bolivar": {"geographie": {"lignes": ["7B"], "commune": "Paris", "code_insee": "75056", "latitude": 48.880789805531926, "longitude": 2.374152140698752}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Simón Bolívar (1783-1830) est un général et homme politique sud-américain, héros emblématique de l'indépendance de plusieurs pays d'Amérique du Sud face à l'Espagne.", "description longue": "La station est située sous la longue avenue Simon-Bolivar, qui rend un hommage vibrant au El Libertador, acteur principal et incontournable de l'émancipation des anciennes colonies espagnoles d'Amérique."}, "description courte": "La station tire son nom de l'avenue Simon-Bolivar, rendant hommage au célèbre général et homme d'État vénézuélien, libérateur de plusieurs pays d'Amérique latine.", "description longue": "Située dans le 19e arrondissement de Paris, la station Bolivar doit son nom à l'avenue éponyme, dénommée ainsi en 1893 en l'honneur de Simón Bolívar (1783-1830). Surnommé « El Libertador », ce chef militaire et politique vénézuélien a joué un rôle déterminant dans l'indépendance de plusieurs pays sud-américains face à la domination espagnole. Anecdote historique : la station est tristement célèbre pour avoir servi d'abri antiaérien durant la Première Guerre mondiale. Le 11 mars 1918, une bousculade mortelle se produisit à son entrée alors que la population tentait d'y trouver refuge lors d'un raid aérien allemand, un événement qui influença durablement les règles de sécurité du métro parisien.", "ambiguite": false, "tags": ["Géographie et International", "Institutions Civiques et Politiques"]}, "Bonne Nouvelle": {"geographie": {"lignes": ["8", "9"], "commune": "Paris", "code_insee": "75056", "latitude": 48.87048144580479, "longitude": 2.348496122542364}, "histoire": {"type_origine": null, "s

<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Les Arcanes du Métro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amarante&family=Archivo:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* ===================================================================
   METROPOLITAIN — identité Guimard / Art Nouveau
   =================================================================== */

/* Parisine auto-hébergée : déposez vos fichiers dans un dossier /fonts
   à côté de ce fichier, sous ces noms exacts. En leur absence, le
   navigateur bascule automatiquement sur Archivo (aucune erreur). */
@font-face {
    font-family: 'Parisine';
    src: url('fonts/Parisine-Regular.woff2') format('woff2');
    font-weight: 400;
    font-style: normal;
    font-display: swap;
}

@font-face {
    font-family: 'Parisine';
    src: url('fonts/Parisine-Bold.woff2') format('woff2');
    font-weight: 700;
    font-style: normal;
    font-display: swap;
}

:root {
    --vert-guimard: #133a2d;
    --vert-fonce: #071e18;
    --bronze-patine: #6f8f78;
    --ambre: #d68a2e;
    --ambre-clair: #f0bd6c;
    --ambre-verriere: #c97b1f;
    --ivoire: #f3ede0;
    --ivoire-ombre: #e6ddc9;
    --encre: #1a1a1a;
    --rouille: #b5451b;
    --vert-succes: #4c7a5e;

    --display: 'Amarante', serif;
    --corps: 'Parisine', 'Archivo', sans-serif;
    --mono: 'IBM Plex Mono', monospace;
}

* {
    box-sizing: border-box;
}

html,
body {
    height: 100%;
    margin: 0;
    padding: 0;
    background: var(--vert-fonce);
    color: var(--encre);
    font-family: var(--corps);
}

body {
    position: relative;
    display: flex;
    justify-content: center;
    overflow: hidden;
}

/* toile de fond : dégradé profond + halo + motifs de ferronnerie en écho */
.metro-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    background:
        radial-gradient(ellipse 900px 500px at 50% -10%, rgba(214, 138, 46, 0.14), transparent 60%),
        linear-gradient(180deg, var(--vert-fonce) 0%, #0a2a20 45%, #081f19 100%);
    overflow: hidden;
}

.container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 900px;
    height: 100dvh;
    display: flex;
    flex-direction: column;
}

/* ---------- en-tête : plaque ovale façon panneau de station ---------- */
.metro-header {
    position: relative;
    flex-shrink: 0;
    background: var(--vert-guimard);
    color: var(--ivoire);
    padding: 26px 32px 20px;
    text-align: center;
}

.metro-header__frieze {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 22px;
    color: var(--ambre-clair);
    opacity: 0.55;
}

.metro-header__title-wrap {
    position: relative;
    margin: 14px auto 4px;
    padding: 20px 10px;
    max-width: 560px;
}

.metro-header__cartouche {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: clamp(300px, 82%, 480px);
    aspect-ratio: 380 / 110;
    height: auto;
    color: var(--ambre-clair);
    opacity: 0.85;
}

.metro-header h1,
.metro-header__subtitle {
    position: relative;
}

.metro-header h1 {
    font-family: var(--display);
    font-weight: 400;
    font-size: clamp(1.6rem, 4.6vw, 2.3rem);
    letter-spacing: 0.02em;
    margin: 0;
}

.metro-header__subtitle {
    font-size: 0.9rem;
    color: var(--ivoire-ombre);
    opacity: 0.85;
    margin: 0 0 10px;
}

.metro-header__bracket {
    display: block;
    width: min(70%, 320px);
    height: auto;
    margin: 0 auto;
    color: var(--ambre-clair);
    opacity: 0.8;
}

/* ---------- corps principal ---------- */
main {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    background: var(--ivoire);
    padding: 28px 30px 24px;
    box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.3);
    overflow-y: auto;
}

#ecran-categories,
#ecran-sessions {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    text-align: center;
}

#ecran-jeu {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
}

.hidden {
    display: none !important;
}

.screen-lead {
    text-align: center;
    color: var(--vert-guimard);
    font-size: 1rem;
    margin-bottom: 22px;
}

#titre-categorie {
    font-family: var(--display);
    font-weight: 400;
    color: var(--vert-guimard);
    font-size: 1.5rem;
    margin: 0 0 6px;
}

/* ---------- grilles de boutons (catégories / sessions) ---------- */
.grille-boutons {
    display: flex;
    flex-direction: column;
    gap: 12px;
    max-width: 420px;
    margin: 0 auto;
    width: 100%;
}

.grille-boutons button {
    font-family: var(--corps);
    font-weight: 700;
    font-size: 0.98rem;
    color: var(--vert-fonce);
    background: linear-gradient(180deg, var(--ambre-clair), var(--ambre));
    border: none;
    padding: 14px 22px;
    border-radius: 999px;
    cursor: pointer;
    box-shadow:
        0 4px 0 var(--ambre-verriere),
        0 8px 16px rgba(19, 58, 45, 0.25),
        0 0 0 3px rgba(19, 58, 45, 0.08) inset;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
}

.grille-boutons button:hover {
    transform: translateY(-2px);
    box-shadow:
        0 6px 0 var(--ambre-verriere),
        0 12px 20px rgba(19, 58, 45, 0.3),
        0 0 0 3px rgba(19, 58, 45, 0.08) inset;
}

.grille-boutons button:active {
    transform: translateY(1px);
    box-shadow: 0 2px 0 var(--ambre-verriere), 0 4px 8px rgba(19, 58, 45, 0.25);
}

/* ---------- boutons de retour / sortie ---------- */
.bouton-menu {
    font-family: var(--corps);
    font-weight: 700;
    font-size: 0.9rem;
    border-radius: 3px;
    padding: 10px 18px;
    cursor: pointer;
    transition: transform 0.12s ease, background 0.15s ease;
}

.bouton-menu:active {
    transform: translateY(1px);
}

.bouton-retour {
    align-self: center;
    margin-top: 22px;
    background: transparent;
    color: var(--rouille);
    border: 2px solid var(--rouille);
}

.bouton-retour:hover {
    background: rgba(181, 69, 27, 0.06);
}

/* ---------- écran de jeu ---------- */
.game-topbar {
    flex-shrink: 0;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    border-bottom: 2px solid var(--vert-guimard);
    padding-bottom: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 6px;
}

#titre-session-en-cours {
    font-family: var(--display);
    font-weight: 400;
    color: var(--vert-guimard);
    font-size: 1.5rem;
    margin: 0;
}

#progress-text {
    font-family: var(--mono);
    font-size: 0.85rem;
    color: var(--rouille);
    margin: 0;
    letter-spacing: 0.03em;
}

/* ---------- disposition à deux colonnes : jeu + panneau documentaire ---------- */
.jeu-layout {
    flex: 1;
    min-height: 0;
    display: flex;
    gap: 26px;
    align-items: flex-start;
    flex-wrap: wrap;
    overflow: visible;
}

.jeu-interaction {
    flex: 1 1 320px;
    min-width: 280px;
    display: flex;
    flex-direction: column;
    min-height: 0;
}

/* ---------- champ de saisie encadré ---------- */
.input-row {
    flex-shrink: 0;
    display: flex;
    gap: 10px;
    margin-bottom: 8px;
}

.ornate-frame {
    position: relative;
    flex: 1;
    padding: 6px;
}

.ornate-frame .corner {
    position: absolute;
    width: 22px;
    height: 22px;
    color: var(--vert-guimard);
    opacity: 0.8;
}

.corner--tl {
    top: -2px;
    left: -2px;
}

.corner--br {
    bottom: -2px;
    right: -2px;
    transform: rotate(180deg);
}

#champ-saisie {
    width: 100%;
    font-family: var(--corps);
    font-size: 1rem;
    color: var(--encre);
    background: #fff;
    border: 2px solid var(--vert-guimard);
    border-radius: 3px;
    padding: 12px 16px;
    outline: none;
    transition: box-shadow 0.15s ease;
}

#champ-saisie:focus {
    box-shadow: 0 0 0 3px rgba(201, 123, 31, 0.4);
    border-color: var(--ambre-verriere);
}

/* ---------- boutons ---------- */
button {
    font-family: var(--corps);
    font-weight: 700;
    font-size: 0.95rem;
    border: none;
    border-radius: 3px;
    padding: 12px 22px;
    cursor: pointer;
    transition: transform 0.12s ease, filter 0.15s ease;
}

#bouton-valider {
    flex-shrink: 0;
    background: var(--vert-guimard);
    color: var(--ivoire);
}

#bouton-valider:hover {
    filter: brightness(1.15);
}

.button-row {
    flex-shrink: 0;
    display: flex;
    gap: 10px;
    margin: 14px 0;
}

button.secondary {
    flex: 1;
    background: transparent;
    color: var(--vert-guimard);
    border: 2px solid var(--vert-guimard);
}

button.secondary:hover {
    background: rgba(19, 58, 45, 0.06);
}

button.secondary:disabled {
    color: var(--ivoire-ombre);
    border-color: var(--ivoire-ombre);
    cursor: not-allowed;
}

button:active {
    transform: translateY(1px);
}

.quit-btn {
    align-self: center;
    margin-top: auto;
    font-size: 0.85rem;
    padding: 8px 16px;
}

/* ---------- messages de retour ---------- */
.feedback {
    flex-shrink: 0;
    text-align: center;
    font-family: var(--mono);
    font-weight: 600;
    font-size: 0.9rem;
    min-height: 1.2em;
    margin: 0 0 10px;
    color: var(--rouille);
}

.feedback.success {
    color: var(--vert-succes);
}

.feedback.error {
    color: var(--rouille);
}

/* ---------- Zone des stations validées ---------- */
#zone-stations-validees {
    max-height: 150px; /* Force l'apparition de la barre de défilement au-delà de cette hauteur */
    overflow-y: auto;
    overflow-x: hidden;
    padding-right: 10px;
    margin-bottom: 12px;
    -webkit-overflow-scrolling: touch; /* Pour un défilement fluide sur mobile */
}

/* Apparence des noms de stations validées ajoutés par le JS (si structurés en p ou span) */
#zone-stations-validees p, 
#zone-stations-validees span,
#zone-stations-validees div {
    font-family: var(--corps);
    font-weight: 600;
    font-size: 0.9rem;
    color: var(--vert-guimard);
    background: rgba(19, 58, 45, 0.06);
    border-radius: 4px;
    padding: 6px 12px;
    margin-bottom: 6px;
}

/* ---------- zone d'indice ---------- */
#zone-indices {
    flex-shrink: 0;
    position: relative;
    background: #fff;
    border: 1px solid var(--ivoire-ombre);
    border-left: 4px solid var(--vert-guimard);
    border-radius: 3px;
    padding: 14px 40px 14px 18px;
    margin-bottom: 4px;
    background-image:
        url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 60 60'><path d='M2 58 C 2 30, 6 14, 22 8 C 34 3.5, 44 8, 48 18 C 51 25, 48 31, 41 31 C 36 31, 34 27, 36 23' fill='none' stroke='%23133a2d' stroke-width='3' stroke-linecap='round'/><circle cx='36' cy='23' r='3' fill='%23133a2d'/></svg>");
    background-repeat: no-repeat;
    background-position: right -6px bottom -6px;
    background-size: 30px 30px;
}

#texte-indice {
    margin: 0;
    font-size: 0.95rem;
    line-height: 1.4;
    color: var(--encre);
    min-height: 1.3em;
}

/* ---------- panneau documentaire ---------- */
#panneau-informations {
    flex: 1 1 260px;
    min-width: 240px;
    align-self: stretch;
    overflow-y: auto;
    background: #fff;
    border: 1px solid var(--ivoire-ombre);
    border-left: 4px solid var(--ambre-verriere);
    border-radius: 3px;
    padding: 16px 20px;
    font-size: 0.9rem;
    line-height: 1.5;
    color: var(--encre);
}

#panneau-informations:empty {
    display: none;
}

#panneau-informations h3 {
    font-family: var(--display);
    font-weight: 400;
    color: var(--vert-guimard);
    font-size: 1.1rem;
    margin: 0 0 8px;
}

#panneau-informations img {
    max-width: 100%;
    border-radius: 3px;
    margin: 8px 0;
}

/* ---------- responsive ---------- */
@media (max-width: 680px) {
    .jeu-layout {
        flex-direction: column;
        overflow-y: auto;
    }

    #panneau-informations {
        max-height: 240px;
    }
}

@media (max-width: 480px) {
    .metro-header {
        padding: 20px 20px 20px;
    }

    .metro-header h1 {
        font-size: 1.5rem;
    }

    main {
        padding: 20px 18px 18px;
    }

    .input-row {
        flex-direction: column;
    }
}

/* ---------- accessibilité ---------- */
:focus-visible {
    outline: 3px solid var(--ambre-verriere);
    outline-offset: 2px;
}

@media (prefers-reduced-motion: reduce) {

    * {
        transition: none !important;
    }
}
    </style>
</head>

<body>

    <!-- Motifs de ferronnerie Guimard, dessinés une seule fois et réutilisés partout via <use> -->
    <svg width="0" height="0" style="position:absolute" aria-hidden="true">
        <defs>
            <symbol id="guimard-corner" viewBox="0 0 60 60">
                <path d="M2 58 C 2 30, 6 14, 22 8 C 34 3.5, 44 8, 48 18 C 51 25, 48 31, 41 31 C 36 31, 34 27, 36 23"
                    fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" />
                <circle cx="36" cy="23" r="2.6" fill="currentColor" />
            </symbol>

            <!-- plaque ovale façon "ABBESSES" / "METROPOLITAIN", avec volutes aux pointes et fleuron sommital -->
            <symbol id="guimard-cartouche" viewBox="0 0 380 110">
                <path d="M40 55 C 40 25, 80 12, 130 12 L 250 12 C 300 12, 340 25, 340 55 C 340 85, 300 98, 250 98 L 130 98 C 80 98, 40 85, 40 55 Z"
                    fill="none" stroke="currentColor" stroke-width="3" />
                <path d="M54 55 C 54 33, 88 23, 130 23 L 250 23 C 292 23, 326 33, 326 55 C 326 77, 292 87, 250 87 L 130 87 C 88 87, 54 77, 54 55 Z"
                    fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.6" />
                <path d="M40 55 C 25 50, 12 52, 8 42 C 6 36, 12 30, 18 33 C 22 35, 21 40, 17 41" fill="none"
                    stroke="currentColor" stroke-width="2.2" stroke-linecap="round" />
                <path d="M340 55 C 355 50, 368 52, 372 42 C 374 36, 368 30, 362 33 C 358 35, 359 40, 363 41" fill="none"
                    stroke="currentColor" stroke-width="2.2" stroke-linecap="round" />
                <path d="M190 12 L190 2 M182 6 C 182 2, 198 2, 198 6" fill="none" stroke="currentColor"
                    stroke-width="1.8" stroke-linecap="round" />
                <circle cx="190" cy="2" r="2.2" fill="currentColor" />
                <circle cx="66" cy="55" r="2" fill="currentColor" opacity="0.8" />
                <circle cx="314" cy="55" r="2" fill="currentColor" opacity="0.8" />
            </symbol>

            <!-- console en fonte : arc en accolade perforé + écusson central à cornes et cœur, façon balustrade d'édicule -->
            <symbol id="guimard-bracket" viewBox="0 0 600 170">
                <path d="M40 150 C 120 60, 220 20, 300 20 C 380 20, 480 60, 560 150" fill="none"
                    stroke="currentColor" stroke-width="3.5" stroke-linecap="round" />
                <path d="M55 145 C 130 75, 225 38, 300 38 C 375 38, 470 75, 545 145" fill="none"
                    stroke="currentColor" stroke-width="1.4" opacity="0.7" />
                <path d="M40 150 C 25 140, 20 125, 30 115 C 38 108, 50 112, 50 122" fill="none"
                    stroke="currentColor" stroke-width="2.4" stroke-linecap="round" />
                <path d="M560 150 C 575 140, 580 125, 570 115 C 562 108, 550 112, 550 122" fill="none"
                    stroke="currentColor" stroke-width="2.4" stroke-linecap="round" />
                <!-- rang de perforations le long de l'arc principal, comme la fonte ajourée des balustrades -->
                <g fill="none" stroke="currentColor" stroke-width="1.3" opacity="0.8">
                    <circle cx="95.3" cy="97.8" r="3.4" />
                    <circle cx="143.0" cy="65.4" r="3.4" />
                    <circle cx="191.6" cy="41.9" r="3.4" />
                    <circle cx="239.5" cy="27.1" r="3.4" />
                    <circle cx="504.7" cy="97.8" r="3.4" />
                    <circle cx="457.0" cy="65.4" r="3.4" />
                    <circle cx="408.4" cy="41.9" r="3.4" />
                    <circle cx="360.5" cy="27.1" r="3.4" />
                </g>
                <!-- écusson central : amande, cœur et cornes en volute -->
                <path d="M300 18 C 322 18, 338 34, 338 55 C 338 78, 320 95, 300 108 C 280 95, 262 78, 262 55 C 262 34, 278 18, 300 18 Z"
                    fill="none" stroke="currentColor" stroke-width="2.6" />
                <path d="M300 108 C 292 98, 280 92, 280 82 C 280 75, 288 72, 294 78 C 297 81, 300 85, 300 88 C 300 85, 303 81, 306 78 C 312 72, 320 75, 320 82 C 320 92, 308 98, 300 108 Z"
                    fill="none" stroke="currentColor" stroke-width="1.6" opacity="0.85" />
                <circle cx="300" cy="45" r="7" fill="none" stroke="currentColor" stroke-width="1.6" />
                <path d="M282 22 C 265 12, 250 14, 248 26 C 247 34, 255 38, 260 32" fill="none"
                    stroke="currentColor" stroke-width="1.7" stroke-linecap="round" />
                <path d="M318 22 C 335 12, 350 14, 352 26 C 353 34, 345 38, 340 32" fill="none"
                    stroke="currentColor" stroke-width="1.7" stroke-linecap="round" />
                <circle cx="249" cy="25" r="2.4" fill="currentColor" opacity="0.85" />
                <circle cx="351" cy="25" r="2.4" fill="currentColor" opacity="0.85" />
            </symbol>

            <!-- tige et double volute, façon motifs sur les verrières ambrées -->
            <symbol id="guimard-reed" viewBox="0 0 40 50">
                <path d="M20 50 L20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                <path d="M20 20 C 10 20, 3 14, 5 6 C 6 2, 12 0, 15 4 C 17 7, 15 11, 12 12" fill="none"
                    stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                <path d="M20 20 C 30 20, 37 14, 35 6 C 34 2, 28 0, 25 4 C 23 7, 25 11, 28 12" fill="none"
                    stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                <circle cx="20" cy="5" r="2.4" fill="currentColor" />
                <circle cx="20" cy="40" r="1.6" fill="none" stroke="currentColor" stroke-width="1.2" />
            </symbol>
            <pattern id="guimard-frieze" width="46" height="50" patternUnits="userSpaceOnUse">
                <use href="#guimard-reed" x="3" width="40" height="50" />
            </pattern>
        </defs>
    </svg>

    <div class="metro-bg" aria-hidden="true"></div>

    <div class="container">
        <header class="metro-header">
            <svg class="metro-header__frieze" viewBox="0 0 700 46" preserveAspectRatio="none">
                <rect width="700" height="46" fill="url(#guimard-frieze)" />
            </svg>
            <div class="metro-header__title-wrap">
                <svg class="metro-header__cartouche" viewBox="0 0 380 110" preserveAspectRatio="none">
                    <use href="#guimard-cartouche" />
                </svg>
                <h1>Les Arcanes du Métro</h1>
            </div>
            <p class="metro-header__subtitle">Retrouvez le nom de chaque station à l'aide des indices</p>
            <svg class="metro-header__bracket" viewBox="0 0 600 170" preserveAspectRatio="xMidYMid meet">
                <use href="#guimard-bracket" />
            </svg>
        </header>

        <main>
            <!-- Étape 1 : Sélection de la catégorie principale -->
            <div id="ecran-categories">
                <p class="screen-lead">Sélectionnez une catégorie :</p>
                <div id="conteneur-categories" class="grille-boutons">
                    <!-- Les boutons de catégories seront injectés ici par JavaScript -->
                </div>
            </div>

            <!-- Étape 2 : Sélection de la session spécifique -->
            <div id="ecran-sessions" class="hidden">
                <h2 id="titre-categorie"></h2>
                <p class="screen-lead">Choisissez votre parcours :</p>
                <div id="conteneur-sessions" class="grille-boutons">
                    <!-- Les boutons de sessions seront injectés ici -->
                </div>
                <button id="bouton-retour-categories" class="bouton-menu bouton-retour">Retour aux catégories</button>
            </div>

            <!-- Étape 3 : Écran de jeu -->
            <div id="ecran-jeu" class="hidden">
                <div class="game-topbar">
                    <h2 id="titre-session-en-cours"></h2>
                    <p id="progress-text">Progression : <span id="compteur-stations">0</span> / <span
                            id="total-stations">0</span></p>
                </div>

                <div class="jeu-layout">

                    <!-- Espace d'interaction -->
                    <section class="jeu-interaction">
                        <div class="input-row">
                            <div class="ornate-frame">
                                <svg class="corner corner--tl"><use href="#guimard-corner" /></svg>
                                <svg class="corner corner--br"><use href="#guimard-corner" /></svg>
                                <input type="text" id="champ-saisie" placeholder="Nom de la station..."
                                    autocomplete="off">
                            </div>
                            <button id="bouton-valider">Valider</button>
                        </div>

                        <!-- Zone de notification pour les erreurs -->
                        <p id="message-retour" class="feedback"></p>

                        <!-- Zone d'affichage des stations trouvées avec défilement -->
                        <div id="zone-stations-validees"></div>

                        <div id="zone-indices">
                            <p id="texte-indice"></p>

n nom de sa situation géographique stratégique à proximité immédiate du grand pont permettant la traversée de la Seine vers Saint-Cloud."}, "tags": ["Topographie et Urbanisme"]}, "Bourse": {"geographie": {"lignes": ["3"], "commune": "Paris", "code_insee": "75056", "latitude": 48.868792843933164, "longitude": 2.3406785469758815}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Le palais de la Bourse, également appelé palais Brongniart, est le bâtiment historique abritant autrefois le siège de la Bourse des valeurs de Paris.", "description longue": "La station doit son nom à sa proximité directe avec la place de la Bourse et le majestueux palais Brongniart, centre historique battant des activités financières de la capitale."}, "tags": ["L'ingénierie et l'industrie", "Monuments et Lieux Emblématiques"]}, "Brochant": {"geographie": {"lignes": ["13"], "commune": "Paris", "code_insee": "75056", "latitude": 48.89062201554889, "longitude": 2.3201902468999456}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "André-Jean-François-Marie Brochant de Villiers (1772-1840) est un géologue et minéralogiste français. Il dirigea la première grande carte géologique de la France.", "description longue": "La station prend le nom de la rue Brochant, honorant l'académicien et illustre professeur à l'École des mines qui sut remarquablement moderniser l'enseignement de la minéralogie en France."}, "tags": ["Sciences, Médecine et Techniques"]}, "Bréguet-Sabin": {"geographie": {"lignes": ["5"], "commune": "Paris", "code_insee": "75056", "latitude": 48.8562178110506, "longitude": 2.3703346849773035}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Antoine-Louis Bréguet fut un grand horloger. Charles-Pierre de Saint-Sabin fut échevin de Paris. Leurs noms sont associ iste et médecin, premier directeur du Muséum national d'histoire naturelle.", "description longue": "La station croise la rue Daubenton, honorant le brillant collaborateur de Buffon, et la rue Censier, dont le toponyme dérive probablement d'anciennes parcelles paysannes soumises au paiement du cens."}, "tags": []}, "Champs-Élysées - Clemenceau": {"geographie": {"lignes": ["1", "13"], "commune": "Paris", "code_insee": "75056", "latitude": 48.86737454799625, "longitude": 2.3139501860093175}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Georges Clemenceau (1841-1929) est un homme d'État français, dit Le Tigre, artisan principal de la victoire de la France lors de la Première Guerre mondiale.", "description longue": "La station unit la plus belle avenue du monde, les Champs-Élysées, à la place Clemenceau, qui honore solennellement la poigne du chef du gouvernement de la Victoire en 1918."}, "tags": []}, "Chardon Lagache": {"geographie": {"lignes": ["10"], "commune": "Paris", "code_insee": "75056", "latitude": 48.84508829917885, "longitude": 2.26690547594029}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Pierre Chardon et son épouse, née Lagache, sont de riches bienfaiteurs ayant financé la création d'une maison de retraite pour les personnes âgées modestes.", "description longue": "La station emprunte son nom à la rue Chardon-Lagache, qui rend un juste hommage au couple de philanthropes parisiens fondateurs de la grande institution de retraite voisine en 1865."}, "tags": []}, "Charenton - Écoles": {"geographie": {"lignes": ["8"], "commune": "Charenton-le-Pont", "code_insee": "94018", "latitude": 48.82148073316996, "longitude": 2.413844709558796}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Charenton est une commune de la petite couronne. Le terme Écoles fait référence au groupe scolaire Aristide-Briand situé près de la station.", "description longue": "La station dessert le centre-ville animé de Charenton-le-Pont. L'ajout du mot Écoles permettait à l'origine de distinguer l'emplacement par la présence historique d'un important établissement d'enseignement sur la place."}, "tags": []}, "Charles Michels": {"geographie": {"lignes": ["10"], "commune": "Paris", "code_insee": "75056", "latitude": 48.84660453239739, "longitude": 2.2856210133667174}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": ["XXe siècle"], "details_personne": {"nom": "Charles Michels", "annee_naissance": 1903, "annee_deces": 1941, "siecles_vecus": ["XXe siècle"]}, "description courte": "Charles Michels (1903-1941) est un député communiste français et figure de la Résistance, fusillé comme otage par les nazis à Châteaubriant durant l'Occupation.", "description longue": "Anciennement nommée Beaugrenelle, la station a été dignement rebaptisée après-guerre pour honorer la mémoire de Charles Michels, élu dévoué du 15e arrondissement et courageux martyr de la Résistance française."}, "tags": ["Histoire et Politique", "Les figures de la Résistance"]}, "Charles de Gaulle - Étoile": {"geographie": {"lignes": ["1", "2", "6"], "commune": "Paris", "code_insee": "75056", "latitude": 48.875175151927344, "longitude": 2.295932042102862}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Charles de Gaulle (1890-1970) est un général, chef de la Résistance durant la guerre, et le fondateur historique de la Cinquième République française.", "description longue": "Située exactement sous l'Arc de Triomphe, la station ajoute au nom originel de la place de l'Étoile celui du général de Gaulle pour célébrer l'illustre homme d'État français."}, "tags": []}, "Charonne": {"geographie": {"lignes": ["9"], "commune": "Paris", "code_insee": "75056", "latitude tion courte": "La rue du Commerce était la principale artère commerçante de l'ancienne commune de Grenelle avant son annexion à Paris au XIXe siècle.", "description longue": "La station doit son nom à son implantation directe sous la rue du Commerce. Sa construction architecturale a nécessité des quais décalés car la rue originelle était bien trop étroite pour les placer face à face."}, "tags": []}, "Concorde": {"geographie": {"lignes": ["1", "12", "8"], "commune": "Paris", "code_insee": "75056", "latitude": 48.866166958916516, "longitude": 2.324585310879803}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "La place de la Concorde est la plus grande place de Paris. Son nom symbolise la réconciliation des Français après les violences de la Révolution.", "description longue": "La station est implantée sous la prestigieuse place de la Concorde, lieu d'érection de la redoutable guillotine pendant la Terreur, et judicieusement rebaptisée sous le Directoire pour marquer l'apaisement national tant attendu."}, "tags": ["Histoire et Politique", "Révolution et République"]}, "Convention": {"geographie": {"lignes": ["12"], "commune": "Paris", "code_insee": "75056", "latitude": 48.83713505380496, "longitude": 2.2963913864809173}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "La Convention nationale est l'assemblée constituante qui gouverna la France de 1792 à 1795, marquant la fondation de la Première République.", "description longue": "La station fait référence à la vibrante rue de la Convention qu'elle dessert. Cette longue artère urbaine rend un fier hommage à la grande assemblée fondatrice de la Révolution française."}, "tags": ["Histoire et Politique", "Révolution et République"]}, "Corentin Cariou": {"geographie": {"lignes": ["7"], "commune": "Paris", "code_insee": "75056", "latitude": 48.89467266005628, "longitude"  autrefois au vieux domaine seigneurial limitrophe de Vanves."}, "tags": []}, "Malakoff - Rue Étienne Dolet": {"geographie": {"lignes": ["13"], "commune": "Malakoff", "code_insee": "92046", "latitude": 48.815265523780766, "longitude": 2.296972463702674}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Étienne Dolet (1509-1546) fut un grand imprimeur, écrivain et intellectuel humaniste français, brûlé vif pour hérésie sur la place Maubert, devenu immense martyr de la libre-pensée.", "description longue": "Cette curieuse station aérienne située à Malakoff rend un puissant hommage au grand érudit de la Renaissance à travers le nom de l'importante artère municipale qu'elle surplombe."}, "tags": ["Arts et Culture", "Peintres, Sculpteurs et Poètes"]}, "Malesherbes": {"geographie": {"lignes": ["3"], "commune": "Paris", "code_insee": "75056", "latitude": 48.88284002257779, "longitude": 2.309487846960011}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Chrétien Guillaume de Lamoignon de Malesherbes (1721-1794) fut un homme d'État et avocat courageux, célèbre pour avoir héroïquement défendu le roi Louis XVI lors de son procès.", "description longue": "La station est située sous le très chic boulevard Malesherbes, baptisé à l'époque pour honorer l'immense bravoure et la noble droiture de ce magistrat injustement guillotiné sous la Terreur."}, "tags": []}, "Maraîchers": {"geographie": {"lignes": ["9"], "commune": "Paris", "code_insee": "75056", "latitude": 48.85273102047999, "longitude": 2.406038544798052}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Le nom rappelle fièrement que le quartier de Charonne était historiquement couvert de très vastes cultures potagères fournissant des fruits et légumes frais à Paris.", "description longue": "La station prend le nom de la rue des Maraîchers, évoquant très symboliquement l'abondante activité agricole de ces cultivateurs parisiens, extrêmement réputés et nombreux au XIXe siècle."}, "tags": []}, "Marcadet - Poissonniers": {"geographie": {"lignes": ["12", "4"], "commune": "Paris", "code_insee": "75056", "latitude": 48.89154760285429, "longitude": 2.3500246218070155}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Marcadet dérive d'un très ancien marché. Poissonniers rappelle le vieux et long chemin emprunté par les marchands de marée pour apporter le poisson depuis la lointaine côte atlantique.", "description longue": "La station réunit la très vieille rue Marcadet et la rue des Poissonniers, d'anciens chemins historiques qui servaient au transit journalier et massif des précieuses marchandises vers la capitale."}, "tags": []}, "Marcel Sembat": {"geographie": {"lignes": ["9"], "commune": "Boulogne-Billancourt", "code_insee": "92012", "latitude": 48.83380810724753, "longitude": 2.24346821405889}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Marcel Sembat (1862-1922) fut un éminent journaliste, très populaire député socialiste de Montmartre et ministre des Travaux publics, grand ami proche et fidèle de Jean Jaurès.", "description longue": "La station est située sur la vaste place Marcel-Sembat à Boulogne-Billancourt, nommée ainsi pour honorer l'éloquent et courageux homme politique et ardent défenseur de la paix de la SFIO."}, "tags": []}, "Marx Dormoy": {"geographie": {"lignes": ["12"], "commune": "Paris", "code_insee": "75056", "latitude": 48.89060729278663, "longitude": 2.359945883178033}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": ["XIXe siècle", "XXe siècle"], "details_personne": {"nom": "Marx Dormoy", "annee_naissance": 1888, "annee_deces": 1941, "siecles_vecus": ["XIXe siècle", "XXe siècle"]}, "description courte": "Marx Dormoy (1888-1941) fut un ministre de l'Intérieur du gouvernement de Front Populaire et un farouche opposant à l'extrême droite, assassiné lâchement par la Cagoule sous l'Occupation.", "description longue": "L'ancienne station Torcy fut solennellement rebaptisée avec la rue du même nom pour honorer la mémoire de ce courageux ministre socialiste et martyr de la Résistance française."}, "tags": ["Histoire et Politique", "Les figures de la Résistance"]}, "Maubert - Mutualité": {"geographie": {"lignes": ["10"], "commune": "Paris", "code_insee": "75056", "latitude": 48.85019546606951, "longitude": 2.3482804131694897}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Jean Aubert, ou le célèbre maître Albert, donna son nom à la place Maubert. La Mutualité désigne le grand palais des congrès situé à proximité.", "description longue": "La station associe le nom de la très ancienne place d'exécution médiévale Maubert à la Maison de la Mutualité, haut lieu contemporain des grands rassemblements politiques parisiens."}, "tags": []}, "Michel Bizot": {"geographie": {"lignes": ["8"], "commune": "Paris", "code_insee": "75056", "latitude": 48.837000553950986, "longitude": 2.40228042706469}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Michel Bizot (1795-1855) fut un courageux et intrépide général et ingénieur militaire français, tué héroïquement lors du très long et difficile siège de Sébastopol en Crimée.", "description longue": "La station tire son nom de l'avenue du Général-Michel-Bizot, qui rend un très digne hommage à cet exceptionnel officier supérieur tombé au champ d'honneur pour la patrie française."}, "tags": []}, "Michel-Ange - Auteuil": {"geographie": {"lignes": ["10", "9"], "commune": "Paris", "code_insee": "75056", "latitude": 48.84767825351756, "longitude": 2.2639392129884905}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Michel-Ange (1475-1564) est le mythique et célèbre artiste de la Renaissance italienne. Auteuil était un charmant village huppé et verdoyant, rattaché administrativement à Paris en 1860.", "description longue": "La station réunit symboliquement le nom de la longue rue Michel-Ange, dédiée au génial créateur florentin, et du verdoyant quartier villageois historique de l'ouest de la capitale."}, "tags": ["Anciens Villages et Hameaux", "Arts et Culture", "Peintres, Sculpteurs et Poètes"]}, "Michel-Ange - Molitor": {"geographie": {"lignes": ["10", "9"], "commune": "Paris", "code_insee": "75056", "latitude": 48.84515597018703, "longitude": 2.2618218573220084}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Michel-Ange (1475-1564) est un maître absolu de la Renaissance. Gabriel-Jean-Joseph Molitor (1770-1849) fut un très respecté et brave maréchal de France de la Grande Armée de l'Empire.", "description longue": "La station croise la rue Michel-Ange et la rue Molitor, mariant ainsi très astucieusement le grand sculpteur universel italien et un brillant commandant des invincibles armées napoléoniennes."}, "tags": []}, "Mirabeau": {"geographie": {"lignes": ["10"], "commune": "Paris", "code_insee": "75056", "latitude": 48.84707750734599, "longitude": 2.2730641263728333}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Honoré Gabriel Riqueti, comte de Mirabeau (1749-1791), fut un exceptionnel et brillant orateur, grand journaliste et figure politique majeure des débuts tempétueux de la Révolution française.", "description longue": "La station, qui possède un profil très atypique à voie unique en courbe, prend le nom de la rue Mirabeau honorant à jamais le plus célèbre tribun flamboyant de la Constituante."}, "tags": []}, "Miromesnil": {"geographie": {"lignes": ["13", "9"], "commune": "Paris", "code_insee": "75056", "latitude": 48.873331580854774, "longitude": 2.314539776464459}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Armand Thomas Hue de Miromesnil (1723-1796) fut un puissant magistrat de haut rang et ministre de la Justice, très respecté garde des Sceaux sous le roi Louis XVI.", "description longue": "La station est située sous la rue de Miromesnil. Ce vieux toponyme honore l'ancien ministre qui abolit très courageusement l'usage barbare de la torture judiciaire."}, "tags": []}, "Monceau": {"geographie": {"lignes": ["2"], "commune": "Paris", "code_insee": "75056", "latitude": 48.880568770126835, "longitude": 2.309412967374703}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Monceau est le nom d'un ancien village champêtre absorbé par Paris, resté éternellement célèbre pour son magnifique et très romantique parc paysager, le parc Monceau.", "description longue": "La station emprunte son nom au parc Monceau, ancienne très luxueuse Folie ducale aux somptueuses fabriques de jardin, bordée aujourd'hui par de très élégants hôtels particuliers."}, "tags": []}, "Montgallet": {"geographie": {"lignes": ["8"], "commune": "Paris", "code_insee": "75056", "latitude": 48.8440641552825, "longitude": 2.39052195642492}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Le nom de la rue Montgallet provient vraisemblablement d'un très ancien propriétaire terrien local ou bien d'un nom de lieu-dit signifiant prosaïquement le mont de cailloux.", "description longue": "La station prend le nom de la rue Montgallet, une artère du 12e arrondissement de Paris autrefois très connue pour ses vieux ateliers d'artisans ébénistes du grand faubourg Saint-Antoine."}, "tags": []}, "Montparnasse Bienvenue": {"geographie": {"lignes": ["12", "13", "4", "6"], "commune": "Paris", "code_insee": "75056", "latitude": 48.84382361125447, "longitude": 2.323989185205003}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Montparnasse évoque le mont Parnasse. Fulgence Bienvenüe (1852-1936) est l'ingénieur en chef breton, unanimement considéré comme le grand père fondateur et constructeur du métro de Paris.", "description longue": "La station réunit le nom de l'illustre quartier bohème, en desservant sa très grande gare, et un vibrant hommage solennel à l'inspecteur général Bienvenüe pour son œuvre colossale souterraine."}, "tags": ["Architecture urbaine : Les grandes gares", "Topographie et Urbanisme"]}, "Montreuil - Hôpital": {"geographie": {"lignes": ["11"], "commune": "Montreuil", "code_insee": "93048", "latitude": 48.878269829247664, "longitude": 2.4546692358364623}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "La station dessert le vaste centre hospitalier intercommunal André-Grégoire, le principal et très grand équipement de santé situé sur les collines et hauteurs de la commune de Montreuil.", "description longue": "Inaugurée avec le très grand prolongement est de la ligne 11, la station nouvelle est judicieusement nommée selon son incontestable et très importante utilité de desserte hospitalière pour les riverains."}, "tags": []}, "Mouton-Duvernet": {"geographie": {"lignes": ["4"], "commune": "Paris", "code_insee": "75056", "latitude": 48.831382009093616, "longitude": 2.32979034782274}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Régis Barthélemy Mouton-Duvernet (1770-1816) fut un général de division sous l'Empire, resté fidèle à Napoléon pendant les Cent-Jours et impitoyablement fusillé sous la Restauration.", "description longue": "La station porte le nom de la rue Mouton-Duvernet, rendant un hommage éternel et poignant à cet officier militaire courageux exécuté tragiquement après le retour des Bourbons au pouvoir royal."}, "tags": ["L'ingénierie et l'industrie", "Monuments et Lieux Emblématiques"]}, "Ménilmontant": {"geographie": {"lignes": ["2"], "commune": "Paris", "code_insee": "75056", "latitude": 48.866390140145434, "longitude": 2.3834303882303045}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Ménilmontant est le nom d'un ancien village de vignerons rattaché à Paris en 1860, dont l'étymologie rustique signifie le domaine ou la demeure du mauvais temps.", "description longue": "La station prend le nom du boulevard de Ménilmontant. Elle rappelle l'ancien hameau champêtre très pentu devenu un vaste quartier extrêmement populaire, diversifié, artistique et très animé."}, "tags": ["Anciens Villages et Hameaux"]}, "Nation": {"geographie": {"lignes": ["1", "2", "6", "9"], "commune": "Paris", "code_insee": "75056", "latitude": 48.84845279707999, "longitude": 2.3957988351125254}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "La place de la Nation fut solennellement renommée le 14 juillet 1880, en remplacement de l'ancienne place du Trône, pour célébrer la République française universelle.", "description longue": "Autrefois lieu d'installation tragique d'une terrible guillotine active sous la Révolution, cette vaste place étoilée et sa station immense célèbrent désormais la grande concorde et l'unité de la Nation française."}, "tags": ["Histoire et Politique", "Révolution et République"]}, "Nationale": {"geographie": {"lignes": ["6"], "commune": "Paris", "code_insee": "75056", "latitude": 48.83323527967617, "longitude": 2.3628041715935075}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "La station aérienne dessert la très longue rue Nationale, artère du 13e arrondissement baptisée fièrement sous la Deuxième République pour célébrer la souveraineté indivisible du peuple.", "description longue": "Le nom de cette station aérienne souligne le caractère très républicain et profondément patriotique du quartier, dont de nombreuses rues avoisinantes rendent un majestueux hommage aux grandes institutions françaises."}, "tags": []}, "Notre-Dame-de-Lorette": {"geographie": {"lignes": ["12"], "commune": "Paris", "code_insee": "75056", "latitude": 48.87604417483004, "longitude": 2.3379007718233322}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "L'église Notre-Dame-de-Lorette est un très imposant édifice religieux d'inspiration antique, qui a donné son nom à ce quartier jadis connu pour ses fameuses lorettes du XIXe siècle.", "description longue": "La station tire son nom de l'église néoclassique toute proche, elle-même nommée avec ferveur d'après le très célèbre sanctuaire de pèlerinage italien de la Sainte Maison de Lorette (Loreto)."}, "tags": ["L'architecture religieuse", "Monuments et Lieux Emblématiques"]}, "Notre-Dame-des-Champs": {"geographie": {"lignes": ["12"], "commune": "Paris", "code_insee": "75056", "latitude": 48.84508150807547, "longitude": 2.328564944227944}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Le nom de la rue provient de l'église Notre-Dame-des-Champs, dont les vieilles origines remontent à un ancien sanctuaire édifié jadis en plein champ à l'extérieur des remparts de Paris.", "description longue": "La station se trouve sous le grand boulevard Raspail, à proximité immédiate de la belle rue Notre-Dame-des-Champs qui rappelle le caractère résolument rural et très ancien du quartier de Montparnasse."}, "tags": ["L'architecture religieuse", "Monuments et Lieux Emblématiques"]}, "Oberkampf": {"geographie": {"lignes": ["5", "9"], "commune": "Paris", "code_insee": "75056", "latitude": 48.86487188759515, "longitude": 2.3682236708807456}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Christophe-Philippe Oberkampf (1738-1815) fut un très grand industriel français d'origine bavaroise, fondateur florissant de la célèbre manufacture royale de toiles imprimées (la toile de Jouy).", "description longue": "La station prend le nom de la très passante rue Oberkampf. Elle honore l'inventeur pionnier de l'industrie textile, ami avisé des sciences et créateur merveilleux des célèbres motifs de Jouy-en-Josas."}, "tags": []}, "Odéon": {"geographie": {"lignes": ["10", "4"], "commune": "Paris", "code_insee": "75056", "latitude": 48.852175453081486, "longitude": 2.3395157696170745}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "L'Odéon désigne le célèbre et majestueux théâtre de l'Europe inauguré en grande pompe en 1782, situé à très proche distance des magnifiques jardins du palais du Luxembourg.", "description longue": "La station porte le nom de l'élégante place de l'Odéon. Le toponyme fait référence à l'imposant édifice théâtral bâti à l'emplacement exact de l'ancien vaste hôtel particulier du prince de Condé."}, "tags": ["Châteaux et Palais historiques", "Monuments et Lieux Emblématiques"]}, "Olympiades": {"geographie": {"lignes": ["14"], "commune": "Paris", "code_insee": "75056", "latitude": 48.826944155043044, "longitude": 2.367034270941924}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Les Olympiades désignent le très grand projet immobilier futuriste des années 1970 du 13e arrondissement, dont les hautes tours d'habitation portent des noms d'anciennes villes hôtes olympiques.", "description longue": "Ouverte en 2007, cette station souterraine spacieuse au cœur du quartier asiatique a pris le nom de cette audacieuse et immense dalle surélevée, symbolisant pleinement la modernité de l'urbanisme parisien."}, "tags": []}, "Opéra": {"geographie": {"lignes": ["3", "7", "8"], "commune": "Paris", "code_insee": "75056", "latitude": 48.87143742899726, "longitude": 2.331047286711241}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "L'opéra Garnier est le splendide palais national de la musique et de la danse, chef-d'œuvre architectural éclectique et ornementé édifié sous le Second Empire.", "description longue": "La station de correspondance s'ouvre magistralement sur la prestigieuse place de l'Opéra. Le toponyme désigne directement le somptueux chef-d'œuvre commandé par l'empereur Napoléon III au génial architecte Charles Garnier."}, "tags": []}, "Ourcq": {"geographie": {"lignes": ["5"], "commune": "Paris", "code_insee": "75056", "latitude": 48.88691595319499, "longitude": 2.386652016759884}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "L'Ourcq est une rivière d'Île-de-France dont les eaux douces furent canalisées sur décision de Napoléon Bonaparte pour alimenter largement Paris via l'utile canal de l'Ourcq.", "description longue": "La station est située non loin du célèbre canal de l'est parisien et sous la rue de l'Ourcq, rappelant l'immense et crucial chantier hydraulique engagé sous le dynamique Premier Empire."}, "tags": []}, "Palais Royal - Musée du Louvre": {"geographie": {"lignes": ["1", "7"], "commune": "Paris", "code_insee": "75056", "latitude": 48.86276538184415, "longitude": 2.3370872868854393}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Le Palais-Royal fut la somptueuse résidence du cardinal de Richelieu, tandis que le très vaste Louvre voisin fut le grand domaine des rois de France avant de devenir musée.", "description longue": "Anciennement nommée Palais Royal, la station de métro associe très judicieusement ces deux somptueux ensembles palatiaux historiques, dont le second abrite incontestablement la plus importante collection d'art au monde."}, "tags": ["Châteaux et Palais historiques", "Histoire et Politique", "Monuments et Lieux Emblématiques"]}, "Parmentier": {"geographie": {"lignes": ["3"], "commune": "Paris", "code_insee": "75056", "latitude": 48.865162111168765, "longitude": 2.3746806763746613}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": ["XVIIIe siècle", "XIXe siècle"], "details_personne": {"nom": "Antoine Parmentier", "annee_naissance": 1737, "annee_deces": 1813, "siecles_vecus": ["XVIIIe siècle", "XIXe siècle"]}, "description courte": "Antoine Parmentier (1737-1813) fut un très grand pharmacien et agronome français, resté célèbre pour avoir ingénieusement popularisé la culture de la pomme de terre en France.", "description longue": "La station est située sous la longue avenue Parmentier. Ce toponyme rend un très brillant hommage au célèbre nutritionniste humaniste dont les recherches agronomiques acharnées permirent de combattre victorieusement les disettes."}, "tags": ["Sciences, Médecine et Techniques"]}, "Passy": {"geographie": {"lignes": ["6"], "commune": "Paris", "code_insee": "75056", "latitude": 48.85751508962033, "longitude": 2.285839418881462}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Passy fut un charmant village bourgeois très réputé pour ses pures eaux minérales et l'élégance de ses demeures, rattaché administrativement au 16e arrondissement de Paris en 1860.", "description longue": "Partiellement souterraine et aérienne, la station prend le nom de la très commerçante rue de Passy, artère historique de cette ancienne commune thermale huppée très prisée autrefois par Benjamin Franklin."}, "tags": ["Anciens Villages et Hameaux"]}, "Pasteur": {"geographie": {"lignes": ["12", "6"], "commune": "Paris", "code_insee": "75056", "latitude": 48.842528387543226, "longitude": 2.3129146804739396}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": ["XIXe siècle"], "details_personne": {"nom": "Louis Pasteur", "annee_naissance": 1822, "annee_deces": 1895, "siecles_vecus": ["XIXe siècle"]}, "description courte": "Louis Pasteur (1822-1895) fut un illustre biologiste, microbiologiste et grand chimiste français, père scientifique mondialement reconnu pour sa brillante et salvatrice invention du vaccin contre la rage.", "description longue": "La station dessert le très grand et large boulevard Pasteur. Elle honore le chercheur scientifique de génie, fondateur inoubliable de l'institut voisin qui veille encore rigoureusement aujourd'hui à l'étude des maladies infectieuses."}, "tags": ["Sciences, Médecine et Techniques"]}, "Pelleport": {"geographie": {"lignes": ["3B"], "commune": "Paris", "code_insee": "75056", "latitude": 48.86846488701483, "longitude": 2.4014967922879253}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Pierre de Pelleport (1773-1855) fut un très brave général de division des invincibles armées de l'Empire et un membre fervent et loyal de la Chambre des pairs.", "description longue": "La station très profonde porte le nom de la rue Pelleport à Ménilmontant, célébrant solennellement l'intrépide officier supérieur très gravement blessé lors de la terrible et sanglante bataille d'Eylau."}, "tags": []}, "Pereire": {"geographie": {"lignes": ["3"], "commune": "Paris", "code_insee": "75056", "latitude": 48.88484432273985, "longitude": 2.2976831860125837}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Les frères Émile (1800-1875) et Isaac Pereire (1806-1880) furent des financiers et industriels extrêmement visionnaires, de très grands pionniers du développement des chemins de fer en France.", "description longue": "La station dessert l'élégante place et le long boulevard Pereire, honorant ces deux banquiers audacieux du Second Empire qui jouèrent un rôle absolument clé dans la formidable révolution industrielle ferroviaire."}, "tags": []}, "Pernety": {"geographie": {"lignes": ["13"], "commune": "Paris", "code_insee": "75056", "latitude": 48.83389625601307, "longitude": 2.3179465189168287}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Joseph Marie de Pernety (1766-1856) fut un vicomte courageux et un très brillant général de division d'artillerie, acteur militaire majeur des guerres de la Révolution et de l'Empire.", "description longue": "La station prend le nom de la petite rue Pernety, située dans le quartier résidentiel de Plaisance, qui commémore brillamment l'un des plus talentueux et fiables commandants d'artillerie des armées napoléoniennes."}, "tags": []}, "Philippe Auguste": {"geographie": {"lignes": ["2"], "commune": "Paris", "code_insee": "75056", "latitude": 48.858089428135756, "longitude": 2.390497596745289}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": ["XIIe siècle", "XIIIe siècle"], "details_personne": {"nom": "Philippe Auguste", "annee_naissance": 1165, "annee_deces": 1223, "siecles_vecus": ["XIIe siècle", "XIIIe siècle"]}, "description courte": "Philippe II Auguste (1165-1223) fut un très grand roi de France, un bâtisseur acharné à qui l'on doit la puissante enceinte fortifiée de Paris et le château du Louvre.", "description longue": "La station est implantée sous la grande avenue Philippe-Auguste. Ce toponyme souligne l'ampleur monumentale du règne de ce grand roi conquérant qui transforma, embellit et modernisa durablement la physionomie de la capitale."}, "tags": []}, "Picpus": {"geographie": {"lignes": ["6"], "commune": "Paris", "code_insee": "75056", "latitude": 48.84510324750185, "longitude": 2.4012745388223746}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Picpus était un ancien village francilien dont l'étymologie pourrait dériver de pique-puce, en référence familière et humoristique aux insectes, ou d'une guérison jugée miraculeuse due à un ermite local.", "description longue": "La station tire son nom très particulier du boulevard de Picpus. Elle rappelle discrètement le très tragique cimetière secret où furent enfouies dans de terribles fosses communes plus de mille victimes de la Terreur."}, "tags": []}, "Pierre et Marie Curie": {"geographie": {"lignes": ["7"], "commune": "Ivry-sur-Seine", "code_insee": "94041", "latitude": 48.81587757774557, "longitude": 2.377362970985953}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": ["XIXe siècle", "XXe siècle"], "details_personne": {"nom": "Pierre et Marie Curie", "annee_naissance": 1859, "annee_deces": 1934, "siecles_vecus": ["XIXe siècle", "XXe siècle"]}, "description courte": "Pierre (1859-1906) et Marie Curie (1867-1934) furent des physiciens lauréats du prestigieux prix Nobel, pionniers exceptionnels de la radioactivité et grands découvreurs du polonium et du radium.", "description longue": "Anciennement nommée Pierre Curie, la station a été très justement et symboliquement rebaptisée en 2007 pour intégrer le nom immense de son épouse, la seule femme scientifique à avoir obtenu deux prix Nobel scientifiques distincts."}, "tags": ["Histoire et Politique", "Les Femmes Illustres"]}, "Pigalle": {"geographie": {"lignes": ["12", "2"], "commune": "Paris", "code_insee": "75056", "latitude": 48.882269542226226, "longitude": 2.338257976509587}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Jean-Baptiste Pigalle (1714-1785) est un célèbre et brillant maître sculpteur français de l'époque rococo et néoclassique, très apprécié et soutenu par Madame de Pompadour.", "description longue": "La station est très idéalement située au carrefour très fréquenté de la place et de la rue Pigalle, épicentre bouillonnant d'un quartier sulfureux et nocturne baptisé jadis en l'honneur de ce sculpteur de grand talent."}, "tags": ["Arts et Culture", "Peintres, Sculpteurs et Poètes"]}, "Place Monge": {"geographie": {"lignes": ["7"], "commune": "Paris", "code_insee": "75056", "latitude": 48.842683564383904, "longitude": 2.3520055901754713}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Gaspard Monge (1746-1818) fut un mathématicien hors pair, grand et ingénieux inventeur de la géométrie descriptive et l'un des fondateurs prestigieux de l'École polytechnique.", "description longue": "La station s'ouvre sur la très agréable et pittoresque place Monge, en plein cœur du Quartier latin, honorant fidèlement l'un des savants et brillants professeurs les plus illustres de la période de la Révolution."}, "tags": ["Sciences, Médecine et Techniques"]}, "Place d'Italie": {"geographie": {"lignes": ["5", "6", "7"], "commune": "Paris", "code_insee": "75056", "latitude": 48.83154024475565, "longitude": 2.355303769754901}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "La place d'Italie se trouve à l'emplacement exact de l'ancienne barrière d'octroi de Fontainebleau, sur la très longue et historique route menant la capitale vers la péninsule italienne.", "description longue": "Ce carrefour étoilé incontournable de la Rive gauche prend très logiquement le nom du grand axe routier national du sud qui relie traditionnellement et géographiquement Paris à l'Italie."}, "tags": []}, "Place de Clichy": {"geographie": {"lignes": ["13", "2"], "commune": "Paris", "code_insee": "75056", "latitude": 48.88374519677981, "longitude": 2.3278987090661456}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "La place de Clichy se dresse à l'emplacement de l'ancienne barrière d'octroi du mur de Thiers, défendue héroïquement par le général Moncey face aux armées russes en 1814.", "description longue": "La station est implantée sous ce très grand carrefour extrêmement animé reliant quatre arrondissements, baptisé simplement du nom de la commune de Clichy-la-Garenne vers laquelle la grande avenue s'oriente."}, "tags": []}, "Place des Fêtes": {"geographie": {"lignes": ["11", "7B"], "commune": "Paris", "code_insee": "75056", "latitude": 48.87672366197325, "longitude": 2.393139370360497}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Cette place de Belleville accueillait jadis de très nombreux rassemblements festifs très joyeux organisés par l'ancienne municipalité de la commune pour le grand divertissement dominical de ses habitants.", "description longue": "La station, qui se distingue par le fait d'être l'une des plus profondes de Paris, honore l'ancienne et joyeuse esplanade festive de Belleville, devenue aujourd'hui le vaste centre pavé et commerçant d'un grand ensemble urbain."}, "tags": []}, "Plaisance": {"geographie": {"lignes": ["13"], "commune": "Paris", "code_insee": "75056", "latitude": 48.831768583640276, "longitude": 2.3139011181482863}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Plaisance est un quartier du 14e arrondissement qui fut, avant sa très forte urbanisation, un charmant et reposant lieu de villégiature et de repos estival pour les citadins.", "description longue": "La station porte le nom très évocateur de la rue de Plaisance, qui rappelle avec une certaine nostalgie les anciens lotissements bucoliques très prisés jadis par les parisiens pour les joies et plaisirs de la promenade à la campagne."}, "tags": []}, "Pointe du Lac": {"geographie": {"lignes": ["8"], "commune": "Créteil", "code_insee": "94028", "latitude": 48.76876136434425, "longitude": 2.464317312722042}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Le lac de Créteil est un très vaste plan d'eau artificiel de 40 hectares entouré d'espaces verts paysagers, extrêmement apprécié par les habitants de la région pour les loisirs.", "description longue": "Cette station aérienne très moderne, ouverte en 2011, dessert avantageusement le pôle de loisirs de la ville de Créteil, sa position géographique nommant et désignant très exactement la pointe méridionale de cette large étendue d'eau d'agrément."}, "tags": ["Espaces Verts et Nature"]}, "Poissonnière": {"geographie": {"lignes": ["7"], "commune": "Paris", "code_insee": "75056", "latitude": 48.87716484925024, "longitude": 2.3487397513900734}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "La rue Poissonnière faisait partie intégrante du long et très antique chemin des Poissonniers emprunté très jadis par les grands convois de marée venant directement de la Manche.", "description longue": "La station souligne et conserve pour la postérité la mémoire de cet axe économique majeur et rectiligne qui permettait d'acheminer en charrette le poisson frais du nord de la France vers le ventre historique des Halles."}, "tags": []}, "Pont Cardinet": {"geographie": {"lignes": ["14"], "commune": "Paris", "code_insee": "75056", "latitude": 48.88810340364297, "longitude": 2.3153681405051527}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Le pont Cardinet enjambe l'immense et large faisceau des voies ferrées partant de la gare Saint-Lazare. Cardinet fait référence à un grand propriétaire foncier local et ancien du quartier des Batignolles.", "description longue": "Nouvelle station de la ligne 14, elle prend son nom du pont routier qu'elle borde, commémorant une figure locale dont la riche famille posséda des terres avant le développement massif industriel."}, "tags": ["Topographie et Urbanisme"]}, "Pont Marie (Cité des Arts)": {"geographie": {"lignes": ["7"], "commune": "Paris", "code_insee": "75056", "latitude": 48.85341474936241, "longitude": 2.357349968447059}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Christophe Marie (1580-1652) fut un audacieux entrepreneur général des ponts de France, célèbre pour l'aménagement de l'île Saint-Louis et la création du magnifique pont Marie en pierre.", "description longue": "La station emprunte le nom de l'un des plus anciens et solides ponts de pierre de la capitale, qui relie la rive droite à l'île Saint-Louis, jadis couverte d'élégantes et majestueuses demeures."}, "tags": ["Topographie et Urbanisme"]}, "Pont Neuf": {"geographie": {"lignes": ["7"], "commune": "Paris", "code_insee": "75056", "latitude": 48.858456031111984, "longitude": 2.3417089232034765}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Achevé sous Henri IV, le pont Neuf est ironiquement le plus ancien pont en pierre de Paris, et le premier à traverser totalement la Seine en s'appuyant sur l'île de la Cité.", "description longue": "La station rend un honneur mérité à cet édifice révolutionnaire, dépourvu historiquement d'habitations en encorbellement, orné de mascarons grimaçants et doté de larges trottoirs, qui modifia considérablement la vie parisienne à la Renaissance."}, "tags": ["L'ingénierie et l'industrie", "Monuments et Lieux Emblématiques", "Topographie et Urbanisme"]}, "Pont de Levallois - Bécon": {"geographie": {"lignes": ["3"], "commune": "Levallois-Perret", "code_insee": "92044", "latitude": 48.89722831603318, "longitude": 2.28030375318625}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Le pont de Levallois franchit allègrement la Seine. Bécon-les-Bruyères est un quartier adjacent très réputé des villes florissantes de Courbevoie et d'Asnières-sur-Seine.", "description longue": "Ce terminus occidental très pittoresque de la ligne 3 indique de manière claire sa situation géographique idéale, juste aux abords du pont traversant la Seine en direction du riche faubourg du château de Bécon."}, "tags": ["Topographie et Urbanisme"]}, "Pont de Neuilly": {"geographie": {"lignes": ["1"], "commune": "Neuilly-sur-Seine", "code_insee": "92051", "latitude": 48.88468472414712, "longitude": 2.2607160495433503}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Le pont de Neuilly est une structure monumentale qui permet à l'Axe historique de franchir le fleuve vers le grand quartier d'affaires de La Défense.", "description longue": "La station prend le nom de sa grande esplanade surplombant le pont historique qui mène à Neuilly, empruntant ainsi l'ancienne et majestueuse voie royale tracée magistralement depuis le jardin des Tuileries."}, "tags": ["Topographie et Urbanisme"]}, "Pont de Sèvres": {"geographie": {"lignes": ["9"], "commune": "Boulogne-Billancourt", "code_insee": "92012", "latitude": 48.82968726438348, "longitude": 2.2305185727726955}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Le pont de Sèvres franchit la Seine en direction de Sèvres, une ville francilienne mondialement célèbre pour sa très ancienne manufacture historique et sa magnifique porcelaine.", "descript

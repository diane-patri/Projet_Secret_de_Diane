: {"lignes": ["12"], "commune": "Paris", "code_insee": "75056", "latitude": 48.89060729278663, "longitude": 2.359945883178033}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": ["XIXe siècle", "XXe siècle"], "details_personne": {"nom": "Marx Dormoy", "annee_naissance": 1888, "annee_deces": 1941, "siecles_vecus": ["XIXe siècle", "XXe siècle"]}, "description courte": "Marx Dormoy (1888-1941) fut un ministre de l'Intérieur du gouvernement de Front Populaire et un farouche opposant à l'extrême droite, assassiné lâchement par la Cagoule sous l'Occupation.", "description longue": "L'ancienne station Torcy fut solennellement rebaptisée avec la rue du même nom pour honorer la mémoire de ce courageux ministre socialiste et martyr de la Résistance française."}, "description courte": "La station rend hommage à Marx Dormoy, homme politique socialiste et ministre de l'Intérieur sous le Front populaire, assassiné en 1941 par la Cagoule.", "description longue": "La station Marx Dormoy, située sur la ligne 12, honore la mémoire de Marx Dormoy (1888-1941). Figure majeure du socialisme français, il fut ministre de l'Intérieur du Front populaire, célèbre pour avoir fait dissoudre les ligues d'extrême droite et instauré les 40 heures. Opposant farouche au régime de Vichy, il fut assassiné à Montélimar par des membres de la Cagoule, une organisation terroriste d'extrême droite. Le choix de ce nom pour une station du nord de Paris, quartier historiquement ancré à gauche, souligne son héritage politique. Auparavant, la station s'appelait 'Torcy' en référence à la rue de Torcy, mais fut renommée en 1946 pour immortaliser l'homme politique.", "ambiguite": false, "tags": ["Institutions Civiques et Politiques", "Révolution et République"]}, "Maubert - Mutualité": {"geographie": {"lignes": ["10"], "commune": "Paris", "code_insee": "75056", "latitude": 48.85019546606951, "longitude": 2.3482804131694897}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Jean Aubert, ou le célèbre maître Albert, donna son nom à la place Maubert. La Mutualité désigne le grand palais des congrès situé à proximité.", "description longue": "La station associe le nom de la très ancienne place d'exécution médiévale Maubert à la Maison de la Mutualité, haut lieu contemporain des grands rassemblements politiques parisiens."}, "description courte": "Nommé d'après la place Maubert, ancien centre intellectuel médiéval, et la Maison de la Mutualité, haut lieu des congrès politiques et culturels depuis 1931.", "description longue": "La station tire son nom de la place Maubert, située au cœur du quartier latin. Le terme 'Maubert' serait une contraction du nom 'Maître Albert', en référence au théologien Albert le Grand qui y enseignait au XIIIe siècle. Ce lieu était alors une place forte de l'université médiévale, tristement célèbre aussi pour les exécutions publiques de hérétiques par le feu. Le second volet du nom, 'Mutualité', rend hommage à la Maison de la Mutualité, bâtiment inauguré en 1931. Ce lieu devint rapidement un centre névralgique de la vie politique et syndicale française, accueillant de nombreux congrès et meetings historiques. La station, ouverte en 1930, est devenue indissociable de cet ancrage à la fois historique et républicain.", "ambiguite": false, "tags": ["Institutions Civiques et Politiques", "Anciens Villages et Hameaux"]}, "Michel Bizot": {"geographie": {"lignes": ["8"], "commune": "Paris", "code_insee": "75056", "latitude": 48.837000553950986, "longitude": 2.40228042706469}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Michel Bizot (1795-1855) fut un courageux et intrépide général et ingénieur militaire français, tué héroïquement lors du très long et difficile siège de Sébastopol en Crimée.", "description longue": "La station tire son nom de l'avenue du Général-Michel-Bizot, qui rend un très digne hommage à cet exceptionnel officier supérieur tombé au champ d'honneur pour la patrie française."}, "description courte": "La station honore Michel Bizot (1891-1944), officier français mort en déportation, figure importante de la Résistance pendant la Seconde Guerre mondiale.", "description longue": "Située sur la ligne 8, la station rend hommage à Michel Bizot, né en 1891 et décédé en 1944. Officier de carrière et membre de la Résistance intérieure française, il fut arrêté par la Gestapo et déporté au camp de concentration de Neuengamme, où il trouva la mort. Le nom de la station, située à proximité de l'ancienne porte de Picpus, s'inscrit dans la tradition parisienne de commémoration des héros de la lutte contre l'occupant. Contrairement à une idée reçue, cette dénomination n'a aucun lien direct avec l'ingénieur militaire Jean-Baptiste Bizot, bien que la proximité du quartier avec le Bois de Vincennes confère à cet axe une importance topographique majeure dans le 12e arrondissement.", "ambiguite": false, "tags": ["Les figures de la Résistance", "Les Portes de Paris"]}, "Michel-Ange - Auteuil": {"geographie": {"lignes": ["10", "9"], "commune": "Paris", "code_insee": "75056", "latitude": 48.84767825351756, "longitude": 2.2639392129884905}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Michel-Ange (1475-1564) est le mythique et célèbre artiste de la Renaissance italienne. Auteuil était un charmant village huppé et verdoyant, rattaché administrativement à Paris en 1860.", "description longue": "La station réunit symboliquement le nom de la longue rue Michel-Ange, dédiée au génial créateur florentin, et du verdoyant quartier villageois historique de l'ouest de la capitale."}, "description courte": "La station tire son nom de la rue Michel-Ange, en hommage au célèbre artiste de la Renaissance, et de l'ancien village d'Auteuil qu'elle dessert.", "description longue": "La station Michel-Ange - Auteuil, située sur les lignes 9 et 10, doit sa dénomination à la rencontre de deux entités. Michel-Ange fait référence à la rue éponyme, baptisée en l'honneur du maître florentin de la Renaissance, sculpteur et peintre de génie. Le suffixe 'Auteuil' rappelle l'ancien village annexé à Paris en 1860, devenu un quartier bourgeois prisé. Cette station est unique par sa configuration : elle dessert deux lignes distinctes avec des quais séparés, héritage de l'histoire complexe du réseau et des anciennes boucles d'exploitation du métro parisien au début du XXe siècle.", "ambiguite": false, "tags": ["Arts et Culture", "Anciens Villages et Hameaux"]}, "Michel-Ange - Molitor": {"geographie": {"lignes": ["10", "9"], "commune": "Paris", "code_insee": "75056", "latitude": 48.84515597018703, "longitude": 2.2618218573220084}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Michel-Ange (1475-1564) est un maître absolu de la Renaissance. Gabriel-Jean-Joseph Molitor (1770-1849) fut un très respecté et brave maréchal de France de la Grande Armée de l'Empire.", "description longue": "La station croise la rue Michel-Ange et la rue Molitor, mariant ainsi très astucieusement le grand sculpteur universel italien et un brillant commandant des invincibles armées napoléoniennes."}, "description courte": "La station honore le sculpteur Michel-Ange et le général Gabriel Jean Joseph Molitor, dont les noms baptisent les rues adjacentes du 16e arrondissement parisien.", "description longue": "La station 'Michel-Ange - Molitor', située à l'intersection des rues Michel-Ange et Molitor dans le 16e arrondissement, illustre la nomenclature toponymique parisienne dédiée aux personnalités historiques. Le premier nom rend hommage à Michelangelo Buonarroti, maître absolu de la Renaissance italienne. Le second célèbre le maréchal d'Empire Gabriel Jean Joseph Molitor (1770-1849), officier distingué durant les guerres révolutionnaires et napoléoniennes. Inaugurée le 8 novembre 1922 lors du prolongement de la ligne 9, cette station est célèbre pour son exploitation en boucle (la 'boucle d'Auteuil') qui permettait autrefois aux trains de faire demi-tour. Elle est située à proximité immédiate de l'ancien vélodrome du Parc des Princes, témoignant de l'urbanisation sportive et résidentielle du quartier au début du XXe siècle.", "ambiguite": false, "tags": ["Arts et Culture", "Les victoires et batailles militaires"]}, "Mirabeau": {"geographie": {"lignes": ["10"], "commune": "Paris", "code_insee": "75056", "latitude": 48.84707750734599, "longitude": 2.2730641263728333}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Honoré Gabriel Riqueti, comte de Mirabeau (1749-1791), fut un exceptionnel et brillant orateur, grand journaliste et figure politique majeure des débuts tempétueux de la Révolution française.", "description longue": "La station, qui possède un profil très atypique à voie unique en courbe, prend le nom de la rue Mirabeau honorant à jamais le plus célèbre tribun flamboyant de la Constituante."}, "description courte": "La station tire son nom de la rue Mirabeau, elle-même nommée en hommage à Honoré Gabriel Riqueti, comte de Mirabeau, figure politique majeure de la Révolution française.", "description longue": "La station Mirabeau, située sur la ligne 10 du métro parisien, rend hommage à Honoré Gabriel Riqueti, comte de Mirabeau (1749-1791). Orateur brillant et figure centrale des débuts de la Révolution française, il fut un partisan d'une monarchie constitutionnelle. Bien que sa dépouille ait été transférée au Panthéon en 1791, elle en fut expulsée en 1794 après la découverte de sa correspondance secrète avec la famille royale. Cette station est également célèbre pour sa configuration technique unique : en direction de Boulogne, le tunnel présente une rampe très abrupte et une courbe serrée, nécessitant un tracé souterrain complexe pour contourner les fondations de l'église d'Auteuil, ce qui en fait l'une des stations les plus singulières de l'ingénierie parisienne.", "ambiguite": false, "tags": ["Révolution et République", "Institutions Civiques et Politiques"]}, "Miromesnil": {"geographie": {"lignes": ["13", "9"], "commune": "Paris", "code_insee": "75056", "latitude": 48.873331580854774, "longitude": 2.314539776464459}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Armand Thomas Hue de Miromesnil (1723-1796) fut un puissant magistrat de haut rang et ministre de la Justice, très respecté garde des Sceaux sous le roi Louis XVI.", "description longue": "La station est située sous la rue de Miromesnil. Ce vieux toponyme honore l'ancien ministre qui abolit très courageusement l'usage barbare de la torture judiciaire."}, "description courte": "La station tire son nom de la rue Miromesnil, nommée en hommage à Armand Thomas Hue de Miromesnil, garde des Sceaux sous Louis XVI.", "description longue": "La station Miromesnil, inaugurée en 1973 sur la ligne 13, tire son nom de la rue éponyme située dans le 8e arrondissement. Cette voie rend hommage à Armand Thomas Hue de Miromesnil (1723-1796), magistrat français ayant occupé la prestigieuse fonction de garde des Sceaux sous le règne de Louis XVI. Son nom est associé à une période de réformes judiciaires et administratives complexes juste avant la Révolution. Bien que son nom soit devenu une référence toponymique durable du quartier, l'homme reste une figure de l'Ancien Régime souvent méconnue du grand public. Une anecdote historique lie cette station à la modernité administrative : elle fut l'une des premières à bénéficier d'un aménagement soigné lors de l'extension de la ligne 13, connectant le cœur du quartier des affaires à la rive gauche.", "ambiguite": false, "tags": ["Institutions Civiques et Politiques"]}, "Monceau": {"geographie": {"lignes": ["2"], "commune": "Paris", "code_insee": "75056", "latitude": 48.880568770126835, "longitude": 2.309412967374703}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Monceau est le nom d'un ancien village champêtre absorbé par Paris, resté éternellement célèbre pour son magnifique et très romantique parc paysager, le parc Monceau.", "description longue": "La station emprunte son nom au parc Monceau, ancienne très luxueuse Folie ducale aux somptueuses fabriques de jardin, bordée aujourd'hui par de très élégants hôtels particuliers."}, "description courte": "La station tire son nom du parc Monceau, ancien village annexé, dont l'étymologie évoque un monticule ou une colline sur laquelle s'étendait le domaine.", "description longue": "Le nom 'Monceau' trouve son origine dans le vieux français 'moncel', désignant un petit mont ou une élévation. Ce toponyme désignait initialement un hameau situé hors des murs de Paris, le village de Monceau, qui fut progressivement absorbé par l'urbanisation. Le site est intimement lié au parc Monceau, créé en 1778 par le duc de Chartres, futur Philippe-Égalité. Conçu par le peintre Carmontelle comme un jardin pittoresque rempli de fabriques (ruines, pyramide, pagode), il devint un lieu de villégiature prisé par la haute bourgeoisie et l'aristocratie au XIXe siècle. La station, ouverte en 1902 sur la ligne 2, témoigne de cette mutation urbaine où les anciens espaces seigneuriaux sont devenus des poumons verts parisiens prestigieux.", "ambiguite": false, "tags": ["Anciens Villages et Hameaux", "Espaces Verts et Nature"]}, "Montgallet": {"geographie": {"lignes": ["8"], "commune": "Paris", "code_insee": "75056", "latitude": 48.8440641552825, "longitude": 2.39052195642492}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Le nom de la rue Montgallet provient vraisemblablement d'un très ancien propriétaire terrien local ou bien d'un nom de lieu-dit signifiant prosaïquement le mont de cailloux.", "description longue": "La station prend le nom de la rue Montgallet, une artère du 12e arrondissement de Paris autrefois très connue pour ses vieux ateliers d'artisans ébénistes du grand faubourg Saint-Antoine."}, "description courte": "La station tire son nom de la rue Montgallet, elle-même nommée d'après un propriétaire de terrain local, le Sieur Montgallet, actif au XVIIIe siècle.", "description longue": "Située dans le 12e arrondissement, la station Montgallet doit son nom à la rue éponyme. Contrairement à de nombreuses stations parisiennes nommées d'après des héros militaires ou des personnalités historiques majeures, 'Montgallet' trouve son origine dans la petite histoire urbaine. La voie, déjà présente sur les plans du XVIIIe siècle, traversait des terrains agricoles et maraîchers situés sur l'ancien village de Reuilly. Le nom provient d'un propriétaire foncier local, le sieur Montgallet, dont les terres furent loties pour permettre l'urbanisation du secteur. Anecdote moderne : la station est devenue mondialement célèbre dans les années 1990 et 2000 pour sa proximité avec la 'rue de l'informatique' parisienne, faisant de ce lieu un point de passage incontournable pour les passionnés de technologie.", "ambiguite": false, "tags": ["Anciens Villages et Hameaux", "Topographie et Urbanisme"]}, "Montparnasse Bienvenue": {"geographie": {"lignes": ["12", "13", "4", "6"], "commune": "Paris", "code_insee": "75056", "latitude": 48.84382361125447, "longitude": 2.323989185205003}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Montparnasse évoque le mont Parnasse. Fulgence Bienvenüe (1852-1936) est l'ingénieur en chef breton, unanimement considéré comme le grand père fondateur et constructeur du métro de Paris.", "description longue": "La station réunit le nom de l'illustre quartier bohème, en desservant sa très grande gare, et un vibrant hommage solennel à l'inspecteur général Bienvenüe pour son œuvre colossale souterraine."}, "description courte": "Hommage à la colline grecque du Parnasse, lieu des Muses, et à Fulgence Bienvenüe, ingénieur en chef et père spirituel du métro parisien.", "description longue": "La station tire son nom du quartier de Montparnasse, baptisé ainsi par des étudiants au XVIIe siècle en référence au mont Parnasse grec, résidence des Muses. En 1933, le nom de 'Bienvenüe' est ajouté en hommage à Fulgence Bienvenüe, ingénieur des Ponts et Chaussées et véritable 'père du métro' qui en conçut le réseau initial. Initialement deux stations distinctes (Montparnasse et Bienvenüe), elles furent fusionnées lors de l'extension de la ligne 6. Une anecdote célèbre concerne la typographie des plaques : une erreur de gravure a durablement installé l'orthographe 'Bienvenue' (sans tréma) dans l'usage quotidien, bien que le nom de l'ingénieur s'écrive avec un tréma.", "ambiguite": true, "tags": ["Monuments et Lieux Emblématiques", "Sciences, Médecine et Techniques"]}, "Montreuil - Hôpital": {"geographie": {"lignes": ["11"], "commune": "Montreuil", "code_insee": "93048", "latitude": 48.878269829247664, "longitude": 2.4546692358364623}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "La station dessert le vaste centre hospitalier intercommunal André-Grégoire, le principal et très grand équipement de santé situé sur les collines et hauteurs de la commune de Montreuil.", "description longue": "Inaugurée avec le très grand prolongement est de la ligne 11, la station nouvelle est judicieusement nommée selon son incontestable et très importante utilité de desserte hospitalière pour les riverains."}, "description courte": "La station tire son nom de la commune de Montreuil et de la proximité immédiate du centre hospitalier intercommunal André-Grégoire.", "description longue": "La station 'Montreuil - Hôpital', située sur le prolongement de la ligne 11, tire son nom de sa situation géographique. 'Montreuil' désigne la ville de Seine-Saint-Denis, dont l'étymologie remonte au latin 'monasteriolum' (petit monastère). La seconde partie, 'Hôpital', fait référence au Centre Hospitalier Intercommunal André-Grégoire, établissement de santé majeur situé à proximité immédiate de la station. Contrairement à d'autres stations aux noms hybrides, cette dénomination répond à une logique fonctionnelle et utilitaire visant à faciliter l'orientation des usagers vers un service public de santé essentiel, marquant ainsi l'extension du réseau vers les zones d'équipements structurants en périphérie parisienne.", "ambiguite": false, "tags": ["Sciences, Médecine et Techniques", "Topographie et Urbanisme"]}, "Mouton-Duvernet": {"geographie": {"lignes": ["4"], "commune": "Paris", "code_insee": "75056", "latitude": 48.831382009093616, "longitude": 2.32979034782274}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Régis Barthélemy Mouton-Duvernet (1770-1816) fut un général de division sous l'Empire, resté fidèle à Napoléon pendant les Cent-Jours et impitoyablement fusillé sous la Restauration.", "description longue": "La station porte le nom de la rue Mouton-Duvernet, rendant un hommage éternel et poignant à cet officier militaire courageux exécuté tragiquement après le retour des Bourbons au pouvoir royal."}, "description courte": "La station tire son nom de la rue Mouton-Duvernet, qui rend hommage au général d'Empire français Camille Mouton-Duvernet, fusillé lors de la Restauration en 1816.", "description longue": "La station Mouton-Duvernet, située sur la ligne 4, doit son nom à la rue éponyme, laquelle honore le général Camille Mouton-Duvernet (1781-1816). Militaire brillant ayant servi sous le Premier Empire, il s'illustra notamment lors des campagnes napoléoniennes. Cependant, son adhésion aux Cent-Jours lui fut fatale : après la seconde abdication de Napoléon, il fut condamné à mort par un conseil de guerre pour sa loyauté envers l'Empereur et fusillé à Lyon lors de la Terreur blanche. Anecdote intéressante, cette station fut, en 1974, la première à adopter le style de décoration 'Motte', caractérisé par des carrelages orangés et des luminaires spécifiques, visant à moderniser l'image du métro parisien avant que ce style ne soit progressivement remplacé au fil des rénovations.", "ambiguite": false, "tags": ["Révolution et République", "Les victoires et batailles militaires"]}, "Ménilmontant": {"geographie": {"lignes": ["2"], "commune": "Paris", "code_insee": "75056", "latitude": 48.866390140145434, "longitude": 2.3834303882303045}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Ménilmontant est le nom d'un ancien village de vignerons rattaché à Paris en 1860, dont l'étymologie rustique signifie le domaine ou la demeure du mauvais temps.", "description longue": "La station prend le nom du boulevard de Ménilmontant. Elle rappelle l'ancien hameau champêtre très pentu devenu un vaste quartier extrêmement populaire, diversifié, artistique et très animé."}, "description courte": "Ménilmontant tire son nom de l'ancien village éponyme, lui-même issu de 'Mesnil-Mautemps', désignant une habitation médiévale située dans un vallon jugé peu propice.", "description longue": "Le nom de Ménilmontant est une évolution linguistique savoureuse du médiéval 'Mesnil-Mautemps' (Mesnil au mauvais temps). Au XIIIe siècle, le 'mesnil' (domaine rural) était situé dans un vallon encaissé, froid et humide, ce qui lui valut cette réputation peu flatteuse. Avec le temps, par une euphémisation linguistique courante, 'Mautemps' s'est transformé en 'Montant', évoquant le relief escarpé de la colline. Avant son annexion à Paris en 1860, le village était une zone de vignobles et de carrières de gypse, réputée pour ses guinguettes populaires. La station, ouverte en 1903 sur la ligne 2, dessert aujourd'hui ce quartier emblématique de la culture ouvrière et bohème parisienne, immortalisé par de nombreux artistes et chanteurs comme Charles Trenet.", "ambiguite": false, "tags": ["Anciens Villages et Hameaux", "Topographie et Urbanisme"]}, "Nation": {"geographie": {"lignes": ["1", "2", "6", "9"], "commune": "Paris", "code_insee": "75056", "latitude": 48.84845279707999, "longitude": 2.3957988351125254}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "La place de la Nation fut solennellement renommée le 14 juillet 1880, en remplacement de l'ancienne place du Trône, pour célébrer la République française universelle.", "description longue": "Autrefois lieu d'installation tragique d'une terrible guillotine active sous la Révolution, cette vaste place étoilée et sa station immense célèbrent désormais la grande concorde et l'unité de la Nation française."}, "description courte": "La station tire son nom de la place de la Nation, baptisée ainsi le 14 juillet 1880 en hommage aux valeurs républicaines françaises.", "description longue": "Anciennement nommée 'place du Trône', la place fut le théâtre d'exécutions sanglantes sous la Terreur. En 1880, pour célébrer la fête nationale, elle est rebaptisée 'place de la Nation'. Le monument central, 'Le Triomphe de la République', sculpté par Dalou, symbolise cet idéal. La station de métro, ouverte en 1900, est l'une des plus importantes de Paris : elle constitue un pôle d'échange majeur reliant les lignes 1, 2, 6, 9 et le RER A. Fait historique : elle fut le terminus historique de la ligne 1, avant son prolongement vers le château de Vincennes en 1934.", "ambiguite": false, "tags": ["Révolution et République", "Monuments et Lieux Emblématiques"]}, "Nationale": {"geographie": {"lignes": ["6"], "commune": "Paris", "code_insee": "75056", "latitude": 48.83323527967617, "longitude": 2.3628041715935075}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "La station aérienne dessert la très longue rue Nationale, artère du 13e arrondissement baptisée fièrement sous la Deuxième République pour célébrer la souveraineté indivisible du peuple.", "description longue": "Le nom de cette station aérienne souligne le caractère très républicain et profondément patriotique du quartier, dont de nombreuses rues avoisinantes rendent un majestueux hommage aux grandes institutions françaises."}, "description courte": "La station tire son nom de la rue Nationale, située dans le 13e arrondissement, elle-même nommée ainsi en référence à la Nation française.", "description longue": "Ouverte en 1909 sur la ligne 6, la station 'Nationale' doit son nom à la rue Nationale qu'elle dessert. Contrairement à d'autres stations célébrant une bataille ou une personnalité, ce nom est une référence directe à la République et à l'identité nationale. Il est intéressant de noter que la station se trouve à proximité de la place d'Italie, point névralgique du 13e arrondissement. Bien que le nom semble simple, il témoigne de la volonté, au début du XXe siècle, d'ancrer la toponymie parisienne dans les symboles républicains. Il n'existe pas de lien direct avec l'ancienne 'Manufacture Nationale des Gobelins', bien que la station soit située dans le quartier des Gobelins, ce qui crée parfois une confusion chez les usagers.", "ambiguite": false, "tags": ["Révolution et République", "Institutions Civiques et Politiques"]}, "Notre-Dame-de-Lorette": {"geographie": {"lignes": ["12"], "commune": "Paris", "code_insee": "75056", "latitude": 48.87604417483004, "longitude": 2.3379007718233322}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "L'église Notre-Dame-de-Lorette est un très imposant édifice religieux d'inspiration antique, qui a donné son nom à ce quartier jadis connu pour ses fameuses lorettes du XIXe siècle.", "description longue": "La station tire son nom de l'église néoclassique toute proche, elle-même nommée avec ferveur d'après le très célèbre sanctuaire de pèlerinage italien de la Sainte Maison de Lorette (Loreto)."}, "description courte": "La station tire son nom de l'église Notre-Dame-de-Lorette, édifice néo-classique dédié à la Vierge, situé au cœur du quartier éponyme dans le 9e arrondissement.", "description longue": "La station Notre-Dame-de-Lorette, inaugurée en 1910 sur la ligne 12 (anciennement ligne A de la société Nord-Sud), tire son appellation de l'église éponyme construite entre 1823 et 1836 par l'architecte Hippolyte Le Bas. Le nom fait référence à la ville italienne de Lorette, célèbre sanctuaire marial abritant la « Sainte Maison » de la Vierge. Au XIXe siècle, le quartier entourant l'église est devenu le symbole de la bohème parisienne et des « lorettes », ces jeunes femmes entretenues par des hommes fortunés, terme popularisé par le journaliste Nestor Roqueplan. Bien que l'église soit un monument architectural remarquable du style néo-classique, le nom de la station est intimement lié à l'urbanisme du 9e arrondissement et aux mutations socioculturelles du Paris romantique.", "ambiguite": false, "tags": ["L'architecture religieuse", "Monuments et Lieux Emblématiques"]}, "Notre-Dame-des-Champs": {"geographie": {"lignes": ["12"], "commune": "Paris", "code_insee": "75056", "latitude": 48.84508150807547, "longitude": 2.328564944227944}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Le nom de la rue provient de l'église Notre-Dame-des-Champs, dont les vieilles origines remontent à un ancien sanctuaire édifié jadis en plein champ à l'extérieur des remparts de Paris.", "description longue": "La station se trouve sous le grand boulevard Raspail, à proximité immédiate de la belle rue Notre-Dame-des-Champs qui rappelle le caractère résolument rural et très ancien du quartier de Montparnasse."}, "description courte": "La station tire son nom d'un ancien couvent bénédictin du XVIIe siècle situé près de l'actuel jardin du Luxembourg, dédié à la Vierge Marie.", "description longue": "Le nom de cette station, située sur la ligne 12, évoque l'abbaye du Val-de-Grâce et, plus précisément, le couvent des Bénédictines de Notre-Dame-des-Champs fondé en 1604. Situé dans le quartier du Luxembourg, cet établissement religieux était alors implanté dans une zone encore rurale, ce qui explique le suffixe « des Champs ». Le couvent fut un haut lieu de la vie spirituelle parisienne avant d'être supprimé à la Révolution. Aujourd'hui, la station dessert un secteur profondément marqué par l'histoire littéraire et artistique du quartier Montparnasse, bien que son appellation demeure un vestige direct de la topographie religieuse du Paris du Grand Siècle, bien avant l'urbanisation haussmannienne massive du quartier.", "ambiguite": false, "tags": ["L'architecture religieuse", "Anciens Villages et Hameaux"]}, "Oberkampf": {"geographie": {"lignes": ["5", "9"], "commune": "Paris", "code_insee": "75056", "latitude": 48.86487188759515, "longitude": 2.3682236708807456}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Christophe-Philippe Oberkampf (1738-1815) fut un très grand industriel français d'origine bavaroise, fondateur florissant de la célèbre manufacture royale de toiles imprimées (la toile de Jouy).", "description longue": "La station prend le nom de la très passante rue Oberkampf. Elle honore l'inventeur pionnier de l'industrie textile, ami avisé des sciences et créateur merveilleux des célèbres motifs de Jouy-en-Josas."}, "description courte": "La station tire son nom de la rue Oberkampf, laquelle honore Christophe-Philippe Oberkampf, célèbre industriel franco-allemand, pionnier de la manufacture de toiles imprimées « Jouy ».", "description longue": "La station Oberkampf, ouverte en 1907, doit son nom à la rue éponyme. Christophe-Philippe Oberkampf (1738-1815) est une figure majeure de la révolution industrielle française. Fondateur de la manufacture de Jouy-en-Josas en 1760, il a révolutionné l'industrie textile en introduisant les toiles de coton imprimées, connues sous le nom de « toiles de Jouy ». Son succès fut tel que Napoléon Bonaparte l'a décoré de la première Légion d'honneur accordée à un industriel. Bien que le nom semble germanique, il s'agit d'une figure clé de l'économie française du XVIIIe siècle. La rue Oberkampf elle-même, située dans le 11e arrondissement, est devenue au fil des décennies un symbole emblématique de la vie nocturne et de la gentrification parisienne, bien que le patronyme soit ancré dans l'histoire technologique et manufacturière du pays.", "ambiguite": false, "tags": ["Sciences, Médecine et Techniques", "Topographie et Urbanisme"]}, "Odéon": {"geographie": {"lignes": ["10", "4"], "commune": "Paris", "code_insee": "75056", "latitude": 48.852175453081486, "longitude": 2.3395157696170745}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "L'Odéon désigne le célèbre et majestueux théâtre de l'Europe inauguré en grande pompe en 1782, situé à très proche distance des magnifiques jardins du palais du Luxembourg.", "description longue": "La station porte le nom de l'élégante place de l'Odéon. Le toponyme fait référence à l'imposant édifice théâtral bâti à l'emplacement exact de l'ancien vaste hôtel particulier du prince de Condé."}, "description courte": "La station tire son nom du théâtre de l'Odéon, monument emblématique inspiré des édifices grecs antiques dédiés au chant et aux représentations musicales.", "description longue": "Le nom 'Odéon' provient du grec ancien 'odeion', désignant un lieu destiné aux concours de chant et de musique. À Paris, cette appellation est indissociable du Théâtre de l'Odéon, construit à la fin du XVIIIe siècle sous le règne de Louis XVI. Inauguré en 1782, cet édifice monumental a été érigé sur l'emplacement de l'ancien hôtel de Condé, au cœur du quartier latin. Bien que le bâtiment ait subi deux incendies majeurs (en 1799 et 1818), il a toujours été reconstruit, conservant sa vocation de temple des arts et du spectacle. La station de métro, ouverte en 1910, dessert ce haut lieu culturel tout en s'ancrant dans le paysage intellectuel du quartier, où se croisent l'histoire des Lumières et la vie étudiante.", "ambiguite": false, "tags": ["Arts et Culture", "Monuments et Lieux Emblématiques"]}, "Olympiades": {"geographie": {"lignes": ["14"], "commune": "Paris", "code_insee": "75056", "latitude": 48.826944155043044, "longitude": 2.367034270941924}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Les Olympiades désignent le très grand projet immobilier futuriste des années 1970 du 13e arrondissement, dont les hautes tours d'habitation portent des noms d'anciennes villes hôtes olympiques.", "description longue": "Ouverte en 2007, cette station souterraine spacieuse au cœur du quartier asiatique a pris le nom de cette audacieuse et immense dalle surélevée, symbolisant pleinement la modernité de l'urbanisme parisien."}, "description courte": "La station doit son nom au quartier des Olympiades, un ensemble immobilier des années 1970 nommé ainsi en hommage aux Jeux olympiques de 1968.", "description longue": "La station Olympiades, terminus sud de la ligne 14 inauguré en 2007, tire son nom du quartier voisin, un vaste complexe résidentiel et commercial du 13e arrondissement, construit dans les années 1970 sur l'ancien site de l'usine Panhard et Levassor. Le nom 'Les Olympiades' fut choisi en référence aux Jeux olympiques de Grenoble (1968) et de Mexico (1968). À l'origine, les tours du quartier portaient des noms de villes ayant accueilli les Jeux olympiques (Athènes, Sapporo, Cortina, Mexico, etc.). Bien que le quartier soit devenu le cœur du quartier asiatique de Paris, le nom est resté, témoignant de l'ambition urbanistique moderne de l'époque.", "ambiguite": false, "tags": ["Géographie et International", "Architecture urbaine : Les grandes gares"]}, "Opéra": {"geographie": {"lignes": ["3", "7", "8"], "commune": "Paris", "code_insee": "75056", "latitude": 48.87143742899726, "longitude": 2.331047286711241}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "L'opéra Garnier est le splendide palais national de la musique et de la danse, chef-d'œuvre architectural éclectique et ornementé édifié sous le Second Empire.", "description longue": "La station de correspondance s'ouvre magistralement sur la prestigieuse place de l'Opéra. Le toponyme désigne directement le somptueux chef-d'œuvre commandé par l'empereur Napoléon III au génial architecte Charles Garnier."}, "description courte": "La station tire son nom du palais Garnier, chef-d'œuvre architectural érigé sous Napoléon III, pôle culturel majeur situé au cœur du quartier des théâtres parisien.", "description longue": "La station Opéra, ouverte en 1904, doit son nom à l'Opéra Garnier, monument emblématique construit par l'architecte Charles Garnier entre 1861 et 1875. Commandé par Napoléon III dans le cadre des grands travaux de transformation de Paris menés par le baron Haussmann, ce bâtiment est le fleuron du style Second Empire. Initialement appelée 'Académie Royale de Musique' puis 'Opéra', l'institution a donné son nom à tout le quartier environnant. Anecdote historique : lors de la construction du métro, la station a dû s'adapter à la présence de la nappe phréatique sous la place de l'Opéra, une contrainte technique majeure pour l'époque. Elle constitue aujourd'hui un nœud stratégique reliant les lignes 3, 7 et 8, et demeure un point de repère incontournable de l'urbanisme parisien.", "ambiguite": false, "tags": ["Monuments et Lieux Emblématiques", "Architecture urbaine : Les grandes gares", "Arts et Culture"]}, "Ourcq": {"geographie": {"lignes": ["5"], "commune": "Paris", "code_insee": "75056", "latitude": 48.88691595319499, "longitude": 2.386652016759884}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "L'Ourcq est une rivière d'Île-de-France dont les eaux douces furent canalisées sur décision de Napoléon Bonaparte pour alimenter largement Paris via l'utile canal de l'Ourcq.", "description longue": "La station est située non loin du célèbre canal de l'est parisien et sous la rue de l'Ourcq, rappelant l'immense et crucial chantier hydraulique engagé sous le dynamique Premier Empire."}, "description courte": "La station tire son nom de la rue de l'Ourcq, baptisée ainsi en référence au canal de l'Ourcq qui traverse le nord-est parisien.", "description longue": "La station Ourcq, située sur la ligne 5, doit son nom à la rue de l'Ourcq, artère majeure du 19e arrondissement. Cette dénomination rend hommage au canal de l'Ourcq, un ouvrage hydraulique décisif pour l'alimentation en eau potable de Paris au XIXe siècle. Conçu sous l'impulsion de Napoléon Ier et achevé sous la Restauration, ce canal permettait de relier la rivière Ourcq à la Seine, transformant ainsi radicalement l'urbanisme et l'approvisionnement de la capitale. Bien que la station soit un point de transit urbain moderne, elle reste indissociable de l'histoire industrielle et fluviale du quartier de la Villette, zone de transformation intense depuis la Révolution industrielle.", "ambiguite": false, "tags": ["Géographie et International", "Topographie et Urbanisme"]}, "Palais Royal - Musée du Louvre": {"geographie": {"lignes": ["1", "7"], "commune": "Paris", "code_insee": "75056", "latitude": 48.86276538184415, "longitude": 2.3370872868854393}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Le Palais-Royal fut la somptueuse résidence du cardinal de Richelieu, tandis que le très vaste Louvre voisin fut le grand domaine des rois de France avant de devenir musée.", "description longue": "Anciennement nommée Palais Royal, la station de métro associe très judicieusement ces deux somptueux ensembles palatiaux historiques, dont le second abrite incontestablement la plus importante collection d'art au monde."}, "description courte": "La station évoque le Palais-Royal, ancienne résidence royale, et le Musée du Louvre, prestigieux palais transformé en l'un des plus grands musées d'art au monde.", "description longue": "Inaugurée en 1900 sous le nom 'Palais-Royal', la station a intégré 'Musée du Louvre' en 1989 pour accompagner l'inauguration de la célèbre pyramide de verre de I.M. Pei. Le Palais-Royal, bâti par Richelieu sous le nom de Palais-Cardinal, fut le siège du pouvoir avant d'être légué à la Couronne. Le Louvre, forteresse médiévale devenue palais de la Renaissance, abrite les collections nationales depuis la Révolution française. Cette double appellation souligne la stratification historique du site, témoignant à la fois de la vie politique sous l'Ancien Régime et du rayonnement culturel universel de la France. Une anecdote notable est l'installation de l'œuvre 'Le Kiosque des Noctambules' de Jean-Michel Othoniel, qui orne l'une des bouches de métro depuis 2000, mêlant art contemporain et héritage historique.", "ambiguite": false, "tags": ["Châteaux et Palais historiques", "Monuments et Lieux Emblématiques", "Arts et Culture"]}, "Parmentier": {"geographie": {"lignes": ["3"], "commune": "Paris", "code_insee": "75056", "latitude": 48.865162111168765, "longitude": 2.3746806763746613}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": ["XVIIIe siècle", "XIXe siècle"], "details_personne": {"nom": "Antoine Parmentier", "annee_naissance": 1737, "annee_deces": 1813, "siecles_vecus": ["XVIIIe siècle", "XIXe siècle"]}, "description courte": "Antoine Parmentier (1737-1813) fut un très grand pharmacien et agronome français, resté célèbre pour avoir ingénieusement popularisé la culture de la pomme de terre en France.", "description longue": "La station est située sous la longue avenue Parmentier. Ce toponyme rend un très brillant hommage au célèbre nutritionniste humaniste dont les recherches agronomiques acharnées permirent de combattre victorieusement les disettes."}, "description courte": "La station rend hommage à Antoine Parmentier, agronome et nutritionniste du XVIIIe siècle, célèbre pour avoir popularisé la consommation de la pomme de terre en France.", "description longue": "La station Parmentier, située sur la ligne 3, tire son nom de l'avenue Parmentier, elle-même nommée en l'honneur d'Antoine-Auguste Parmentier (1737-1813). Pharmacien militaire et agronome, Parmentier est resté dans l'histoire pour son combat acharné en faveur de la pomme de terre, alors considérée comme impropre à la consommation humaine et réservée au bétail. Après avoir découvert ce tubercule lors de sa captivité en Prusse pendant la guerre de Sept Ans, il multiplie les expériences culinaires et les démonstrations publiques pour convaincre les autorités et la cour de sa valeur nutritionnelle, sauvant ainsi de nombreuses populations des famines récurrentes. L'anecdote veut qu'il ait fait protéger ses champs de pommes de terre par des gardes armés pour susciter la curiosité des riverains, qui finirent par voler les plants, les croyant précieux. La station est également connue pour avoir abrité, jusqu'en 2011, un wagon de métro de type Sprague-Thomson, témoin de l'histoire ferroviaire parisienne, installé en mémoire de l'agronome.", "ambiguite": false, "tags": ["Sciences, Médecine et Techniques"]}, "Passy": {"geographie": {"lignes": ["6"], "commune": "Paris", "code_insee": "75056", "latitude": 48.85751508962033, "longitude": 2.285839418881462}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Passy fut un charmant village bourgeois très réputé pour ses pures eaux minérales et l'élégance de ses demeures, rattaché administrativement au 16e arrondissement de Paris en 1860.", "description longue": "Partiellement souterraine et aérienne, la station prend le nom de la très commerçante rue de Passy, artère historique de cette ancienne commune thermale huppée très prisée autrefois par Benjamin Franklin."}, "description courte": "La station tire son nom de l'ancien village de Passy, intégré à Paris en 1860, dont l'appellation remonte probablement au domaine gallo-romain de 'Passiacum'.", "description longue": "Le nom 'Passy' puise ses racines dans l'époque gallo-romaine, dérivant probablement du domaine rural d'un certain 'Paccius' ('Passiacum'). Historiquement, Passy était un village viticole prisé pour son air pur et ses eaux minérales, attirant l'aristocratie et les intellectuels au XVIIIe siècle, dont Benjamin Franklin. La commune fut annexée par Paris lors de l'extension de 1860 sous le Second Empire. L'anecdote ferroviaire notable concerne la configuration de la station : située en tranchée ouverte, elle est emblématique du style de la ligne 6, offrant une vue plongeante sur le quartier avant que la ligne ne s'élève sur le viaduc vers le pont de Bir-Hakeim. Contrairement à de nombreuses stations parisiennes, elle n'est pas un nom composé, conservant l'identité simple de l'ancien bourg devenu un quartier résidentiel huppé.", "ambiguite": false, "tags": ["Anciens Villages et Hameaux", "Topographie et Urbanisme"]}, "Pasteur": {"geographie": {"lignes": ["12", "6"], "commune": "Paris", "code_insee": "75056", "latitude": 48.842528387543226, "longitude": 2.3129146804739396}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": ["XIXe siècle"], "details_personne": {"nom": "Louis Pasteur", "annee_naissance": 1822, "annee_deces": 1895, "siecles_vecus": ["XIXe siècle"]}, "description courte": "Louis Pasteur (1822-1895) fut un illustre biologiste, microbiologiste et grand chimiste français, père scientifique mondialement reconnu pour sa brillante et salvatrice invention du vaccin contre la rage.", "description longue": "La station dessert le très grand et large boulevard Pasteur. Elle honore le chercheur scientifique de génie, fondateur inoubliable de l'institut voisin qui veille encore rigoureusement aujourd'hui à l'étude des maladies infectieuses."}, "description courte": "La station rend hommage au chimiste et biologiste français Louis Pasteur, célèbre pour ses travaux sur les vaccins et la pasteurisation.", "description longue": "Située dans le 15e arrondissement, la station Pasteur honore Louis Pasteur (1822-1895), père de la microbiologie moderne. Inaugurée en 1906, elle dessert le secteur où se trouve l'Institut Pasteur, fondé par le savant lui-même en 1887. Il s'agit d'une station de correspondance majeure entre les lignes 6 et 12. Une anecdote intéressante concerne son aménagement : la ligne 6 y circule en aérien, offrant une vue sur le boulevard Pasteur, tandis que la ligne 12 est souterraine. Bien que le nom semble simple, il souligne l'ancrage scientifique du quartier, entouré d'hôpitaux et d'institutions de recherche médicale.", "ambiguite": false, "tags": ["Sciences, Médecine et Techniques"]}, "Pelleport": {"geographie": {"lignes": ["3B"], "commune": "Paris", "code_insee": "75056", "latitude": 48.86846488701483, "longitude": 2.4014967922879253}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Pierre de Pelleport (1773-1855) fut un très brave général de division des invincibles armées de l'Empire et un membre fervent et loyal de la Chambre des pairs.", "description longue": "La station très profonde porte le nom de la rue Pelleport à Ménilmontant, célébrant solennellement l'intrépide officier supérieur très gravement blessé lors de la terrible et sanglante bataille d'Eylau."}, "description courte": "La station tire son nom de la rue Pelleport, elle-même nommée en l'honneur du vicomte Pierre de Pelleport, général d'Empire ayant servi sous Napoléon Ier.", "description longue": "La station Pelleport, située sur la ligne 3 bis, doit son nom à la rue éponyme du 20e arrondissement. Cette voie rend hommage au vicomte Pierre de Pelleport (1773-1855), un général français qui s'est illustré durant les guerres napoléoniennes, notamment lors des campagnes d'Autriche, de Prusse et de Pologne. Blessé à plusieurs reprises, il devint par la suite lieutenant général et pair de France sous la Restauration. Contrairement à d'autres stations du quartier (comme Porte de Bagnolet ou Porte des Lilas), 'Pelleport' n'est pas une porte de l'enceinte de Thiers, mais un hommage à une figure militaire. La station est également connue pour être l'une des plus profondes du réseau, située sous le plateau de Ménilmontant, et pour avoir été construite avec une architecture souterraine marquée par une voûte très haute, bien qu'elle soit aujourd'hui l'une des moins fréquentées du métro parisien.", "ambiguite": false, "tags": ["Les victoires et batailles militaires"]}, "Pereire": {"geographie": {"lignes": ["3"], "commune": "Paris", "code_insee": "75056", "latitude": 48.88484432273985, "longitude": 2.2976831860125837}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Les frères Émile (1800-1875) et Isaac Pereire (1806-1880) furent des financiers et industriels extrêmement visionnaires, de très grands pionniers du développement des chemins de fer en France.", "description longue": "La station dessert l'élégante place et le long boulevard Pereire, honorant ces deux banquiers audacieux du Second Empire qui jouèrent un rôle absolument clé dans la formidable révolution industrielle ferroviaire."}, "description courte": "La station tire son nom du boulevard Pereire, en hommage aux frères Émile et Isaac Pereire, célèbres banquiers et promoteurs du chemin de fer au XIXe siècle.", "description longue": "La station Pereire, située sur la ligne 3, doit son nom au boulevard Pereire, lequel honore la mémoire d'Émile et Isaac Pereire. Ces deux frères furent des figures centrales du Second Empire : banquiers influents, ils ont fondé le Crédit Mobilier et furent les principaux promoteurs du développement du réseau ferroviaire français, notamment la ligne d'Auteuil (petite ceinture). Leur influence fut telle qu'ils ont durablement marqué l'urbanisme parisien. Il est intéressant de noter que le boulevard Pereire a été tracé à l'emplacement même de l'ancienne ligne de Petite Ceinture, transformant une infrastructure industrielle en une promenade urbaine arborée. La station est aujourd'hui une correspondance importante avec le RER C, rappelant encore le lien historique fort entre les frères Pereire et le transport ferroviaire.", "ambiguite": false, "tags": ["Sciences, Médecine et Techniques", "Architecture urbaine : Les grandes gares"]}, "Pernety": {"geographie": {"lignes": ["13"], "commune": "Paris", "code_insee": "75056", "latitude": 48.83389625601307, "longitude": 2.3179465189168287}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Joseph Marie de Pernety (1766-1856) fut un vicomte courageux et un très brillant général de division d'artillerie, acteur militaire majeur des guerres de la Révolution et de l'Empire.", "description longue": "La station prend le nom de la petite rue Pernety, située dans le quartier résidentiel de Plaisance, qui commémore brillamment l'un des plus talentueux et fiables commandants d'artillerie des armées napoléoniennes."}, "description courte": "La station doit son nom à la rue Pernety, baptisée en hommage au vicomte Joseph Marie de Pernety, général de division sous la Révolution et l'Empire.", "description longue": "La station Pernety, située sur la ligne 13 dans le 14e arrondissement, tire son nom de la rue éponyme. Cette voie honore la mémoire de Joseph Marie de Pernety (1766-1856), général français qui s'est illustré durant les campagnes révolutionnaires, puis sous le Premier Empire, notamment lors de la bataille de Wagram où il fut gravement blessé. Ancien gouverneur des Tuileries, sa carrière illustre les mutations militaires de son époque. Il est à noter que la rue fut ouverte en 1860 sur des terrains appartenant à son gendre, le propriétaire foncier de l'époque. La station, ouverte en 1937, témoigne de la tradition parisienne consistant à nommer les voies urbaines d'après des figures militaires locales ayant marqué l'histoire nationale.", "ambiguite": false, "tags": ["Les victoires et batailles militaires", "Révolution et République"]}, "Philippe Auguste": {"geographie": {"lignes": ["2"], "commune": "Paris", "code_insee": "75056", "latitude": 48.858089428135756, "longitude": 2.390497596745289}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": ["XIIe siècle", "XIIIe siècle"], "details_personne": {"nom": "Philippe Auguste", "annee_naissance": 1165, "annee_deces": 1223, "siecles_vecus": ["XIIe siècle", "XIIIe siècle"]}, "description courte": "Philippe II Auguste (1165-1223) fut un très grand roi de France, un bâtisseur acharné à qui l'on doit la puissante enceinte fortifiée de Paris et le château du Louvre.", "description longue": "La station est implantée sous la grande avenue Philippe-Auguste. Ce toponyme souligne l'ampleur monumentale du règne de ce grand roi conquérant qui transforma, embellit et modernisa durablement la physionomie de la capitale."}, "description courte": "La station tire son nom du roi Philippe II, dit Philippe Auguste, célèbre souverain médiéval ayant fortifié Paris et construit le premier mur d'enceinte.", "description longue": "La station Philippe Auguste, située sur la ligne 2, rend hommage à Philippe II (1165-1223). Surnommé Philippe Auguste, ce roi de la dynastie des Capétiens a transformé Paris en une capitale européenne majeure. Sous son règne, il fait paver les rues, crée les Halles et, surtout, fait bâtir l'enceinte fortifiée qui protégeait la ville sur la rive droite, dont le Louvre était alors le point stratégique. Le nom de la station évoque cet héritage médiéval et la structuration urbaine de la cité. Contrairement aux stations nommées d'après des lieux géographiques proches, celle-ci célèbre directement l'œuvre politique et défensive du monarque. L'anecdote historique veut que le choix de ce nom souligne l'importance du souverain dans l'histoire de la ville, tout en étant situé à proximité de l'ancien cimetière du Père-Lachaise, qui occupe une partie de l'espace fortifié jadis cher au roi.", "ambiguite": false, "tags": ["Institutions Civiques et Politiques", "Les victoires et batailles militaires"]}, "Picpus": {"geographie": {"lignes": ["6"], "commune": "Paris", "code_insee": "75056", "latitude": 48.84510324750185, "longitude": 2.4012745388223746}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Picpus était un ancien village francilien dont l'étymologie pourrait dériver de pique-puce, en référence familière et humoristique aux insectes, ou d'une guérison jugée miraculeuse due à un ermite local.", "description longue": "La station tire son nom très particulier du boulevard de Picpus. Elle rappelle discrètement le très tragique cimetière secret où furent enfouies dans de terribles fosses communes plus de mille victimes de la Terreur."}, "description courte": "Picpus tire son nom d'un ancien hameau rattaché à Paris, dont l'étymologie obscure évoquerait soit un lieu escarpé, soit un ancien couvent de la région.", "description longue": "Le nom 'Picpus' désigne à l'origine un lieu-dit situé sur l'ancienne commune de Charonne, annexée par Paris en 1860. Historiquement, le site est indissociable du couvent des chanoinesses de Saint-Augustin, fondé au XVIIe siècle. La station est surtout célèbre pour sa proximité avec le cimetière de Picpus, lieu de mémoire funeste de la Terreur où sont inhumés des centaines de guillotinés, dont le général La Fayette. Sur le plan étymologique, le terme demeure mystérieux : s'il est souvent lié aux 'pique-puces' (surnom dépréciatif donné aux religieux), certains historiens y voient une altération de 'pique-pus', évoquant une colline ou un relief escarpé ('pic') dominant une zone boisée ('pus' ou 'puy').", "ambiguite": true, "tags": ["Anciens Villages et Hameaux", "Révolution et République", "Monuments et Lieux Emblématiques"]}, "Pierre et Marie Curie": {"geographie": {"lignes": ["7"], "commune": "Ivry-sur-Seine", "code_insee": "94041", "latitude": 48.81587757774557, "longitude": 2.377362970985953}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": ["XIXe siècle", "XXe siècle"], "details_personne": {"nom": "Pierre et Marie Curie", "annee_naissance": 1859, "annee_deces": 1934, "siecles_vecus": ["XIXe siècle", "XXe siècle"]}, "description courte": "Pierre (1859-1906) et Marie Curie (1867-1934) furent des physiciens lauréats du prestigieux prix Nobel, pionniers exceptionnels de la radioactivité et grands découvreurs du polonium et du radium.", "description longue": "Anciennement nommée Pierre Curie, la station a été très justement et symboliquement rebaptisée en 2007 pour intégrer le nom immense de son épouse, la seule femme scientifique à avoir obtenu deux prix Nobel scientifiques distincts."}, "description courte": "La station rend hommage aux physiciens Pierre et Marie Curie, pionniers de la recherche sur la radioactivité et lauréats du prix Nobel.", "description longue": "Située sur la ligne 7 à Ivry-sur-Seine, cette station, ouverte en 1946, portait initialement le nom de 'Pierre Curie' avant d'être renommée en 2007 pour inclure Marie Curie. Ce changement souligne l'importance scientifique majeure de Marie Curie, première femme à avoir reçu un prix Nobel et seule femme à avoir été honorée dans deux domaines scientifiques différents. Le couple a marqué l'histoire par la découverte du polonium et du radium. Anecdote historique : le choix de nommer une station en hommage à un couple scientifique illustre une volonté de la RATP de féminiser davantage la nomenclature du réseau parisien.", "ambiguite": false, "tags": ["Sciences, Médecine et Techniques", "Les Femmes Illustres"]}, "Pigalle": {"geographie": {"lignes": ["12", "2"], "commune": "Paris", "code_insee": "75056", "latitude": 48.882269542226226, "longitude": 2.338257976509587}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Jean-Baptiste Pigalle (1714-1785) est un célèbre et brillant maître sculpteur français de l'époque rococo et néoclassique, très apprécié et soutenu par Madame de Pompadour.", "description longue": "La station est très idéalement située au carrefour très fréquenté de la place et de la rue Pigalle, épicentre bouillonnant d'un quartier sulfureux et nocturne baptisé jadis en l'honneur de ce sculpteur de grand talent."}, "description courte": "La station tire son nom de la place Pigalle, elle-même baptisée en hommage au célèbre sculpteur français Jean-Baptiste Pigalle (1714-1785), figure majeure du XVIIIe siècle.", "description longue": "La station Pigalle, située à la limite des 9e et 18e arrondissements, doit son nom au sculpteur Jean-Baptiste Pigalle. Ce dernier était un artiste renommé sous le règne de Louis XV, célèbre pour son 'Mercure rattachant ses talonnières' et son monumental tombeau du maréchal de Saxe. La place qui porte son nom est située sur l'ancien emplacement de la barrière Montmartre, l'une des portes du mur des Fermiers généraux, qui marquait l'entrée dans Paris avant l'annexion des communes périphériques. Au XIXe siècle, la place Pigalle est devenue le cœur artistique de la Nouvelle Athènes, fréquentée par des peintres tels que Degas ou Toulouse-Lautrec. Contrairement à d'autres stations, le nom 'Pigalle' est simple et ne présente pas de caractère composé, bien qu'il soit indissociable de l'identité du quartier de la vie nocturne parisienne et du cabaret du Moulin Rouge tout proche.", "ambiguite": false, "tags": ["Arts et Culture", "Monuments et Lieux Emblématiques"]}, "Place Monge": {"geographie": {"lignes": ["7"], "commune": "Paris", "code_insee": "75056", "latitude": 48.842683564383904, "longitude": 2.3520055901754713}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Gaspard Monge (1746-1818) fut un mathématicien hors pair, grand et ingénieux inventeur de la géométrie descriptive et l'un des fondateurs prestigieux de l'École polytechnique.", "description longue": "La station s'ouvre sur la très agréable et pittoresque place Monge, en plein cœur du Quartier latin, honorant fidèlement l'un des savants et brillants professeurs les plus illustres de la période de la Révolution."}, "description courte": "La station tire son nom de la place Monge, baptisée en l'honneur du célèbre mathématicien Gaspard Monge, fondateur de l'École polytechnique sous la Révolution française.", "description longue": "La station Place Monge, ouverte en 1930 sur la ligne 7, rend hommage à Gaspard Monge (1746-1818). Mathématicien brillant et créateur de la géométrie descriptive, il fut une figure centrale de la période révolutionnaire et napoléonienne. Il est notamment célèbre pour avoir cofondé l'École polytechnique et accompagné Bonaparte lors de la campagne d'Égypte. La place elle-même a été créée lors des grands travaux de restructuration du quartier Latin au XIXe siècle, sous le Second Empire. Une anecdote notable : lors du creusement de la station, des vestiges archéologiques gallo-romains furent mis au jour, rappelant que la station se trouve à proximité immédiate des Arènes de Lutèce, témoignant de la riche stratification historique du Ve arrondissement.", "ambiguite": false, "tags": ["Sciences, Médecine et Techniques", "Révolution et République"]}, "Place d'Italie": {"geographie": {"lignes": ["5", "6", "7"], "commune": "Paris", "code_insee": "75056", "latitude": 48.83154024475565, "longitude": 2.355303769754901}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "La place d'Italie se trouve à l'emplacement exact de l'ancienne barrière d'octroi de Fontainebleau, sur la très longue et historique route menant la capitale vers la péninsule italienne.", "description longue": "Ce carrefour étoilé incontournable de la Rive gauche prend très logiquement le nom du grand axe routier national du sud qui relie traditionnellement et géographiquement Paris à l'Italie."}, "description courte": "La station tire son nom de la place éponyme, créée en 1860, nommée ainsi car elle marquait le début de la route menant de Paris vers l'Italie.", "description longue": "Le nom 'Place d'Italie' tire son origine de sa position stratégique en tant que point de départ de la route nationale 7, qui reliait historiquement Paris à la frontière italienne par Lyon. Lors de l'annexion des communes périphériques sous le Second Empire en 1860, cette place est devenue un carrefour névralgique et un centre administratif du 13e arrondissement. Elle se situe à l'emplacement de l'ancienne barrière d'Italie, une des portes du mur des Fermiers généraux où s'effectuait la perception des taxes d'octroi. La station, ouverte en 1906, est une prouesse d'ingénierie souterraine, car elle constitue l'un des rares nœuds de correspondance majeurs desservis par trois lignes historiques (5, 6 et 7). Une anecdote peu connue concerne le projet d'urbanisme radical des années 1960, baptisé 'Italie 13', qui prévoyait de transformer radicalement le quartier avec des gratte-ciels, projet finalement freiné par la crise pétrolière et la mobilisation des riverains.", "ambiguite": false, "tags": ["Géographie et International", "Topographie et Urbanisme"]}, "Place de Clichy": {"geographie": {"lignes": ["13", "2"], "commune": "Paris", "code_insee": "75056", "latitude": 48.88374519677981, "longitude": 2.3278987090661456}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "La place de Clichy se dresse à l'emplacement de l'ancienne barrière d'octroi du mur de Thiers, défendue héroïquement par le général Moncey face aux armées russes en 1814.", "description longue": "La station est implantée sous ce très grand carrefour extrêmement animé reliant quatre arrondissements, baptisé simplement du nom de la commune de Clichy-la-Garenne vers laquelle la grande avenue s'oriente."}, "description courte": "La station tire son nom de la place éponyme, située sur l'ancienne barrière de Clichy, un point d'accès majeur au nord de Paris.", "description longue": "La station 'Place de Clichy' doit son nom à la place située à la limite des 8e, 9e, 17e et 18e arrondissements. Historiquement, elle marque l'emplacement de l'ancienne barrière de Clichy, une des portes du mur des Fermiers généraux. Le nom 'Clichy' provient de l'ancien village de Clichy (Clichy-la-Garenne), situé au nord-ouest de Paris. Le terme 'Garenne' rappelle que le territoire était autrefois une réserve de chasse royale. Lors de la campagne de France en 1814, la barrière fut le théâtre d'une célèbre défense acharnée menée par le maréchal Moncey contre les troupes coalisées, un événement immortalisé par une statue sur la place et par plusieurs œuvres picturales majeures, dont celle d'Horace Vernet.", "ambiguite": false, "tags": ["Les Portes de Paris", "Les victoires et batailles militaires", "Anciens Villages et Hameaux"]}, "Place des Fêtes": {"geographie": {"lignes": ["11", "7B"], "commune": "Paris", "code_insee": "75056", "latitude": 48.87672366197325, "longitude": 2.393139370360497}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Cette place de Belleville accueillait jadis de très nombreux rassemblements festifs très joyeux organisés par l'ancienne municipalité de la commune pour le grand divertissement dominical de ses habitants.", "description longue": "La station, qui se distingue par le fait d'être l'une des plus profondes de Paris, honore l'ancienne et joyeuse esplanade festive de Belleville, devenue aujourd'hui le vaste centre pavé et commerçant d'un grand ensemble urbain."}, "description courte": "La station tire son nom de la place éponyme, située sur l'ancien village de Belleville, où se tenaient autrefois des fêtes publiques et des foires locales.", "description longue": "La station Place des Fêtes, desservie par les lignes 7 bis et 11, tire son nom d'une place créée au XIXe siècle dans le cadre des travaux d'urbanisme du quartier de Belleville. Historiquement, ce secteur correspondait à d'anciens terrains situés sur les hauteurs de l'ancien village de Belleville, annexé à Paris en 1860. Le nom rappelle la vocation festive et populaire du site, qui accueillait des foires et des réjouissances de plein air avant l'urbanisation dense du plateau. Une anecdote marquante concerne la profondeur de la station : en raison de la nature géologique instable du sous-sol (anciennes carrières de gypse), la station a été bâtie à une profondeur importante, ce qui en fit longtemps l'une des plus profondes du réseau avant l'extension de la ligne 11. Elle a également servi de refuge anti-aérien durant la Seconde Guerre mondiale, soulignant son importance stratégique pour les riverains.", "ambiguite": false, "tags": ["Anciens Villages et Hameaux", "Topographie et Urbanisme"]}, "Plaisance": {"geographie": {"lignes": ["13"], "commune": "Paris", "code_insee": "75056", "latitude": 48.831768583640276, "longitude": 2.3139011181482863}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Plaisance est un quartier du 14e arrondissement qui fut, avant sa très forte urbanisation, un charmant et reposant lieu de villégiature et de repos estival pour les citadins.", "description longue": "La station porte le nom très évocateur de la rue de Plaisance, qui rappelle avec une certaine nostalgie les anciens lotissements bucoliques très prisés jadis par les parisiens pour les joies et plaisirs de la promenade à la campagne."}, "description courte": "La station tire son nom de l'ancien quartier de Plaisance, situé sur le territoire de l'ex-commune de Vaugirard, annexée par Paris en 1860.", "description longue": "Le nom 'Plaisance' ne désigne pas ici une notion de loisir, mais fait référence à un ancien lieu-dit devenu un quartier administratif du 14e arrondissement. Historiquement, cette zone faisait partie de la commune de Vaugirard. Le nom apparaît au début du XIXe siècle pour baptiser un lotissement créé sur des terrains agricoles. L'urbanisation rapide de ce secteur, favorisée par l'annexion de 1860, a conservé cette appellation bucolique qui contraste avec le caractère ouvrier et dense qu'a pris le quartier au fil du siècle. Contrairement aux stations dont le nom provient d'une personnalité ou d'une bataille, Plaisance est un témoin de la toponymie locale villageoise, survivance d'un passé rural désormais totalement intégré au tissu urbain parisien.", "ambiguite": false, "tags": ["Anciens Villages et Hameaux", "Topographie et Urbanisme"]}, "Pointe du Lac": {"geographie": {"lignes": ["8"], "commune": "Créteil", "code_insee": "94028", "latitude": 48.76876136434425, "longitude": 2.464317312722042}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Le lac de Créteil est un très vaste plan d'eau artificiel de 40 hectares entouré d'espaces verts paysagers, extrêmement apprécié par les habitants de la région pour les loisirs.", "description longue": "Cette station aérienne très moderne, ouverte en 2011, dessert avantageusement le pôle de loisirs de la ville de Créteil, sa position géographique nommant et désignant très exactement la pointe méridionale de cette large étendue d'eau d'agrément."}, "description courte": "La station tire son nom du bassin artificiel voisin, la Pointe du Lac, situé au cœur du quartier créteilien du même nom, en bordure du lac.", "description longue": "Inaugurée en 2011 comme terminus de la ligne 8, la station 'Pointe du Lac' marque l'extension du réseau vers Créteil. Contrairement à de nombreuses stations parisiennes nommées d'après des figures historiques ou des lieux illustres, son nom est purement topographique. Il fait référence à l'aménagement paysager structuré autour du lac de Créteil, une base de loisirs créée dans les années 1970 à partir d'anciennes carrières alluvionnaires. Le nom 'Pointe du Lac' souligne la position géographique du quartier, situé à l'extrémité sud-ouest de cette vaste étendue d'eau, illustrant la volonté des urbanistes de l'époque de reconnecter la ville nouvelle à des espaces de respiration naturelle.", "ambiguite": false, "tags": ["Espaces Verts et Nature", "Topographie et Urbanisme"]}, "Poissonnière": {"geographie": {"lignes": ["7"], "commune": "Paris", "code_insee": "75056", "latitude": 48.87716484925024, "longitude": 2.3487397513900734}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "La rue Poissonnière faisait partie intégrante du long et très antique chemin des Poissonniers emprunté très jadis par les grands convois de marée venant directement de la Manche.", "description longue": "La station souligne et conserve pour la postérité la mémoire de cet axe économique majeur et rectiligne qui permettait d'acheminer en charrette le poisson frais du nord de la France vers le ventre historique des Halles."}, "description courte": "La station tire son nom de la rue du Faubourg-Poissonnière, ancien chemin emprunté par les poissonniers acheminant le poisson frais des ports vers les Halles.", "description longue": "La station Poissonnière, située sur la ligne 7, tire son nom de la rue du Faubourg-Poissonnière. Historiquement, ce tracé correspondait à l'antique « chemin des Poissonniers », un axe stratégique utilisé dès le Moyen Âge par les marchands pour acheminer le poisson frais en provenance des ports de la Manche (notamment Boulogne-sur-Mer) vers les Halles de Paris. Avant l'urbanisation intensive, il s'agissait d'un sentier rural traversant des terres agricoles. Le nom illustre parfaitement la topographie fonctionnelle du Paris ancien, où les noms de rues étaient souvent dictés par les flux logistiques des produits alimentaires. Contrairement à certaines stations, le lien avec l'activité économique médiévale est ici direct et documenté, bien que la rue ait été absorbée par le développement urbain du IXe et Xe arrondissements.", "ambiguite": false, "tags": ["Topographie et Urbanisme", "Anciens Villages et Hameaux"]}, "Pont Cardinet": {"geographie": {"lignes": ["14"], "commune": "Paris", "code_insee": "75056", "latitude": 48.88810340364297, "longitude": 2.3153681405051527}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Le pont Cardinet enjambe l'immense et large faisceau des voies ferrées partant de la gare Saint-Lazare. Cardinet fait référence à un grand propriétaire foncier local et ancien du quartier des Batignolles.", "description longue": "Nouvelle station de la ligne 14, elle prend son nom du pont routier qu'elle borde, commémorant une figure locale dont la riche famille posséda des terres avant le développement massif industriel."}, "description courte": "La station tire son nom du pont Cardinet, ouvrage franchissant les voies ferrées de la gare Saint-Lazare, baptisé en hommage à l'entrepreneur François Cardinet.", "description longue": "Le nom de la station 'Pont Cardinet' fait référence à un ouvrage d'art situé dans le 17e arrondissement de Paris. Ce pont enjambe le faisceau ferroviaire partant de la gare Saint-Lazare. L'appellation honore François Cardinet, un entrepreneur et propriétaire terrien du XVIIIe siècle dont les terrains furent lotis pour permettre le développement du quartier des Batignolles. Historiquement, le pont a été un point de passage stratégique lors de l'urbanisation de la plaine Monceau. Bien que le quartier soit marqué par une forte identité ferroviaire, le nom reste intrinsèquement lié à l'évolution foncière du quartier et à la mémoire de ce propriétaire dont la rue et le pont perpétuent l'existence. L'ouverture de la station sur la ligne 14 en 2020 a modernisé ce secteur historique, tout en ancrant davantage ce toponyme dans la mémoire collective des usagers parisiens.", "ambiguite": false, "tags": ["Topographie et Urbanisme", "Architecture urbaine : Les grandes gares"]}, "Pont Marie (Cité des Arts)": {"geographie": {"lignes": ["7"], "commune": "Paris", "code_insee": "75056", "latitude": 48.85341474936241, "longitude": 2.357349968447059}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Christophe Marie (1580-1652) fut un audacieux entrepreneur général des ponts de France, célèbre pour l'aménagement de l'île Saint-Louis et la création du magnifique pont Marie en pierre.", "description longue": "La station emprunte le nom de l'un des plus anciens et solides ponts de pierre de la capitale, qui relie la rive droite à l'île Saint-Louis, jadis couverte d'élégantes et majestueuses demeures."}, "description courte": "La station tire son nom du pont Marie, bâti au XVIIe siècle, et du complexe culturel de la Cité internationale des arts inauguré en 1965.", "description longue": "La station, ouverte en 1926 sur la ligne 7, doit son nom principal au Pont Marie. Construit entre 1614 et 1635, ce pont tire son nom de son maître d'œuvre, l'entrepreneur Christophe Marie, qui souhaitait relier l'île Saint-Louis au quartier du Marais. Le suffixe 'Cité des Arts' a été ajouté bien plus tard, en 1965, pour signaler la proximité de la Cité internationale des arts, un complexe de résidences pour artistes situé sur les quais de Seine. L'histoire du pont est marquée par une tragédie en 1658, lorsqu'une crue exceptionnelle de la Seine emporta deux de ses arches et plusieurs maisons construites dessus. Ce lieu incarne ainsi la transition entre l'urbanisme classique du Grand Siècle et la vocation culturelle contemporaine du cœur historique de Paris.", "ambiguite": false, "tags": ["Monuments et Lieux Emblématiques", "Arts et Culture", "Topographie et Urbanisme"]}, "Pont Neuf": {"geographie": {"lignes": ["7"], "commune": "Paris", "code_insee": "75056", "latitude": 48.858456031111984, "longitude": 2.3417089232034765}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Achevé sous Henri IV, le pont Neuf est ironiquement le plus ancien pont en pierre de Paris, et le premier à traverser totalement la Seine en s'appuyant sur l'île de la Cité.", "description longue": "La station rend un honneur mérité à cet édifice révolutionnaire, dépourvu historiquement d'habitations en encorbellement, orné de mascarons grimaçants et doté de larges trottoirs, qui modifia considérablement la vie parisienne à la Renaissance."}, "description courte": "La station tire son nom du Pont Neuf, le plus ancien pont de Paris encore existant, achevé sous Henri IV en 1607.", "description longue": "Inaugurée en 1926 sur la ligne 7, la station 'Pont Neuf' tire son nom de l'ouvrage d'art éponyme qui traverse la Seine au niveau de la pointe de l'Île de la Cité. Contrairement à son nom, le Pont Neuf est le plus ancien pont de Paris. Commandé par Henri III et achevé en 1607 sous le règne d'Henri IV,

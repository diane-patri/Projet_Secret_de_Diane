<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Les Arcanes du Métro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amarante&family=Archivo:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* ===================================================================
   METROPOLITAIN — identité Guimard / Art Nouveau
   =================================================================== */

/* Parisine auto-hébergée : déposez vos fichiers dans un dossier /fonts
   à côté de ce fichier, sous ces noms exacts. En leur absence, le
   navigateur bascule automatiquement sur Archivo (aucune erreur). */
@font-face {
    font-family: 'Parisine';
    src: url('fonts/Parisine-Regular.woff2') format('woff2');
    font-weight: 400;
    font-style: normal;
    font-display: swap;
}

@font-face {
    font-family: 'Parisine';
    src: url('fonts/Parisine-Bold.woff2') format('woff2');
    font-weight: 700;
    font-style: normal;
    font-display: swap;
}

:root {
    --vert-guimard: #133a2d;
    --vert-fonce: #071e18;
    --bronze-patine: #6f8f78;
    --ambre: #d68a2e;
    --ambre-clair: #f0bd6c;
    --ambre-verriere: #c97b1f;
    --ivoire: #f3ede0;
    --ivoire-ombre: #e6ddc9;
    --encre: #1a1a1a;
    --rouille: #b5451b;
    --vert-succes: #4c7a5e;

    --display: 'Amarante', serif;
    --corps: 'Parisine', 'Archivo', sans-serif;
    --mono: 'IBM Plex Mono', monospace;
}

* {
    box-sizing: border-box;
}

html,
body {
    height: 100%;
    margin: 0;
    padding: 0;
    background: var(--vert-fonce);
    color: var(--encre);
    font-family: var(--corps);
}

body {
    position: relative;
    display: flex;
    justify-content: center;
    overflow: hidden;
}

/* toile de fond : dégradé profond + halo + motifs de ferronnerie en écho */
.metro-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    background:
        radial-gradient(ellipse 900px 500px at 50% -10%, rgba(214, 138, 46, 0.14), transparent 60%),
        linear-gradient(180deg, var(--vert-fonce) 0%, #0a2a20 45%, #081f19 100%);
    overflow: hidden;
}

.container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 900px;
    height: 100dvh;
    display: flex;
    flex-direction: column;
}

/* ---------- en-tête : plaque ovale façon panneau de station ---------- */
.metro-header {
    position: relative;
    flex-shrink: 0;
    background: var(--vert-guimard);
    color: var(--ivoire);
    padding: 26px 32px 20px;
    text-align: center;
}

.metro-header__frieze {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 22px;
    color: var(--ambre-clair);
    opacity: 0.55;
}

.metro-header__title-wrap {
    position: relative;
    margin: 14px auto 4px;
    padding: 20px 10px;
    max-width: 560px;
}

.metro-header__cartouche {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: clamp(300px, 82%, 480px);
    aspect-ratio: 380 / 110;
    height: auto;
    color: var(--ambre-clair);
    opacity: 0.85;
}

.metro-header h1,
.metro-header__subtitle {
    position: relative;
}

.metro-header h1 {
    font-family: var(--display);
    font-weight: 400;
    font-size: clamp(1.6rem, 4.6vw, 2.3rem);
    letter-spacing: 0.02em;
    margin: 0;
}

.metro-header__subtitle {
    font-size: 0.9rem;
    color: var(--ivoire-ombre);
    opacity: 0.85;
    margin: 0 0 10px;
}

.metro-header__bracket {
    display: block;
    width: min(70%, 320px);
    height: auto;
    margin: 0 auto;
    color: var(--ambre-clair);
    opacity: 0.8;
}

/* ---------- corps principal ---------- */
main {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    background: var(--ivoire);
    padding: 28px 30px 24px;
    box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.3);
    overflow-y: auto;
}

#ecran-categories,
#ecran-sessions {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    text-align: center;
}

#ecran-jeu {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
}

.hidden {
    display: none !important;
}

.screen-lead {
    text-align: center;
    color: var(--vert-guimard);
    font-size: 1rem;
    margin-bottom: 22px;
}

#titre-categorie {
    font-family: var(--display);
    font-weight: 400;
    color: var(--vert-guimard);
    font-size: 1.5rem;
    margin: 0 0 6px;
}

/* ---------- grilles de boutons (catégories / sessions) ---------- */
.grille-boutons {
    display: flex;
    flex-direction: column;
    gap: 12px;
    max-width: 420px;
    margin: 0 auto;
    width: 100%;
}

.grille-boutons button {
    font-family: var(--corps);
    font-weight: 700;
    font-size: 0.98rem;
    color: var(--vert-fonce);
    background: linear-gradient(180deg, var(--ambre-clair), var(--ambre));
    border: none;
    padding: 14px 22px;
    border-radius: 999px;
    cursor: pointer;
    box-shadow:
        0 4px 0 var(--ambre-verriere),
        0 8px 16px rgba(19, 58, 45, 0.25),
        0 0 0 3px rgba(19, 58, 45, 0.08) inset;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
}

.grille-boutons button:hover {
    transform: translateY(-2px);
    box-shadow:
        0 6px 0 var(--ambre-verriere),
        0 12px 20px rgba(19, 58, 45, 0.3),
        0 0 0 3px rgba(19, 58, 45, 0.08) inset;
}

.grille-boutons button:active {
    transform: translateY(1px);
    box-shadow: 0 2px 0 var(--ambre-verriere), 0 4px 8px rgba(19, 58, 45, 0.25);
}

/* ---------- boutons de retour / sortie ---------- */
.bouton-menu {
    font-family: var(--corps);
    font-weight: 700;
    font-size: 0.9rem;
    border-radius: 3px;
    padding: 10px 18px;
    cursor: pointer;
    transition: transform 0.12s ease, background 0.15s ease;
}

.bouton-menu:active {
    transform: translateY(1px);
}

.bouton-retour {
    align-self: center;
    margin-top: 22px;
    background: transparent;
    color: var(--rouille);
    border: 2px solid var(--rouille);
}

.bouton-retour:hover {
    background: rgba(181, 69, 27, 0.06);
}

/* ---------- écran de jeu ---------- */
.game-topbar {
    flex-shrink: 0;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    border-bottom: 2px solid var(--vert-guimard);
    padding-bottom: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 6px;
}

#titre-session-en-cours {
    font-family: var(--display);
    font-weight: 400;
    color: var(--vert-guimard);
    font-size: 1.5rem;
    margin: 0;
}

#progress-text {
    font-family: var(--mono);
    font-size: 0.85rem;
    color: var(--rouille);
    margin: 0;
    letter-spacing: 0.03em;
}

/* ---------- disposition à deux colonnes : jeu + panneau documentaire ---------- */
.jeu-layout {
    flex: 1;
    min-height: 0;
    display: flex;
    gap: 26px;
    align-items: flex-start;
    flex-wrap: wrap;
    overflow: visible;
}

.jeu-interaction {
    flex: 1 1 320px;
    min-width: 280px;
    display: flex;
    flex-direction: column;
    min-height: 0;
}

/* ---------- champ de saisie encadré ---------- */
.input-row {
    flex-shrink: 0;
    display: flex;
    gap: 10px;
    margin-bottom: 8px;
}

.ornate-frame {
    position: relative;
    flex: 1;
    padding: 6px;
}

.ornate-frame .corner {
    position: absolute;
    width: 22px;
    height: 22px;
    color: var(--vert-guimard);
    opacity: 0.8;
}

.corner--tl {
    top: -2px;
    left: -2px;
}

.corner--br {
    bottom: -2px;
    right: -2px;
    transform: rotate(180deg);
}

#champ-saisie {
    width: 100%;
    font-family: var(--corps);
    font-size: 1rem;
    color: var(--encre);
    background: #fff;
    border: 2px solid var(--vert-guimard);
    border-radius: 3px;
    padding: 12px 16px;
    outline: none;
    transition: box-shadow 0.15s ease;
}

#champ-saisie:focus {
    box-shadow: 0 0 0 3px rgba(201, 123, 31, 0.4);
    border-color: var(--ambre-verriere);
}

/* ---------- boutons ---------- */
button {
    font-family: var(--corps);
    font-weight: 700;
    font-size: 0.95rem;
    border: none;
    border-radius: 3px;
    padding: 12px 22px;
    cursor: pointer;
    transition: transform 0.12s ease, filter 0.15s ease;
}

#bouton-valider {
    flex-shrink: 0;
    background: var(--vert-guimard);
    color: var(--ivoire);
}

#bouton-valider:hover {
    filter: brightness(1.15);
}

.button-row {
    flex-shrink: 0;
    display: flex;
    gap: 10px;
    margin: 14px 0;
}

button.secondary {
    flex: 1;
    background: transparent;
    color: var(--vert-guimard);
    border: 2px solid var(--vert-guimard);
}

button.secondary:hover {
    background: rgba(19, 58, 45, 0.06);
}

button.secondary:disabled {
    color: var(--ivoire-ombre);
    border-color: var(--ivoire-ombre);
    cursor: not-allowed;
}

button:active {
    transform: translateY(1px);
}

.quit-btn {
    align-self: center;
    margin-top: auto;
    font-size: 0.85rem;
    padding: 8px 16px;
}

/* ---------- messages de retour ---------- */
.feedback {
    flex-shrink: 0;
    text-align: center;
    font-family: var(--mono);
    font-weight: 600;
    font-size: 0.9rem;
    min-height: 1.2em;
    margin: 0 0 10px;
    color: var(--rouille);
}

.feedback.success {
    color: var(--vert-succes);
}

.feedback.error {
    color: var(--rouille);
}

/* ---------- Zone des stations validées ---------- */
#zone-stations-validees {
    max-height: 150px; /* Force l'apparition de la barre de défilement au-delà de cette hauteur */
    overflow-y: auto;
    overflow-x: hidden;
    padding-right: 10px;
    margin-bottom: 12px;
    -webkit-overflow-scrolling: touch; /* Pour un défilement fluide sur mobile */
}

/* Apparence des noms de stations validées ajoutés par le JS (si structurés en p ou span) */
#zone-stations-validees p, 
#zone-stations-validees span,
#zone-stations-validees div {
    font-family: var(--corps);
    font-weight: 600;
    font-size: 0.9rem;
    color: var(--vert-guimard);
    background: rgba(19, 58, 45, 0.06);
    border-radius: 4px;
    padding: 6px 12px;
    margin-bottom: 6px;
}

/* ---------- zone d'indice ---------- */
#zone-indices {
    flex-shrink: 0;
    position: relative;
    background: #fff;
    border: 1px solid var(--ivoire-ombre);
    border-left: 4px solid var(--vert-guimard);
    border-radius: 3px;
    padding: 14px 40px 14px 18px;
    margin-bottom: 4px;
    background-image:
        url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 60 60'><path d='M2 58 C 2 30, 6 14, 22 8 C 34 3.5, 44 8, 48 18 C 51 25, 48 31, 41 31 C 36 31, 34 27, 36 23' fill='none' stroke='%23133a2d' stroke-width='3' stroke-linecap='round'/><circle cx='36' cy='23' r='3' fill='%23133a2d'/></svg>");
    background-repeat: no-repeat;
    background-position: right -6px bottom -6px;
    background-size: 30px 30px;
}

#texte-indice {
    margin: 0;
    font-size: 0.95rem;
    line-height: 1.4;
    color: var(--encre);
    min-height: 1.3em;
}

/* ---------- panneau documentaire ---------- */
#panneau-informations {
    flex: 1 1 260px;
    min-width: 240px;
    align-self: stretch;
    overflow-y: auto;
    background: #fff;
    border: 1px solid var(--ivoire-ombre);
    border-left: 4px solid var(--ambre-verriere);
    border-radius: 3px;
    padding: 16px 20px;
    font-size: 0.9rem;
    line-height: 1.5;
    color: var(--encre);
}

#panneau-informations:empty {
    display: none;
}

#panneau-informations h3 {
    font-family: var(--display);
    font-weight: 400;
    color: var(--vert-guimard);
    font-size: 1.1rem;
    margin: 0 0 8px;
}

#panneau-informations img {
    max-width: 100%;
    border-radius: 3px;
    margin: 8px 0;
}

/* ---------- responsive ---------- */
@media (max-width: 680px) {
    .jeu-layout {
        flex-direction: column;
        overflow-y: auto;
    }

    #panneau-informations {
        max-height: 240px;
    }
}

@media (max-width: 480px) {
    .metro-header {
        padding: 20px 20px 20px;
    }

    .metro-header h1 {
        font-size: 1.5rem;
    }

    main {
        padding: 20px 18px 18px;
    }

    .input-row {
        flex-direction: column;
    }
}

/* ---------- accessibilité ---------- */
:focus-visible {
    outline: 3px solid var(--ambre-verriere);
    outline-offset: 2px;
}

@media (prefers-reduced-motion: reduce) {

    * {
        transition: none !important;
    }
}
    </style>
</head>

<body>

    <!-- Motifs de ferronnerie Guimard, dessinés une seule fois et réutilisés partout via <use> -->
    <svg width="0" height="0" style="position:absolute" aria-hidden="true">
        <defs>
            <symbol id="guimard-corner" viewBox="0 0 60 60">
                <path d="M2 58 C 2 30, 6 14, 22 8 C 34 3.5, 44 8, 48 18 C 51 25, 48 31, 41 31 C 36 31, 34 27, 36 23"
                    fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" />
                <circle cx="36" cy="23" r="2.6" fill="currentColor" />
            </symbol>

            <!-- plaque ovale façon "ABBESSES" / "METROPOLITAIN", avec volutes aux pointes et fleuron sommital -->
            <symbol id="guimard-cartouche" viewBox="0 0 380 110">
                <path d="M40 55 C 40 25, 80 12, 130 12 L 250 12 C 300 12, 340 25, 340 55 C 340 85, 300 98, 250 98 L 130 98 C 80 98, 40 85, 40 55 Z"
                    fill="none" stroke="currentColor" stroke-width="3" />
                <path d="M54 55 C 54 33, 88 23, 130 23 L 250 23 C 292 23, 326 33, 326 55 C 326 77, 292 87, 250 87 L 130 87 C 88 87, 54 77, 54 55 Z"
                    fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.6" />
                <path d="M40 55 C 25 50, 12 52, 8 42 C 6 36, 12 30, 18 33 C 22 35, 21 40, 17 41" fill="none"
                    stroke="currentColor" stroke-width="2.2" stroke-linecap="round" />
                <path d="M340 55 C 355 50, 368 52, 372 42 C 374 36, 368 30, 362 33 C 358 35, 359 40, 363 41" fill="none"
                    stroke="currentColor" stroke-width="2.2" stroke-linecap="round" />
                <path d="M190 12 L190 2 M182 6 C 182 2, 198 2, 198 6" fill="none" stroke="currentColor"
                    stroke-width="1.8" stroke-linecap="round" />
                <circle cx="190" cy="2" r="2.2" fill="currentColor" />
                <circle cx="66" cy="55" r="2" fill="currentColor" opacity="0.8" />
                <circle cx="314" cy="55" r="2" fill="currentColor" opacity="0.8" />
            </symbol>

            <!-- console en fonte : arc en accolade perforé + écusson central à cornes et cœur, façon balustrade d'édicule -->
            <symbol id="guimard-bracket" viewBox="0 0 600 170">
                <path d="M40 150 C 120 60, 220 20, 300 20 C 380 20, 480 60, 560 150" fill="none"
                    stroke="currentColor" stroke-width="3.5" stroke-linecap="round" />
                <path d="M55 145 C 130 75, 225 38, 300 38 C 375 38, 470 75, 545 145" fill="none"
                    stroke="currentColor" stroke-width="1.4" opacity="0.7" />
                <path d="M40 150 C 25 140, 20 125, 30 115 C 38 108, 50 112, 50 122" fill="none"
                    stroke="currentColor" stroke-width="2.4" stroke-linecap="round" />
                <path d="M560 150 C 575 140, 580 125, 570 115 C 562 108, 550 112, 550 122" fill="none"
                    stroke="currentColor" stroke-width="2.4" stroke-linecap="round" />
                <!-- rang de perforations le long de l'arc principal, comme la fonte ajourée des balustrades -->
                <g fill="none" stroke="currentColor" stroke-width="1.3" opacity="0.8">
                    <circle cx="95.3" cy="97.8" r="3.4" />
                    <circle cx="143.0" cy="65.4" r="3.4" />
                    <circle cx="191.6" cy="41.9" r="3.4" />
                    <circle cx="239.5" cy="27.1" r="3.4" />
                    <circle cx="504.7" cy="97.8" r="3.4" />
                    <circle cx="457.0" cy="65.4" r="3.4" />
                    <circle cx="408.4" cy="41.9" r="3.4" />
                    <circle cx="360.5" cy="27.1" r="3.4" />
                </g>
                <!-- écusson central : amande, cœur et cornes en volute -->
                <path d="M300 18 C 322 18, 338 34, 338 55 C 338 78, 320 95, 300 108 C 280 95, 262 78, 262 55 C 262 34, 278 18, 300 18 Z"
                    fill="none" stroke="currentColor" stroke-width="2.6" />
                <path d="M300 108 C 292 98, 280 92, 280 82 C 280 75, 288 72, 294 78 C 297 81, 300 85, 300 88 C 300 85, 303 81, 306 78 C 312 72, 320 75, 320 82 C 320 92, 308 98, 300 108 Z"
                    fill="none" stroke="currentColor" stroke-width="1.6" opacity="0.85" />
                <circle cx="300" cy="45" r="7" fill="none" stroke="currentColor" stroke-width="1.6" />
                <path d="M282 22 C 265 12, 250 14, 248 26 C 247 34, 255 38, 260 32" fill="none"
                    stroke="currentColor" stroke-width="1.7" stroke-linecap="round" />
                <path d="M318 22 C 335 12, 350 14, 352 26 C 353 34, 345 38, 340 32" fill="none"
                    stroke="currentColor" stroke-width="1.7" stroke-linecap="round" />
                <circle cx="249" cy="25" r="2.4" fill="currentColor" opacity="0.85" />
                <circle cx="351" cy="25" r="2.4" fill="currentColor" opacity="0.85" />
            </symbol>

            <!-- tige et double volute, façon motifs sur les verrières ambrées -->
            <symbol id="guimard-reed" viewBox="0 0 40 50">
                <path d="M20 50 L20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                <path d="M20 20 C 10 20, 3 14, 5 6 C 6 2, 12 0, 15 4 C 17 7, 15 11, 12 12" fill="none"
                    stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                <path d="M20 20 C 30 20, 37 14, 35 6 C 34 2, 28 0, 25 4 C 23 7, 25 11, 28 12" fill="none"
                    stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                <circle cx="20" cy="5" r="2.4" fill="currentColor" />
                <circle cx="20" cy="40" r="1.6" fill="none" stroke="currentColor" stroke-width="1.2" />
            </symbol>
            <pattern id="guimard-frieze" width="46" height="50" patternUnits="userSpaceOnUse">
                <use href="#guimard-reed" x="3" width="40" height="50" />
            </pattern>
        </defs>
    </svg>

    <div class="metro-bg" aria-hidden="true"></div>

    <div class="container">
        <header class="metro-header">
            <svg class="metro-header__frieze" viewBox="0 0 700 46" preserveAspectRatio="none">
                <rect width="700" height="46" fill="url(#guimard-frieze)" />
            </svg>
            <div class="metro-header__title-wrap">
                <svg class="metro-header__cartouche" viewBox="0 0 380 110" preserveAspectRatio="none">
                    <use href="#guimard-cartouche" />
                </svg>
                <h1>Les Arcanes du Métro</h1>
            </div>
            <p class="metro-header__subtitle">Retrouvez le nom de chaque station à l'aide des indices</p>
            <svg class="metro-header__bracket" viewBox="0 0 600 170" preserveAspectRatio="xMidYMid meet">
                <use href="#guimard-bracket" />
            </svg>
        </header>

        <main>
            <!-- Étape 1 : Sélection de la catégorie principale -->
            <div id="ecran-categories">
                <p class="screen-lead">Sélectionnez une catégorie :</p>
                <div id="conteneur-categories" class="grille-boutons">
                    <!-- Les boutons de catégories seront injectés ici par JavaScript -->
                </div>
            </div>

            <!-- Étape 2 : Sélection de la session spécifique -->
            <div id="ecran-sessions" class="hidden">
                <h2 id="titre-categorie"></h2>
                <p class="screen-lead">Choisissez votre parcours :</p>
                <div id="conteneur-sessions" class="grille-boutons">
                    <!-- Les boutons de sessions seront injectés ici -->
                </div>
                <button id="bouton-retour-categories" class="bouton-menu bouton-retour">Retour aux catégories</button>
            </div>

            <!-- Étape 3 : Écran de jeu -->
            <div id="ecran-jeu" class="hidden">
                <div class="game-topbar">
                    <h2 id="titre-session-en-cours"></h2>
                    <p id="progress-text">Progression : <span id="compteur-stations">0</span> / <span
                            id="total-stations">0</span></p>
                </div>

                <div class="jeu-layout">

                    <!-- Espace d'interaction -->
                    <section class="jeu-interaction">
                        <div class="input-row">
                            <div class="ornate-frame">
                                <svg class="corner corner--tl"><use href="#guimard-corner" /></svg>
                                <svg class="corner corner--br"><use href="#guimard-corner" /></svg>
                                <input type="text" id="champ-saisie" placeholder="Nom de la station..."
                                    autocomplete="off">
                            </div>
                            <button id="bouton-valider">Valider</button>
                        </div>

                        <!-- Zone de notification pour les erreurs -->
                        <p id="message-retour" class="feedback"></p>

                        <!-- Zone d'affichage des stations trouvées avec défilement -->
                        <div id="zone-stations-validees"></div>

                        <div id="zone-indices">
                            <p id="texte-indice"></p>

    <script>
        const STATIONS = {"Abbesses": {"geographie": {"lignes": ["12"], "commune": "Paris", "code_insee": "75056", "latitude": 48.884392717991425, "longitude": 2.338394635220906}, "histoire": {"type_origine": "Lieu géographique", "sous_type_origine": "Place", "siecles": [], "description": "La place des Abbesses est située sur la butte Montmartre, dans le quartier de Clignancourt du 18e arrondissement de Paris. Elle fait référence aux dirigeantes de l'abbaye des Dames de Montmartre.", "pourquoi_ce_nom": "Origine du nom [ modifier | modifier le code ] La station doit sa dénomination à son implantation sous la place des Abbesses , laquelle fait référence aux dirigeantes de l' abbaye des Dames de Montmartre , figures du quartier à l'époque, et dont plusieurs ont des rues à leur nom dans les 9 et 18 arrondissements, comme Marguerite de Rochechouart , Louise-Émilie de La Tour d'Auvergne , Catherine de La Rochefoucauld ou Marie-Éléonore de Bellefond . Abbesses se situe en première position des stations du réseau classées par ordre alphabétique.", "details_personne": null}, "tags": ["L'architecture religieuse", "Monuments et Lieux Emblématiques"]}, "Aimé Césaire": {"geographie": {"lignes": ["12"], "commune": "Aubervilliers", "code_insee": "93001", "latitude": 48.90838312983791, "longitude": 2.378035995881576}, "histoire": {"type_origine": "Personne", "sous_type_origine": "Auteur", "siecles": ["XXe siècle", "XXIe siècle"], "description": "Aimé Césaire, né le 26 juin 1913 à Basse-Pointe (Martinique) et mort le 17 avril 2008 à Fort-de-France, en Martinique, est un écrivain et homme politique français, à la fois député, maire, poète, dramaturge, essayiste et biographe. Fondateur et représentant majeur du mouvement littéraire de la négritude — avec Léopold Sédar Senghor et Léon-Gontran Damas —, anticolonialiste résolu, il mène en parallèle une carrière politique en tant que député de la Martinique et maire de Fort-de-France durant cinquante-six années consécutives, de 1945 à 2001. Il est l’époux de Suzanne Roussi-Césaire.", "pourquoi_ce_nom": "Dénomination [ modifier | modifier le code ] Après la mort du poète martiniquais Aimé Césaire en 2008, des élus ont souhaité donner son nom à une station de métro. Jean-Christophe Lagarde , maire de Drancy , a proposé alors qu'il soit donné à la station un moment nommée Proudhon - Gardinoux mais, la RATP exigeant que l' odonymie du quartier soit en rapport avec le nom de la station, le STIF a décidé en 2011 que la station Proudhon - Gardinoux porterait le nom Front populaire .", "details_personne": {"nom": "Aimé Césaire", "annee_naissance": 1913, "annee_deces": 2008, "siecles_vecus": ["XXe siècle", "XXIe siècle"]}}, "tags": ["Arts et Culture", "Écrivains et Philosophes"]}, "Alexandre Dumas": {"geographie": {"lignes": ["2"], "commune": "Paris", "code_insee": "75056", "latitude": 48.856199097341126, "longitude": 2.3945914186721278}, "histoire": {"type_origine": "Personne", "sous_type_origine": "Auteur", "siecles": ["XIXe siècle"], "description": "Alexandre Dumas (dit aussi Alexandre Dumas père) est un écrivain français né le 24 juillet 1802 à Villers-Cotterêts (Aisne) et mort le 5 décembre 1870 au hameau de Puys, ancienne commune de Neuville-lès-Dieppe, aujourd'hui intégrée à Dieppe (Seine-Maritime). Il est le fils de Marie-Louise Labouret (1769–1838) et Thomas Alexandre Dumas (1762-1806) (né à Saint-Domingue, actuelle Haïti), dit le général Dumas. Il est aussi le père des écrivains Henry Bauër (1851-1915) et Alexandre Dumas (1824-1895), dit Dumas fils, auteur de La Dame aux camélias.", "pourquoi_ce_nom": "Le 13 septembre 1970, afin d'éviter toute confusion avec la nouvelle station Porte de Bagnolet de la ligne 3, ouverte lors de son prolongement à l'est jusqu'à Gallieni le 2 avril 1971, la station de la ligne 2 est rebaptisée Alexandre Dumas en référence à la rue Alexandre-Dumas, située à quelques centaines de mètres plus au sud, laquelle rend hommage à l'écrivain Alexandre Dumas (1802-1870). Dans le cadre du programme « Renouveau du métro » de la RATP, les couloirs de la station et l'éclairage des quais sont rénovés le 12 mai 2005.", "details_personne": {"nom": "Alexandre Dumas", "annee_naissance": 1802, "annee_deces": 1870, "siecles_vecus": ["XIXe siècle"]}}, "tags": ["Arts et Culture", "Écrivains et Philosophes"]}, "Alma - Marceau": {"geographie": {"lignes": ["9"], "commune": "Paris", "code_insee": "75056", "latitude": 48.8647282422178, "longitude": 2.301130527470699}, "histoire": {"type_origine": "Lieu géographique", "sous_type_origine": "Bataille", "siecles": ["XVIIIe siècle"], "description": "La bataille de l'Alma s'est déroulée en 1854 pendant la guerre de Crimée. François Séverin Marceau était un général de la Révolution française.", "pourquoi_ce_nom": "La station reprend d'autre part le nom de l'avenue Marceau, ainsi baptisée en hommage au général François Séverin Marceau-Desgravier (1769-1796), qui combattit les révoltés vendéens au cours de la période révolutionnaire. Comme c’est le cas pour un tiers des stations du réseau entre 1974 et 1984, ses quais sont modernisés en style « Andreu-Motte », en l'occurrence dans une nuance de bleu qui ne sera pas reconduite.", "details_personne": {"nom": "François Séverin Marceau", "annee_naissance": 1769, "annee_deces": 1796, "siecles_vecus": ["XVIIIe siècle"]}}, "tags": []}, "Alésia": {"geographie": {"lignes": ["4"], "commune": "Paris", "code_insee": "75056", "latitude": 48.82820106421924, "longitude": 2.3270932349484528}, "histoire": {"type_origine": "Lieu géographique", "sous_type_origine": "Bataille", "siecles": [], "description": "Le siège d'Alésia est une bataille décisive de la fin de la guerre des Gaules qui voit la défaite d'une coalition de peuples gaulois menée par Vercingétorix face à l'armée romaine de Jules César. Elle se déroule entre les mois de juillet et de septembre 52 av. J.-C.", "pourquoi_ce_nom": "Alésia est une station de la ligne 4 du métro de Paris, située dans le quartier du Petit-Montrouge du 14e arrondissement de Paris. == Situation == La station est établie sous la place Victor-et-Hélène-Basch et ses abords, dominés par l'église Saint-Pierre de Montrouge.", "details_personne": null}, "tags": ["Les victoires et batailles militaires"]}, "Anatole France": {"geographie": {"lignes": ["3"], "commune": "Levallois-Perret", "code_insee": "92044", "latitude": 48.89223258539651, "longitude": 2.2848122193525104}, "histoire": {"type_origine": "Personne", "sous_type_origine": "Auteur", "siecles": ["XIXe siècle", "XXe siècle"], "description": "Anatole France, pour l'état civil François Anatole Thibault, né le 16 avril 1844 à Paris et mort le 12 octobre 1924 à Saint-Cyr-sur-Loire (Indre-et-Loire), est un écrivain français. Il est considéré comme l’un des plus grands de l'époque de la Troisième République, dont il a également été un des plus importants critiques littéraires. Il devient une des consciences les plus significatives de son temps en s’engageant en faveur de nombreuses causes sociales et politiques du début du XXe siècle.", "pourquoi_ce_nom": "== Histoire == Cette station doit son nom à la rue Anatole-France (anciennement rue de Cormeille) que la ligne 3 dessert. Cette rue de Levallois-Perret rend hommage à François Anatole Thibault, dit Anatole France (1844-1924), écrivain français, académicien et prix Nobel de littérature en 1921.", "details_personne": {"nom": "Anatole France", "annee_naissance": 1844, "annee_deces": 1924, "siecles_vecus": ["XIXe siècle", "XXe siècle"]}}, "tags": ["Arts et Culture", "Écrivains et Philosophes"]}, "Anvers": {"geographie": {"lignes": ["2"], "commune": "Paris", "code_insee": "75056", "latitude": 48.882868568843925, "longitude": 2.3441548403302916}, "histoire": {"type_origine": "Lieu géographique", "sous_type_origine": "Ville", "siecles": [], "description": "Anvers (prononcé /ɑ̃.vɛʁs/, en néerlandais : Antwerpen [ˀant.ˈwɛʁ.pn]) est une ville belge dans la Région flamande, chef-lieu de la province d'Anvers et de l'arrondissement administratif du même nom, située au cœur de la Dorsale européenne. Le 1er janvier 2026, la commune d’Anvers était la plus peuplée de Belgique, devant Gand et Charleroi, avec 565 615 habitants. L’agglomération anversoise compte 1 250 000 habitants, ce qui la classe deuxième de Belgique, après Bruxelles.", "pourquoi_ce_nom": "Anvers est une station de la ligne 2 du métro de Paris, située à la limite des 9e et 18e arrondissements de Paris. == Situation == La station est implantée à la limite administrative entre le quartier de Rochechouart au sud et le quartier de Clignancourt au nord.", "details_personne": null}, "tags": []}, "Argentine": {"geographie": {"lignes": ["1"], "commune": "Paris", "code_insee": "75056", "latitude": 48.875383816476266, "longitude": 2.290148271742768}, "histoire": {"type_origine": "Lieu géographique", "sous_type_origine": "Pays", "siecles": [], "description": "L'Argentine (prononcé en français : [aʁʒɑ̃tin] ; prononcé en espagnol : [aɾxenˈtina] ), en forme longue la République argentine (prononcé en espagnol : [reˈpuβlika aɾxenˈtina]), est un pays d'Amérique du Sud partageant ses frontières avec le Chili à l'ouest, la Bolivie et le Paraguay au nord, le Brésil et l'Uruguay au nord-est, et enfin l'océan Atlantique à l'est et au sud. Son territoire américain continental couvre une grande partie du Cône Sud. L'Argentine est une république fédérale ayant un régime présidentiel.", "pourquoi_ce_nom": "Le 24 mars 2006, une plaque commémorative est inaugurée sur le tympan occidental du quai en direction de La Défense, portant la mention en espagnol Nunca más (signifiant littéralement en français : « Plus jamais »), « en hommage aux citoyens argentins et français enlevés, détenus et disparus en Argentine sous la dictature militaire (1976-1983) » et « à toutes les victimes de la répression ». Une petite exposition sur l'Argentine a également été ouverte au milieu du quai direction Château De Vincennes.", "details_personne": null}, "tags": []}, "Arts et Métiers": {"geographie": {"lignes": ["11", "3"], "commune": "Paris", "code_insee": "75056", "latitude": 48.86553459885931, "longitude": 2.3567233472754983}, "histoire": {"type_origine": "Institution", "sous_type_origine": "Enseignement", "siecles": [], "description": "L'École nationale supérieure d'arts et métiers (ENSAM, de nom de marque Arts et Métiers Sciences et Technologies, Arts et Métiers ParisTech ou Arts et Métiers) est l'une des 204 écoles d'ingénieurs françaises accréditées au 1er septembre 2020 à délivrer un diplôme d'ingénieur. Elle fait partie de ParisTech, réseau qui regroupe quelques grandes écoles d'ingénieurs de la région parisienne. Arts et Métiers est une école d'ingénieurs de France, fondée en 1780 par le duc de La Rochefoucauld-Liancourt.", "pourquoi_ce_nom": "Arts et Métiers est une station des lignes 3 et 11 du métro de Paris, située dans le 3e arrondissement de Paris. == Situation == La station est implantée à l'intersection des rues Beaubourg, Réaumur et de Turbigo, au sein du quartier des Arts-et-Métiers, les quais étant établis : sur la ligne 3, en courbe sous l'angle formé par ces deux dernières rues et orientée est-ouest ; sur la ligne 11, plus à l'est selon l'axe approximativement orienté est-ouest de la rue Réaumur.", "details_personne": null}, "tags": ["L'ingénierie et l'industrie", "Monuments et Lieux Emblématiques"]}, "Asnières - Gennevilliers - Les Courtilles": {"geographie": {"lignes": ["13"], "commune": "Gennevilliers", "code_insee": "92036", "latitude": 48.93076460500162, "longitude": 2.2842197492931637}, "histoire": {"type_origine": "Lieu géographique", "sous_type_origine": "Quartier", "siecles": [], "description": "Les Courtilles fait référence à un quartier situé à la limite d'Asnières-sur-Seine et de Gennevilliers.", "pourquoi_ce_nom": "Les Courtilles est une station de la ligne 13 du métro de Paris, située à la limite des communes d'Asnières-sur-Seine et Gennevilliers. Cette 299e station du métro de Paris, ouverte le 14 juin 2008, est, depuis cette date, le terminus de la ligne 13 sur sa branche nord-ouest.", "details_personne": null}, "tags": []}, "Assemblée Nationale": {"geographie": {"lignes": ["12"], "commune": "Paris", "code_insee": "75056", "latitude": 48.861071939526084, "longitude": 2.320575836647556}, "histoire": {"type_origine": "Institution", "sous_type_origine": "Politique", "siecles": [], "description": "L'Assemblée nationale est le nom souvent donné au Parlement d'un État dans le système monocaméral ou à sa chambre basse dans le système législatif bicaméral. Il est utilisé dans plus d'un tiers de tous les pays du monde (voir liste plus bas : 75 pays sur environ 195 pays reconnus dans le monde). Le terme est notamment présent dans les pays francophones ou dans ceux qui ont été une colonie française, mais pas seulement.", "pourquoi_ce_nom": "Assemblée nationale (anciennement Chambre des députés) est une station de la ligne 12 du métro de Paris, située dans le 7e arrondissement de Paris. == Situation == La station se trouve entre les stations Concorde et Solférino.", "details_personne": null}, "tags": ["Histoire et Politique"]}, "Aubervilliers - Pantin - Quatre Chemins": {"geographie": {"lignes": ["7"], "commune": "Pantin", "code_insee": "93055", "latitude": 48.90375706036556, "longitude": 2.3922205712292195}, "histoire": {"type_origine": "Lieu géographique", "sous_type_origine": "Carrefour", "siecles": [], "description": "Le lieu-dit des Quatre Chemins est un carrefour majeur entre les communes d'Aubervilliers et de Pantin.", "pourquoi_ce_nom": "Aubervilliers - Pantin - Quatre Chemins est une station de la ligne 7 du métro de Paris, située à la limite des communes d'Aubervilliers et de Pantin, sous l'avenue Jean-Jaurès. == Situation == La station est implantée sous l'avenue Jean-Jaurès (RD 932) au nord-est de l'intersection avec l'avenue Édouard-Vaillant et l'avenue de la République, ces deux dernières voies formant la route D 20.", "details_personne": null}, "tags": []}, "Avenue Émile Zola": {"geographie": {"lignes": ["10"], "commune": "Paris", "code_insee": "75056", "latitude": 48.84695722990175, "longitude": 2.2950459810371475}, "histoire": {"type_origine": "Personne", "sous_type_origine": "Auteur", "siecles": ["XIXe siècle", "XXe siècle"], "description": "Émile Zola est un écrivain et journaliste français, considéré comme le chef de file du naturalisme.", "pourquoi_ce_nom": "Avenue Émile-Zola est une station de la ligne 10 du métro de Paris, située dans le 15e arrondissement de Paris. == Situation == La station est implantée sous l'extrémité orientale de l'avenue Émile-Zola, à l'ouest de son débouché sur l'intersection avec la rue du Commerce, la rue Fondary et la rue Frémicourt qui prolonge ladite avenue vers l'est, au sein du quartier de Grenelle.", "details_personne": {"nom": "Émile Zola", "annee_naissance": 1840, "annee_deces": 1902, "siecles_vecus": ["XIXe siècle", "XXe siècle"]}}, "tags": ["Arts et Culture", "Écrivains et Philosophes"]}, "Avron": {"geographie": {"lignes": ["2"], "commune": "Paris", "code_insee": "75056", "latitude": 48.85161645805963, "longitude": 2.3980666384995177}, "histoire": {"type_origine": "Lieu géographique", "sous_type_origine": "Plateau", "siecles": [], "description": "Le nom de la station fait référence à la rue d'Avron, qui elle-même tire son nom du plateau d'Avron, un relief de Seine-Saint-Denis ayant eu un rôle défensif pendant la guerre de 1870.", "pourquoi_ce_nom": "Avron est une station de la ligne 2 du métro de Paris, située à la limite des 11e et 20e arrondissements de Paris. == Situation == La station est implantée à la limite administrative entre le quartier Sainte-Marguerite à l'ouest et le quartier de Charonne à l'est.", "details_personne": null}, "tags": []}, "Aéroport d'Orly": {"geographie": {"lignes": ["14"], "commune": "Paray-Vieille-Poste", "code_insee": "91479", "latitude": 48.72769656117165, "longitude": 2.362458738946496}, "histoire": {"type_origine": "Lieu géographique", "sous_type_origine": "Aéroport", "siecles": [], "description": "L'aéroport de Paris-Orly est l'un des principaux aéroports français, situé au sud de Paris.", "pourquoi_ce_nom": "Construite dans le cadre du Grand Paris Express, Aéroport d'Orly est une station terminus de la ligne 14 du métro de Paris, située au sein de l'enceinte de l'aéroport d'Orly, sur le territoire de la commune de Paray-Vieille-Poste. Elle doit être également la station terminus de la ligne 18 en 2027.", "details_personne": null}, "tags": []}, "Bagneux - Lucie Aubrac": {"geographie": {"lignes": ["4"], "commune": "Bagneux", "code_insee": "92007", "latitude": 48.80354822259104, "longitude": 2.317458362049886}, "histoire": {"type_origine": "Personne", "sous_type_origine": "Résistante", "siecles": ["XXe siècle", "XXIe siècle"], "description": "Lucie Aubrac est une figure majeure de la Résistance intérieure française pendant la Seconde Guerre mondiale.", "pourquoi_ce_nom": "La dénomination de la station rend hommage à Lucie Aubrac (1912 - 2007), professeure d'histoire, militante communiste, pacifiste, et résistante durant la Seconde Guerre mondiale. Elle doit sa dénomination à la demande de la commune de Bagneux, afin qu'Île-de-France Mobilités accepte que les franciliens choisissent le nom de la station de métro.", "details_personne": {"nom": "Lucie Aubrac", "annee_naissance": 1912, "annee_deces": 2007, "siecles_vecus": ["XXe siècle", "XXIe siècle"]}}, "tags": ["Histoire et Politique", "Les Femmes Illustres"]}, "Balard": {"geographie": {"lignes": ["8"], "commune": "Paris", "code_insee": "75056", "latitude": 48.83666789483108, "longitude": 2.2783626618092008}, "histoire": {"type_origine": "Personne", "sous_type_origine": "Scientifique", "siecles": ["XIXe siècle"], "description": "Antoine-Jérôme Balard, né le 30 septembre 1802 à Montpellier et mort le 30 mars 1876 à Paris, est un pharmacien et chimiste français, célèbre pour avoir découvert le brome en 1826.", "pourquoi_ce_nom": "Balard est une station de la ligne 8 du métro de Paris, dont elle constitue le terminus occidental, située dans le 15e arrondissement de Paris. == Situation == La station est implantée aux abords de la porte de Sèvres, située au sud du quartier de Javel.", "details_personne": {"nom": "Antoine-Jérôme Balard", "annee_naissance": 1802, "annee_deces": 1876, "siecles_vecus": ["XIXe siècle"]}}, "tags": []}, "Barbara": {"geographie": {"lignes": ["4"], "commune": "Bagneux", "code_insee": "92007", "latitude": 48.8097987811254, "longitude": 2.3174174096489284}, "histoire": {"type_origine": "Personne", "sous_type_origine": "Artiste", "siecles": ["XXe siècle"], "description": "Barbara (à ses débuts Barbara Brodi, officiellement Monique Serf) est une autrice-compositrice-interprète française, née le 9 juin 1930 à Paris 17e et morte le 24 novembre 1997 à Neuilly-sur-Seine (Hauts-de-Seine). Sa poésie, servie par l'harmonie de ses compositions et la finesse de ses interprétations, lui assure un public fidèle quarante ans durant. Nombre de ses chansons sont devenues des classiques de la chanson française, notamment : Une petite cantate, Dis, quand reviendras-tu ?, Nantes, Göttingen, La Dame brune, L'Aigle noir, Marienbad ou encore Ma plus belle histoire d'amour.", "pourquoi_ce_nom": "Lors de sa séance de décembre 2016, le Conseil de Paris émet le vœu que la RATP dénomme la future station de la ligne 14 située au Pont Cardinet du nom de « Pont Cardinet - Barbara » et étudie l'installation dans celle-ci d’une exposition permanente en hommage à Barbara. Ce souhait n'a pas eu de suite mais une station de métro située à la limite de Montrouge et de Bagneux, portant uniquement le nom de la chanteuse, est ouverte le 13 janvier 2022 sur le prolongement sud de la ligne 4 du métro de Paris.", "details_personne": {"nom": "Barbara", "annee_naissance": 1930, "annee_deces": 1997, "siecles_vecus": ["XXe siècle"]}}, "tags": ["Histoire et Politique", "Arts et Culture"]}, "Barbès - Rochechouart": {"geographie": {"lignes": ["2", "4"], "commune": "Paris", "code_insee": "75056", "latitude": 48.883852349861876, "longitude": 2.350573400888514}, "histoire": {"type_origine": "Personnes", "sous_type_origine": "Politique / Religieuse", "siecles": ["XVIIe siècle", "XVIIIe siècle", "XIXe siècle"], "description": "Armand Barbès était un homme politique français. Marguerite de Rochechouart était une religieuse, abbesse de Montmartre.", "pourquoi_ce_nom": "=== Origine des noms === La station doit sa dénomination initiale de Boulevard Barbès à sa proximité avec la voie précitée, laquelle rend hommage à l'homme politique français Armand Barbès (1809-1870). Le nom de Rochechouart, rajouté le 15 octobre 1907, provient du voisinage du boulevard de Rochechouart (actuel boulevard Marguerite-de-Rochechouart), dont le toponyme honore la religieuse Marguerite de Rochechouart de Montpipeau (1665-1727).", "details_personne": {"nom": "Armand Barbès / Marguerite de Rochechouart", "annee_naissance": 1665, "annee_deces": 1870, "siecles_vecus": ["XVIIe siècle", "XVIIIe siècle", "XIXe siècle"]}}, "tags": []}, "Basilique de Saint-Denis": {"geographie": {"lignes": ["13"], "commune": "Saint-Denis", "code_insee": "93066", "latitude": 48.93659371717278, "longitude": 2.359202621115829}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "description": "La station Basilique de Saint-Denis constitue un point d'arrêt du réseau métropolitain dont l'histoire reflète l'évolution urbaine de la capitale.", "pourquoi_ce_nom": null, "details_personne": null}, "tags": ["L'architecture religieuse", "Monuments et Lieux Emblématiques"]}, "Bastille": {"geographie": {"lignes": ["1", "5", "8"], "commune": "Paris", "code_insee": "75056", "latitude": 48.85196422011205, "longitude": 2.368692796099789}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "description": "La station Bastille constitue un point d'arrêt du réseau métropolitain dont l'histoire reflète l'évolution urbaine de function afficherMenuSessions(nomCategorie) {
    categorieActuelle = nomCategorie;
    ecranCategories.classList.add('hidden');
    ecranSessions.classList.remove('hidden');
    
    titreCategorie.textContent = nomCategorie;
    conteneurSessions.innerHTML = '';

    const sessions = SESSIONS_CONFIG[nomCategorie];
    for (const nomSession in sessions) {
        const btn = document.createElement('button');
        btn.className = 'bouton-menu';
        btn.innerHTML = `<strong>${nomSession}</strong><br><span style="font-size: 0.8em; color: #555;">${sessions[nomSession].description}</span>`;
        btn.onclick = () => demarrerSession(nomSession, sessions[nomSession]);
        conteneurSessions.appendChild(btn);
    }
}

function extraireValeur(objet, chemin) {
    return chemin.split('.').reduce((acc, part) => acc && acc[part], objet);
}

function demarrerSession(nomSession, config) {
    // Filtrage des stations selon la configuration de la session
    sessionStations = globalStations.filter(station => {
        const valeurExtraite = extraireValeur(station, config.chemin_donnee);
        if (!valeurExtraite) return false;
        
        if (config.type_recherche === "inclusion") {
            return valeurExtraite.includes(config.valeur_recherchee);
        } else if (config.type_recherche === "exact") {
            return valeurExtraite === config.valeur_recherchee;
        } else if (config.type_recherche === "different") {
            return valeurExtraite !== config.valeur_recherchee;
        }
        return false;
    });

    foundStations = new Set();
    ecranSessions.classList.add('hidden');
    ecranJeu.classList.remove('hidden');
    
    titreSessionEnCours.textContent = `${categorieActuelle} - ${nomSession}`;
    panneauInfos.innerHTML = '';
    totalStations.textContent = sessionStations.length;
    
    champSaisie.value = '';
    champSaisie.disabled = false;
    boutonValider.disabled = false;
    
    updateProgressUI();
    clearHintsUI();
    champSaisie.focus();
}

/* ---------- Logique de Validation (Levenshtein) ---------- */

function normalizeString(str) {
    return str.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9]/g, "");
}

function levenshteinDistance(a, b) {
    const matrix = Array.from({ length: a.length + 1 }, () => Array(b.length + 1).fill(0));
    for (let i = 0; i <= a.length; i++) matrix[i][0] = i;
    for (let j = 0; j <= b.length; j++) matrix[0][j] = j;
    for (let i = 1; i <= a.length; i++) {
        for (let j = 1; j <= b.length; j++) {
            const cost = a[i - 1] === b[j - 1] ? 0 : 1;
            matrix[i][j] = Math.min(matrix[i - 1][j] + 1, matrix[i][j - 1] + 1, matrix[i - 1][j - 1] + cost);
        }
    }
    return matrix[a.length][b.length];
}

function findBestMatch(input, stationList, maxTolerance = 2) {
    const normalizedInput = normalizeString(input);
    let bestMatch = null;
    let lowestDistance = Infinity;

    for (const station of stationList) {
        const normalizedStation = normalizeString(station.nom);
        const distance = levenshteinDistance(normalizedInput, normalizedStation);
        
        // Tolérance dynamique selon la longueur du nom
        const tolerance = station.nom.length > 8 ? 2 : (station.nom.length > 5 ? 1 : 0);
        
        if (distance < lowestDistance && distance <= tolerance) {
            lowestDistance = distance;
            bestMatch = station;
        }
    }
    return bestMatch;
}

function handleValidation() {
    const val = champSaisie.value.trim();
    if (!val) return;

    const sessionMatch = findBestMatch(val, sessionStations);

    if (sessionMatch) {
        if (foundStations.has(sessionMatch.nom)) {
            displayFeedback("Station déjà trouvée.", "color: #e67e22;");
        } else {
            registerSuccess(sessionMatch, false);
        }
        champSaisie.value = '';
        champSaisie.focus();
        return;
    }

    const globalMatch = findBestMatch(val, globalStations);

    if (globalMatch) {
        displayFeedback("Station existante, mais hors catégorie.", "color: #3498db;");
    } else {
        displayFeedback("Station inconnue du réseau parisien.", "color: #e74c3c;");
    }
    
    champSaisie.value = '';
    champSaisie.focus();
}

function registerSuccess(station, estRevelee) {
    foundStations.add(station.nom);
    
    if (!estRevelee) {
        displayFeedback(`Excellente réponse : ${station.nom}`, "color: #27ae60;");
    }
    
    ajouterFicheInformation(station, estRevelee);
    clearHintsUI();
    updateProgressUI();

    if (foundStations.size === sessionStations.length) {
        terminerSession();
    }
}

function ajouterFicheInformation(station, estRevelee) {
    let mentionSpeciale = '';
    let bordureStyle = '1px solid #ccc';
    
    if (estRevelee) {
        mentionSpeciale = `<p style="color: #c0392b; font-weight: bold; font-size: 0.9em;">Station révélée par abandon</p>`;
        bordureStyle = '2px solid #e74c3c';
    }

    const description = (station.histoire && station.histoire.description) ? station.histoire.description : 'Description non disponible.';
    const lignes = (station.geographie && station.geographie.lignes) ? station.geographie.lignes.join(', ') : 'N/A';

    const ficheHtml = `
        <article style="border: ${bordureStyle}; padding: 10px; margin-bottom: 10px; border-radius: 5px; background: #fff; color: #333;">
            <h3 style="margin: 0 0 5px 0;">${station.nom}</h3>
            ${mentionSpeciale}
            <p style="margin: 0 0 5px 0;"><strong>Lignes :</strong> ${lignes}</p>
            <p style="margin: 0;">${description}</p>
        </article>
    `;

    panneauInfos.insertAdjacentHTML('afterbegin', ficheHtml);
}

/* ---------- Gestion des Indices ---------- */

function showNextHint() {
    // Isolation des stations restant à découvrir
    const unfound = sessionStations.filter(s => !foundStations.has(s.nom));
    if (unfound.length === 0) return;

    // Déclenchement d'un nouveau cycle si aucun indice n'est actif ou si la série précédente est achevée
    if (!stationCibleActuelle || hintsDisplayedCount >= currentStationHints.length) {
        
        // Sélection aléatoire d'une nouvelle cible parmi les stations restantes
        stationCibleActuelle = unfound[Math.floor(Math.random() * unfound.length)];

        // Extraction sécurisée des données géographiques avec contrôle de type
        let lignesText = "Non spécifiées";
        if (stationCibleActuelle.geographie && stationCibleActuelle.geographie.lignes) {
            const donneesLignes = stationCibleActuelle.geographie.lignes;
            lignesText = Array.isArray(donneesLignes) ? donneesLignes.join(', ') : String(donneesLignes);
        }

        // Initialisation d'une base d'indices garantis par la nature même de l'objet
        currentStationHints = [
            `Ligne(s) desservie(s) : ${lignesText}.`,
            `La longueur du nom est de ${stationCibleActuelle.nom.length} caractères (espaces inclus).`,
            `La première lettre commence par "${stationCibleActuelle.nom.charAt(0).toUpperCase()}".`
        ];

        // Enrichissement conditionnel du tableau d'indices basé sur l'existence des métadonnées
        if (stationCibleActuelle.histoire) {
            if (stationCibleActuelle.histoire.type_origine) {
                currentStationHints.push(`Toponymie : ${stationCibleActuelle.histoire.type_origine}.`);
            }
            if (stationCibleActuelle.histoire.description) {
                const extrait = stationCibleActuelle.histoire.description.substring(0, 65);
                currentStationHints.push(`Fait notable : ${extrait}...`);
            }
        }

        // Nettoyage de l'interface pour la nouvelle série d'indices
        hintsDisplayedCount = 0;
        boutonReveler.disabled = false;
        zoneIndices.innerHTML = '';
    }

    // Injection dynamique du prochain indice disponible dans le flux d'exécution
    if (hintsDisplayedCount < currentStationHints.length) {
        const paragrapheIndice = document.createElement('p');
        paragrapheIndice.className = 'texte-indice-item';
        paragrapheIndice.textContent = `Indice ${hintsDisplayedCount + 1} : ${currentStationHints[hintsDisplayedCount]}`;
        zoneIndices.appendChild(paragrapheIndice);
        
        hintsDisplayedCount++;
    } 
    
    // Notification de fin de cycle permettant au joueur de comprendre qu'un nouveau clic ciblera une autre station
    if (hintsDisplayedCount === currentStationHints.length) {
        displayFeedback("Tous les indices disponibles pour cette station ont été révélés.", "color: #e67e22;");
    }

    // Maintien systématique du focus sur le champ de saisie pour préserver l'ergonomie
    champSaisie.focus();
}

function sacrificeAndReveal() {
    if (stationCibleActuelle) {
        registerSuccess(stationCibleActuelle, true);
    }
}

function clearHintsUI() {
    zoneIndices.innerHTML = '';
    hintsDisplayedCount = 0;
    currentStationHints = [];
    stationCibleActuelle = null;
    boutonReveler.disabled = true;
}

/* ---------- Interface Utilisateur ---------- */

function updateProgressUI() {
    compteurStations.textContent = foundStations.size;
}

function displayFeedback(msg, styleOptions) {
    messageRetour.textContent = msg;
    messageRetour.style = styleOptions + " font-weight: bold;";
    setTimeout(() => {
        if (messageRetour.textContent === msg) messageRetour.textContent = '';
    }, 4000);
}

function terminerSession() {
    champSaisie.disabled = true;
    boutonValider.disabled = true;
    boutonIndice.disabled = true;
    boutonReveler.disabled = true;
    displayFeedback("Félicitations, session complétée !", "color: #27ae60; font-size: 1.2em;");
}
    </script>

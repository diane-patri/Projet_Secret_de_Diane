ous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Le nom provient de l'église Notre-Dame-de-Bonne-Nouvelle, dédiée à l'Annonciation, un épisode biblique où l'ange Gabriel annonce une heureuse nouvelle à la Vierge Marie.", "description longue": "La station doit son nom au quartier et au boulevard de Bonne-Nouvelle, qui font référence à l'église éponyme construite en 1551, marquant le paysage urbain du secteur des Grands Boulevards."}, "description courte": "La station tire son nom du couvent de Notre-Dame de Bonne-Nouvelle, fondé en 1551, devenu le quartier actuel suite à la destruction de l'édifice religieux.", "description longue": "Le nom de la station 'Bonne Nouvelle' fait référence au quartier et à l'église Notre-Dame-de-Bonne-Nouvelle. En 1551, une chapelle est construite sous ce vocable, qui devient rapidement un lieu de pèlerinage pour les Parisiens. En 1624, une nouvelle église est bâtie pour répondre à l'afflux de fidèles. Elle tire son nom du mystère de l'Annonciation (la 'bonne nouvelle' faite à Marie). Bien que l'édifice ait été largement reconstruit au XIXe siècle, le nom est resté ancré dans la topographie parisienne. Il souligne l'évolution d'un ancien faubourg monastique devenu un carrefour animé des Grands Boulevards. Une anecdote notable : la station est l'une des rares à posséder une décoration thématique hommage au cinéma, installée en 1992, contrastant avec son origine religieuse ancestrale.", "ambiguite": false, "tags": ["L'architecture religieuse", "Monuments et Lieux Emblématiques"]}, "Botzaris": {"geographie": {"lignes": ["7B"], "commune": "Paris", "code_insee": "75056", "latitude": 48.87943610160117, "longitude": 2.388908111185046}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Markos Botzaris (1790-1823) est un héros militaire de l'indépendance de la Grèce, célèbre pour son courage lors de la lutte contre l'Empire ottoman.", "description longue": "La station prend le nom de la rue Botzaris. Ce toponyme célèbre la guerre d'indépendance grecque et ses martyrs, une cause fortement soutenue au XIXe siècle par les intellectuels romantiques français."}, "description courte": "La station tire son nom de la rue Botzaris, laquelle rend hommage au héros de la guerre d'indépendance grecque, Márkos Bótzaris (1790-1823).", "description longue": "Située dans le 19e arrondissement, la station Botzaris, ouverte en 1911 sur la ligne 7 bis, doit son nom à la rue éponyme située à proximité du parc des Buttes-Chaumont. Ce nom rend hommage à Márkos Bótzaris (1788-1823), illustre chef militaire grec. Figure emblématique de la lutte pour l'indépendance de la Grèce face à l'Empire ottoman, il est célèbre pour sa bravoure légendaire et son sacrifice lors de la bataille de Karpenissi, où il mourut en menant une attaque nocturne contre les troupes turques. Son nom est devenu, au XIXe siècle, un symbole du philhellénisme en France, un mouvement intellectuel et politique soutenu par de nombreux artistes et écrivains. L'inauguration de cette station souligne l'influence des mouvements libérateurs européens dans la toponymie parisienne du début du XXe siècle.", "ambiguite": false, "tags": ["Géographie et International", "Les victoires et batailles militaires"]}, "Boucicaut": {"geographie": {"lignes": ["8"], "commune": "Paris", "code_insee": "75056", "latitude": 48.841024160993214, "longitude": 2.2879184311245595}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Marguerite Boucicaut (1816-1887) est une femme d'affaires et bienfaitrice, fondatrice avec son mari du Bon Marché, le premier grand magasin moderne au monde.", "description longue": "La station rend hommage à Marguerite Boucicaut, veuve de l'entrepreneur Aristide Boucicaut. À sa mort, elle légua sa grande fortune pour la création d'un hôpital moderne bâti à proximité immédiate."}, "description courte": "La station tire son nom de la rue Boucicaut, baptisée en hommage à Aristide Boucicaut, fondateur du Bon Marché, pionnier du commerce moderne à Paris.", "description longue": "La station Boucicaut, située sur la ligne 8, rend hommage à Aristide Boucicaut (1810-1877). Industriel et commerçant visionnaire, il est célèbre pour avoir transformé 'Au Bon Marché' en le premier grand magasin moderne au monde. Il y inventa des techniques révolutionnaires : prix fixes affichés, accès libre, soldes, vente par correspondance et mise en place d'un système de protection sociale pour ses employés. Bien que le nom de la station soit lié à l'homme d'affaires, il évoque indirectement son épouse, Marguerite Boucicaut, qui prit la direction du magasin après sa mort et légua une fortune colossale pour la création d'œuvres caritatives et hospitalières, dont l'hôpital Boucicaut, situé à proximité immédiate de la station.", "ambiguite": false, "tags": ["Institutions Civiques et Politiques", "Sciences, Médecine et Techniques"]}, "Boulogne Jean Jaurès": {"geographie": {"lignes": ["10"], "commune": "Boulogne-Billancourt", "code_insee": "92012", "latitude": 48.841991575324506, "longitude": 2.239077780728926}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Jean Jaurès (1859-1914) est un grand homme politique français, philosophe et brillant orateur, fondateur du journal L'Humanité, assassiné pour son engagement pacifiste.", "description longue": "La station se trouve sur le boulevard Jean-Jaurès, l'artère principale de Boulogne-Billancourt, renommée en l'honneur du célèbre dirigeant socialiste, figure majeure de la SFIO et défenseur acharné de la paix."}, "description courte": "La station tire son nom de la commune de Boulogne-Billancourt et du boulevard Jean Jaurès, en hommage à l'illustre homme politique socialiste français.", "description longue": "La station 'Boulogne - Jean Jaurès', inaugurée en 1980 sur la ligne 10, doit sa double appellation à sa situation géographique et à son ancrage mémoriel. Le premier terme, 'Boulogne', rappelle l'ancien village de Boulogne-la-Petite, devenu une ville majeure de la petite couronne. Le second, 'Jean Jaurès', rend hommage à la figure tutélaire du socialisme français, assassiné en 1914. Ce boulevard, autrefois nommé 'rue de Saint-Cloud', a été rebaptisé en l'honneur du tribun après la Première Guerre mondiale. Il est intéressant de noter que le choix des noms de stations sur cette ligne, qui dessert une zone industrielle historique reconvertie, témoigne de la volonté de la RATP d'ancrer le réseau dans la mémoire républicaine nationale tout en conservant l'identité territoriale boulonnaise.", "ambiguite": false, "tags": ["Institutions Civiques et Politiques", "Anciens Villages et Hameaux"]}, "Boulogne Pont de Saint-Cloud": {"geographie": {"lignes": ["10"], "commune": "Boulogne-Billancourt", "code_insee": "92012", "latitude": 48.84067248206251, "longitude": 2.2283125898228056}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Le pont de Saint-Cloud, franchissant la Seine, relie Boulogne-Billancourt à Saint-Cloud, ville nommée en mémoire du moine franc Clodoald (Saint Cloud).", "description longue": "Terminus occidental de la ligne 10, la station tire son nom de sa situation géographique stratégique à proximité immédiate du grand pont permettant la traversée de la Seine vers Saint-Cloud."}, "description courte": "La station tire son nom de la ville de Boulogne-Billancourt et de sa proximité avec le pont franchissant la Seine vers Saint-Cloud.", "description longue": "Le nom de la station est un nom composé alliant une entité géographique (Boulogne-Billancourt) à un élément d'urbanisme structurant (le pont de Saint-Cloud). Le pont original, construit sous Louis XVI, a été remplacé par l'ouvrage actuel en 1940. La station, inaugurée en 1981 en tant que terminus de la ligne 10, matérialise l'expansion du métro vers la banlieue ouest. Le toponyme « Boulogne » est d'ailleurs une référence historique à l'église Notre-Dame de Boulogne-la-Petite, construite au XIVe siècle sur le modèle de la cité balnéaire de Boulogne-sur-Mer, haut lieu de pèlerinage médiéval. L'appellation souligne donc une double strate historique : celle du pèlerinage médiéval et celle du développement infrastructurel du XXe siècle.", "ambiguite": false, "tags": ["Topographie et Urbanisme", "Anciens Villages et Hameaux"]}, "Bourse": {"geographie": {"lignes": ["3"], "commune": "Paris", "code_insee": "75056", "latitude": 48.868792843933164, "longitude": 2.3406785469758815}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Le palais de la Bourse, également appelé palais Brongniart, est le bâtiment historique abritant autrefois le siège de la Bourse des valeurs de Paris.", "description longue": "La station doit son nom à sa proximité directe avec la place de la Bourse et le majestueux palais Brongniart, centre historique battant des activités financières de la capitale."}, "description courte": "La station tire son nom du Palais Brongniart, siège historique de la Bourse de Paris, situé à proximité immédiate dans le 2e arrondissement.", "description longue": "La station 'Bourse', située sur la ligne 3, doit son nom au Palais Brongniart, édifice emblématique construit sous Napoléon Ier entre 1807 et 1825 pour abriter la Bourse des valeurs de Paris. Conçu par l'architecte Alexandre-Théodore Brongniart dans un style néoclassique inspiré des temples antiques, le monument est le cœur financier historique de la capitale. Bien que la Bourse électronique ait quitté les lieux en 1996, le bâtiment conserve son nom et son prestige. Anecdote historique : lors de sa construction, les travaux furent interrompus par les guerres napoléoniennes, avant de reprendre sous la Restauration pour s'achever avec une structure en forme de péristyle majestueux qui domine la place de la Bourse.", "ambiguite": false, "tags": ["Monuments et Lieux Emblématiques", "Architecture urbaine : Les grandes gares"]}, "Brochant": {"geographie": {"lignes": ["13"], "commune": "Paris", "code_insee": "75056", "latitude": 48.89062201554889, "longitude": 2.3201902468999456}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "André-Jean-François-Marie Brochant de Villiers (1772-1840) est un géologue et minéralogiste français. Il dirigea la première grande carte géologique de la France.", "description longue": "La station prend le nom de la rue Brochant, honorant l'académicien et illustre professeur à l'École des mines qui sut remarquablement moderniser l'enseignement de la minéralogie en France."}, "description courte": "La station tire son nom de la rue Brochant, dédiée à André Brochant de Villiers, illustre géologue et minéralogiste français du XIXe siècle.", "description longue": "La station Brochant, située sur la ligne 13, tire son nom de la rue éponyme, laquelle honore la mémoire d'André Brochant de Villiers (1772-1840). Membre de l'Académie des sciences et directeur de la manufacture de Saint-Gobain, cet éminent géologue est célèbre pour avoir dirigé l'établissement de la première carte géologique détaillée de la France. Le nom illustre la volonté de la municipalité parisienne de valoriser les figures scientifiques au sein de la nomenclature urbaine du quartier des Épinettes. Contrairement à de nombreuses stations parisiennes, le nom Brochant n'est pas un nom composé, mais une anthroponymie simple associée à une voie publique majeure du 17e arrondissement, percée lors des transformations haussmanniennes de ce secteur alors en pleine mutation industrielle.", "ambiguite": false, "tags": ["Sciences, Médecine et Techniques", "Topographie et Urbanisme"]}, "Bréguet-Sabin": {"geographie": {"lignes": ["5"], "commune": "Paris", "code_insee": "75056", "latitude": 48.8562178110506, "longitude": 2.3703346849773035}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Antoine-Louis Bréguet fut un grand horloger. Charles-Pierre de Saint-Sabin fut échevin de Paris. Leurs noms sont associés aux deux rues qui croisent la station.", "description longue": "La station porte conjointement le nom de la rue Bréguet et de la rue Saint-Sabin, rappelant respectivement un inventeur mécanique de génie et un puissant magistrat parisien du XVIIIe siècle."}, "description courte": "La station honore le physicien Abraham-Louis Breguet et le conventionnel Jean-François Sabin, dont les noms ont été accolés lors de son inauguration en 1906.", "description longue": "La station Bréguet-Sabin, ouverte en 1906 sur la ligne 5, tire son nom de la rue éponyme. Ce nom composé illustre une pratique toponymique parisienne classique : la fusion de deux personnalités liées à la rue. Abraham-Louis Breguet (1747-1823) est un horloger et inventeur suisse de génie, célèbre pour ses perfectionnements techniques des mécanismes de précision. Le second, Jean-François Sabin, fut une figure politique locale : propriétaire terrien et conseiller municipal, il a joué un rôle lors de la Révolution française en siégeant au conseil de la Commune de Paris. La rue, située dans le 11e arrondissement, servait autrefois de limite au secteur où Sabin possédait des terrains, tandis que la renommée de Breguet a ancré le prestige intellectuel du quartier. Cette association reflète la stratification historique de Paris, mêlant l'innovation technique des Lumières aux acteurs politiques de la période révolutionnaire.", "ambiguite": false, "tags": ["Sciences, Médecine et Techniques", "Révolution et République"]}, "Buttes Chaumont": {"geographie": {"lignes": ["7B"], "commune": "Paris", "code_insee": "75056", "latitude": 48.878422971131464, "longitude": 2.381632921459486}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Les Buttes-Chaumont désignent des collines arides au nord-est de Paris (les monts chauves), métamorphosées au XIXe siècle en un magnifique parc public paysager.", "description longue": "La station permet de desservir le romantique parc des Buttes-Chaumont, créé par l'ingénieur Alphand sous Napoléon III sur l'emplacement escarpé d'anciennes carrières de gypse à ciel ouvert."}, "description courte": "La station tire son nom du parc des Buttes-Chaumont, ancien site industriel transformé en jardin public pittoresque sous le Second Empire par Haussmann et Alphand.", "description longue": "Le nom 'Buttes-Chaumont' provient de la contraction de 'buttes' (les collines) et de 'Chauve-Mont', désignant un relief pelé et dénudé. Durant des siècles, le site fut le théâtre d'activités insalubres : décharges, équarrissage et carrières de gypse. En 1864, sous Napoléon III, le préfet Haussmann et l'ingénieur Jean-Charles Alphand entreprennent une métamorphose spectaculaire pour le transformer en un parc paysager romantique. La station, ouverte en 1912 sur la ligne 7 bis, est l'une des plus profondes du réseau, située à près de 30 mètres sous la surface, en raison de la topographie accidentée et des anciennes galeries souterraines des carrières qui ont imposé des contraintes techniques majeures lors du percement du tunnel.", "ambiguite": false, "tags": ["Espaces Verts et Nature", "Topographie et Urbanisme"]}, "Buzenval": {"geographie": {"lignes": ["9"], "commune": "Paris", "code_insee": "75056", "latitude": 48.85176243983227, "longitude": 2.401170769368413}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Buzenval est le nom d'un ancien domaine situé à Rueil-Malmaison, tristement célèbre pour la bataille meurtrière qui s'y déroula en 1871.", "description longue": "La station fait directement référence à la rue de Buzenval. Elle évoque avec gravité la sanglante bataille de Buzenval du 19 janvier 1871, pendant le terrible siège de Paris."}, "description courte": "La station tire son nom de la rue de Buzenval, elle-même nommée en souvenir de la bataille de Buzenval, épisode marquant du siège de Paris en 1871.", "description longue": "Le nom de la station fait référence à la bataille de Buzenval, survenue le 19 janvier 1871 lors de la guerre franco-prussienne. Il s'agissait de l'ultime tentative des troupes françaises, sous les ordres du général Trochu, pour briser le siège de Paris en tentant une percée vers Versailles à travers le domaine de Buzenval, situé à Rueil-Malmaison. L'offensive fut un échec sanglant, précipitant la capitulation de la capitale quelques jours plus tard. Il convient de noter une particularité toponymique : bien que la station soit située dans le 20e arrondissement, elle honore un lieu situé en banlieue ouest. Le nom est ancré dans la mémoire collective comme le symbole des sacrifices consentis par les gardes nationaux parisiens durant ce conflit, bien que la station soit devenue, au fil du temps, un marqueur purement géographique du quartier de Charonne.", "ambiguite": false, "tags": ["Les victoires et batailles militaires"]}, "Bérault": {"geographie": {"lignes": ["1"], "commune": "Vincennes", "code_insee": "94080", "latitude": 48.84554919216388, "longitude": 2.4290262652466583}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Bérault désigne un ancien maire ou bienfaiteur de la ville de Vincennes qui a donné son nom à l'avenue située à proximité.", "description longue": "La station doit son nom à la place Bérault, qui rend un hommage local à M. Bérault, adjoint au maire de la ville de Vincennes à la fin du XIXe siècle."}, "description courte": "La station tire son nom de la place Bérault, nommée en hommage à Jean-Baptiste Bérault, ancien propriétaire terrien et bienfaiteur de la commune de Saint-Mandé.", "description longue": "La station Bérault, située sur la ligne 1 à la limite entre Saint-Mandé et Vincennes, doit son nom à une figure locale oubliée. Au XIXe siècle, Jean-Baptiste Bérault était un notable et propriétaire foncier influent à Saint-Mandé. La place qui porte son nom a été baptisée ainsi en reconnaissance de son rôle dans le développement urbain et la générosité dont il fit preuve envers la municipalité. Bien que la station soit devenue un point névralgique pour les usagers du bois de Vincennes et des administrations locales, son étymologie reste ancrée dans l'histoire municipale locale, loin des grandes figures nationales souvent célébrées dans le métro parisien. Il s'agit d'un exemple typique de la toponymie suburbaine du début du XXe siècle, privilégiant des personnalités ayant marqué la vie civile et le cadastre local.", "ambiguite": false, "tags": ["Anciens Villages et Hameaux", "Topographie et Urbanisme"]}, "Cadet": {"geographie": {"lignes": ["7"], "commune": "Paris", "code_insee": "75056", "latitude": 48.87604838013132, "longitude": 2.3443838837796562}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "La famille Cadet de Chambine possédait des terres agricoles dans ce quartier de Paris, jadis traversé par un ancien chemin devenu la rue Cadet.", "description longue": "La station prend le nom de la rue Cadet. Elle doit son appellation à la famille de maîtres jardiniers Cadet qui exploitait de vastes champs fertiles dans ce secteur."}, "description courte": "Le nom rend hommage aux frères Cadet, jardiniers parisiens du XVIe siècle, dont le domaine occupait l'emplacement de l'actuelle rue Cadet dans le 9e arrondissement.", "description longue": "La station Cadet, ouverte en 1910 sur la ligne 7, tire son nom de la rue éponyme. Cette voie reprend le patronyme des frères Jacques et Jean Cadet, des maîtres jardiniers qui possédaient au XVIe siècle une vaste propriété maraîchère s'étendant dans ce quartier alors hors des murs de Paris. Le terme 'Cadet' ne désigne donc pas ici un grade militaire ou un rang de naissance, mais bien un nom propre familial. Une anecdote savoureuse rappelle que ces jardiniers fournissaient les tables royales. Avec l'urbanisation croissante du faubourg Montmartre, leur domaine a été loti, mais la mémoire de ces 'cultivateurs du roi' a été gravée dans la toponymie urbaine, pérennisant ainsi une activité agricole disparue depuis longtemps au cœur de la capitale.", "ambiguite": false, "tags": ["Anciens Villages et Hameaux", "Topographie et Urbanisme"]}, "Cambronne": {"geographie": {"lignes": ["6"], "commune": "Paris", "code_insee": "75056", "latitude": 48.84754311219352, "longitude": 2.3029417283376117}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Pierre Cambronne (1770-1842) est un général du Premier Empire, resté célèbre pour son mot légendaire lancé face aux Britanniques lors de la bataille de Waterloo.", "description longue": "La station est située sur la place Cambronne, nommée en l'honneur du vicomte Pierre Jacques Étienne Cambronne, grand officier militaire redoutable des guerres de la Révolution et de l'Empire."}, "description courte": "La station tire son nom de la rue Cambronne, nommée en hommage au général Pierre Cambronne, célèbre pour son mot historique lors de la bataille de Waterloo.", "description longue": "La station Cambronne, située sur la ligne 6, doit son appellation à la rue Cambronne dans le 15e arrondissement de Paris. Elle rend hommage au général Pierre Cambronne (1770-1842), célèbre officier napoléonien. Si la légende lui prête le fameux « mot de Cambronne » (« La Garde meurt et ne se rend pas » ou l'expression plus grossière associée), il est historiquement établi que ces mots furent probablement prononcés par d'autres. Sa carrière, marquée par sa bravoure lors de la bataille de Waterloo et son retour fidèle auprès de l'Empereur durant les Cent-Jours, en fait une figure emblématique du panthéon militaire français.", "ambiguite": true, "tags": ["Les victoires et batailles militaires"]}, "Campo-Formio": {"geographie": {"lignes": ["5"], "commune": "Paris", "code_insee": "75056", "latitude": 48.83554293374935, "longitude": 2.3587419566993457}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Le traité de Campo-Formio fut signé en 1797 entre la France de Bonaparte et l'Autriche, marquant la fin victorieuse de la première campagne d'Italie.", "description longue": "La station rend hommage à la paix de Campo-Formio, un traité diplomatique crucial imposé par Napoléon Bonaparte à l'Autriche, donnant logiquement son nom à la rue située à proximité."}, "description courte": "La station tire son nom du traité de Campo-Formio (1797), signé par Bonaparte, marquant la fin de la première campagne d'Italie et de la Première Coalition.", "description longue": "La station Campo-Formio, située sur la ligne 5, tire son nom de la rue éponyme, elle-même baptisée en souvenir du traité de paix signé le 17 octobre 1797 à Campo Formio (aujourd'hui Campoformido, en Italie). Ce traité historique mit un terme à la guerre entre la Première République française et l'Autriche, consolidant les conquêtes de Bonaparte en Italie et marquant la fin de la Première Coalition. Ce nom illustre la volonté de la municipalité parisienne de célébrer les victoires diplomatiques et militaires du jeune général Bonaparte à la fin du XVIIIe siècle, renforçant le caractère patriotique de la nomenclature des rues dans ce secteur du 13e arrondissement.", "ambiguite": false, "tags": ["Les victoires et batailles militaires", "Révolution et République", "Géographie et International"]}, "Cardinal Lemoine": {"geographie": {"lignes": ["10"], "commune": "Paris", "code_insee": "75056", "latitude": 48.84670003526311, "longitude": 2.3513280016731763}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Jean Lemoine (1250-1313) était un puissant prélat, légat du pape et cardinal français, fondateur du collège du Cardinal-Lemoine destiné aux étudiants pauvres de Paris.", "description longue": "La station prend le nom de la rue du Cardinal-Lemoine, construite à proximité de l'emplacement de l'institution fondée par le généreux théologien au XIVe siècle près des murs de Philippe Auguste."}, "description courte": "La station rend hommage au cardinal Jean Lemoine, diplomate et conseiller de Philippe le Bel, qui fonda le collège du Cardinal Lemoine au XIIIe siècle.", "description longue": "La station Cardinal Lemoine, située sur la ligne 10, tire son nom de la rue éponyme, elle-même nommée en souvenir du cardinal Jean Lemoine (1250-1313). Éminent diplomate et conseiller des rois Philippe III et Philippe le Bel, ce dernier fut une figure influente de l'Église de France. En 1302, il fonda le collège du Cardinal Lemoine, situé à proximité, au cœur du Quartier latin, qui fut l'un des nombreux établissements d'enseignement de l'ancienne Université de Paris. Le nom illustre la tradition séculaire du quartier, marqué par la présence d'institutions religieuses et académiques médiévales. Anecdote : la station est célèbre pour ses mosaïques contemporaines de l'artiste chilien Matta, installées en 1988, qui contrastent avec l'ancrage historique médiéval du nom.", "ambiguite": false, "tags": ["L'architecture religieuse", "Institutions Civiques et Politiques"]}, "Carrefour Pleyel": {"geographie": {"lignes": ["13"], "commune": "Saint-Denis", "code_insee": "93066", "latitude": 48.91897668662174, "longitude": 2.342621763486782}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Ignace Pleyel (1757-1831) est un compositeur et célèbre fabricant de pianos. Ses manufactures, installées à Saint-Denis, ont donné leur nom à ce grand carrefour.", "description longue": "Située sur la commune de Saint-Denis, la station doit son nom au grand carrefour routier Pleyel, lui-même nommé d'après les anciennes usines de la célèbre marque de pianos."}, "description courte": "La station tire son nom du carrefour éponyme à Saint-Denis, baptisé en hommage à la manufacture de pianos Pleyel, célèbre entreprise installée dans le quartier.", "description longue": "La station Carrefour Pleyel, située sur la ligne 13, tire son nom du célèbre carrefour de Saint-Denis où s'installa, en 1865, la prestigieuse manufacture de pianos Pleyel. Fondée par Ignace Pleyel, compositeur et facteur d'instruments, l'entreprise a transformé l'identité industrielle de la zone. Le nom 'Pleyel' est ainsi devenu un marqueur géographique majeur, synonyme de l'âge d'or de la facture instrumentale française. Ce site, autrefois simple lieu-dit, a été radicalement remodelé par le développement urbain, passant d'un pôle industriel ouvrier à un centre d'affaires contemporain. L'anecdote historique réside dans la pérennité du nom : bien que l'usine ait quitté les lieux, l'appellation est devenue indissociable de l'urbanisme du quartier, illustrant comment une activité économique privée peut façonner durablement la toponymie d'une ville.", "ambiguite": false, "tags": ["Topographie et Urbanisme", "Monuments et Lieux Emblématiques"]}, "Censier - Daubenton": {"geographie": {"lignes": ["7"], "commune": "Paris", "code_insee": "75056", "latitude": 48.84026600820119, "longitude": 2.351495277596339}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Censier fait référence à d'anciens propriétaires terriens. Louis Jean-Marie Daubenton (1716-1800) fut un immense naturaliste et médecin, premier directeur du Muséum national d'histoire naturelle.", "description longue": "La station croise la rue Daubenton, honorant le brillant collaborateur de Buffon, et la rue Censier, dont le toponyme dérive probablement d'anciennes parcelles paysannes soumises au paiement du cens."}, "description courte": "La station tire son nom de la rue Censier, ancien village, et de la rue Daubenton, nommée en hommage au naturaliste Louis Jean-Marie Daubenton.", "description longue": "Inaugurée en 1930 sur la ligne 7, la station 'Censier - Daubenton' illustre la dualité toponymique parisienne. 'Censier' rappelle le fief médiéval du Censier, un domaine seigneurial situé autrefois sur la Bièvre. 'Daubenton' rend hommage à Louis Jean-Marie Daubenton (1716-1799), célèbre naturaliste et collaborateur de Buffon à l'Histoire naturelle, dont l'influence scientifique demeure capitale. Située au cœur du quartier latin, la station dessert notamment l'Université Sorbonne Nouvelle et le Jardin des Plantes, renforçant le lien entre le nom Daubenton et le milieu académique. La rue Daubenton, anciennement rue Saint-Médard, fut rebaptisée en 1807 pour honorer ce savant dont les travaux ont révolutionné l'anatomie comparée.", "ambiguite": false, "tags": ["Sciences, Médecine et Techniques", "Anciens Villages et Hameaux"]}, "Champs-Élysées - Clemenceau": {"geographie": {"lignes": ["1", "13"], "commune": "Paris", "code_insee": "75056", "latitude": 48.86737454799625, "longitude": 2.3139501860093175}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Georges Clemenceau (1841-1929) est un homme d'État français, dit Le Tigre, artisan principal de la victoire de la France lors de la Première Guerre mondiale.", "description longue": "La station unit la plus belle avenue du monde, les Champs-Élysées, à la place Clemenceau, qui honore solennellement la poigne du chef du gouvernement de la Victoire en 1918."}, "description courte": "La station évoque la célèbre avenue parisienne et Georges Clemenceau, homme d'État français surnommé le « Père la Victoire » lors de la Première Guerre mondiale.", "description longue": "Inaugurée en 1900, la station tire son nom de l'avenue des Champs-Élysées, dont le nom renvoie à la mythologie grecque. En 1931, le nom de Georges Clemenceau, figure centrale de la Troisième République et artisan de la victoire en 1918, est adjoint à la station pour honorer sa mémoire. Historiquement, le nom a évolué : ouverte sous le nom de 'Champs-Élysées' sur la ligne 1, elle fut renommée 'Clemenceau' en 1931, avant de devenir 'Champs-Élysées - Clemenceau' en 1936. Fait notable : la station est ornée d'une décoration spécifique en hommage à la commémoration du centenaire de la mort de Clemenceau et à ses liens avec l'Orient, illustrée par des céramiques évoquant ses voyages.", "ambiguite": false, "tags": ["Institutions Civiques et Politiques", "Monuments et Lieux Emblématiques"]}, "Chardon Lagache": {"geographie": {"lignes": ["10"], "commune": "Paris", "code_insee": "75056", "latitude": 48.84508829917885, "longitude": 2.26690547594029}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Pierre Chardon et son épouse, née Lagache, sont de riches bienfaiteurs ayant financé la création d'une maison de retraite pour les personnes âgées modestes.", "description longue": "La station emprunte son nom à la rue Chardon-Lagache, qui rend un juste hommage au couple de philanthropes parisiens fondateurs de la grande institution de retraite voisine en 1865."}, "description courte": "La station tire son nom de la rue Chardon-Lagache, baptisée en hommage au médecin Pierre-Alfred Chardon et à son épouse, née Lagache, généreux donateurs locaux.", "description longue": "La station Chardon-Lagache, située sur la ligne 10, doit son nom à une rue du quartier d'Auteuil. Cette voie rend hommage à Pierre-Alfred Chardon (1794-1865), un médecin humaniste très apprécié pour sa bienfaisance envers les indigents du village d'Auteuil. Le nom composé 'Chardon-Lagache' intègre le patronyme de son épouse, née Amélie Lagache. Ensemble, le couple a légué une part importante de sa fortune pour la création d'une maison de retraite destinée aux personnes âgées démunies, un établissement qui a longtemps marqué le paysage social et médical du quartier. Cette nomenclature témoigne de la tradition parisienne de commémorer les figures locales philanthropes plutôt que les seules personnalités politiques ou militaires.", "ambiguite": false, "tags": ["Sciences, Médecine et Techniques", "Anciens Villages et Hameaux"]}, "Charenton - Écoles": {"geographie": {"lignes": ["8"], "commune": "Charenton-le-Pont", "code_insee": "94018", "latitude": 48.82148073316996, "longitude": 2.413844709558796}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Charenton est une commune de la petite couronne. Le terme Écoles fait référence au groupe scolaire Aristide-Briand situé près de la station.", "description longue": "La station dessert le centre-ville animé de Charenton-le-Pont. L'ajout du mot Écoles permettait à l'origine de distinguer l'emplacement par la présence historique d'un important établissement d'enseignement sur la place."}, "description courte": "La station tire son nom de la commune de Charenton-le-Pont et de la proximité historique du groupe scolaire Pasteur, situé à proximité immédiate de l'accès.", "description longue": "La station 'Charenton - Écoles', ouverte en 1942 sur la ligne 8, illustre la nomenclature toponymique de la banlieue parisienne. Le terme 'Charenton' fait référence à la ville de Charenton-le-Pont, dont le nom provient du latin 'Carentonium'. Le second élément, 'Écoles', a été ajouté pour distinguer cette station de l'arrêt précédent 'Liberté' et surtout pour faciliter l'identification géographique pour les usagers, en référence au groupe scolaire public situé à l'angle de l'avenue de la Liberté et de la rue de Paris. Il est intéressant de noter que, contrairement à d'autres stations parisiennes faisant référence à des personnalités, cette nomenclature est purement fonctionnelle et liée à l'urbanisme local du début du XXe siècle.", "ambiguite": false, "tags": ["Anciens Villages et Hameaux", "Topographie et Urbanisme"]}, "Charles Michels": {"geographie": {"lignes": ["10"], "commune": "Paris", "code_insee": "75056", "latitude": 48.84660453239739, "longitude": 2.2856210133667174}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": ["XXe siècle"], "details_personne": {"nom": "Charles Michels", "annee_naissance": 1903, "annee_deces": 1941, "siecles_vecus": ["XXe siècle"]}, "description courte": "Charles Michels (1903-1941) est un député communiste français et figure de la Résistance, fusillé comme otage par les nazis à Châteaubriant durant l'Occupation.", "description longue": "Anciennement nommée Beaugrenelle, la station a été dignement rebaptisée après-guerre pour honorer la mémoire de Charles Michels, élu dévoué du 15e arrondissement et courageux martyr de la Résistance française."}, "description courte": "La station rend hommage à Charles Michels, député communiste du 15e arrondissement, militant syndicaliste et figure de la Résistance française fusillé en 1941 par les nazis.", "description longue": "Initialement nommée 'Beaugrenelle' lors de son ouverture en 1913, la station fut rebaptisée 'Charles Michels' le 14 juillet 1945. Ce changement de nom honore la mémoire de Charles Michels (1903-1941), secrétaire du syndicat des cuirs et peaux et député communiste de la Seine sous le Front populaire. Arrêté en 1939 à la suite de l'interdiction du Parti communiste, il est interné au camp de Châteaubriant. En représailles après l'attentat contre un officier allemand, il est fusillé comme otage le 22 octobre 1941. Son nom, composé du prénom Charles et du patronyme Michels, s'inscrit dans la tradition parisienne de commémorer les figures politiques locales ayant payé le prix fort pour leur engagement patriotique pendant l'Occupation.", "ambiguite": false, "tags": ["Les figures de la Résistance", "Institutions Civiques et Politiques"]}, "Charles de Gaulle - Étoile": {"geographie": {"lignes": ["1", "2", "6"], "commune": "Paris", "code_insee": "75056", "latitude": 48.875175151927344, "longitude": 2.295932042102862}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Charles de Gaulle (1890-1970) est un général, chef de la Résistance durant la guerre, et le fondateur historique de la Cinquième République française.", "description longue": "Située exactement sous l'Arc de Triomphe, la station ajoute au nom originel de la place de l'Étoile celui du général de Gaulle pour célébrer l'illustre homme d'État français."}, "description courte": "Hommage au général de Gaulle, chef de la France libre, associé à l'emblématique place de l'Étoile, point de convergence des douze avenues parisiennes historiques.", "description longue": "La station, initialement nommée 'Étoile' en raison de la place Charles-de-Gaulle (anciennement place de l'Étoile), a été rebaptisée en 1970 après le décès du général Charles de Gaulle, figure centrale de la Résistance et premier président de la Ve République. Ce nom composé illustre la transition entre la toponymie urbaine classique, liée à la forme rayonnante des avenues dessinées par Haussmann, et la mémoire politique contemporaine. Située sous l'Arc de Triomphe, la station est un nœud multimodal stratégique reliant les lignes 1, 2 et 6, symbolisant à la fois le prestige national et l'évolution de la nomenclature urbaine parisienne après les grands bouleversements du XXe siècle.", "ambiguite": false, "tags": ["Institutions Civiques et Politiques", "Les figures de la Résistance", "Monuments et Lieux Emblématiques"]}, "Charonne": {"geographie": {"lignes": ["9"], "commune": "Paris", "code_insee": "75056", "latitude": 48.854939443448494, "longitude": 2.384782396448888}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Charonne est le nom d'un ancien village de l'est de Paris, rattaché à la capitale en 1860, dont l'origine pourrait être liée au dieu gaulois.", "description longue": "La station se situe sous le boulevard de Charonne et la rue de Charonne, reprenant le nom du grand quartier populaire et de l'ancienne commune verdoyante annexée sous le Second Empire."}, "description courte": "La station tire son nom de l'ancien village de Charonne, intégré à Paris en 1860, dont le territoire s'étendait sur l'actuel 20e arrondissement.", "description longue": "Le nom 'Charonne' trouve ses racines dans l'appellation du village éponyme, mentionné dès le XIIe siècle sous la forme 'Carona'. Ce bourg rural, longtemps prisé par l'aristocratie pour ses terres fertiles et ses châteaux, fut annexé à la ville de Paris par la loi du 16 juin 1859, lors de l'extension de la capitale jusqu'à l'enceinte de Thiers. Si l'étymologie exacte reste sujette à débat (dérivant possiblement du gaulois 'car' signifiant pierre, ou d'une racine désignant une terre cultivable), le nom est aujourd'hui indissociable de la mémoire collective parisienne, marquée tragiquement par la répression sanglante de la manifestation pour la paix en Algérie, survenue à la station le 8 février 1962.", "ambiguite": true, "tags": ["Anciens Villages et Hameaux", "Institutions Civiques et Politiques"]}, "Chaussée d'Antin - La Fayette": {"geographie": {"lignes": ["7", "9"], "commune": "Paris", "code_insee": "75056", "latitude": 48.87280723715393, "longitude": 2.333970457594147}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Le marquis de La Fayette (1757-1834) est le célèbre héros de la guerre d'indépendance des États-Unis. D'Antin rappelle l'hôtel du puissant duc d'Antin.", "description longue": "La station est placée au carrefour de la rue de la Chaussée-d'Antin et de la longue rue La Fayette, honorant d'une part un ancien chemin surélevé et d'autre part l'audacieux général."}, "description courte": "La station évoque l'ancienne chaussée tracée sur les terres de l'abbaye de Montmartre et le général La Fayette, héros de la guerre d'Indépendance américaine.", "description longue": "Le nom de la station est une composition historique hybride. 'Chaussée d'Antin' fait référence à la rue créée en 1720 sur des terrains appartenant à l'abbaye de Montmartre, dont le nom honore Louis de Pardaillan de Gondrin, duc d'Antin et surintendant des Bâtiments du Roi. En 1923, le nom de 'La Fayette' a été ajouté pour honorer le marquis de La Fayette, figure majeure de la Révolution française et de la guerre d'Indépendance américaine. Située au croisement stratégique de ces deux axes, la station dessert notamment les grands magasins, héritage du développement urbain du XIXe siècle impulsé par les travaux haussmanniens.", "ambiguite": false, "tags": ["Topographie et Urbanisme", "Révolution et République", "Monuments et Lieux Emblématiques"]}, "Chemin Vert": {"geographie": {"lignes": ["8"], "commune": "Paris", "code_insee": "75056", "latitude": 48.85710602289208, "longitude": 2.3682216127650335}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Le nom rappelle qu'au XVIIe siècle, cette zone était traversée par un long sentier verdoyant serpentant entre de vastes jardins et des vergers florissants.", "description longue": "La station porte le nom de la rue du Chemin-Vert, ancienne voie rurale paisible bordée de cultures maraîchères avant la dense urbanisation intensive du célèbre quartier du Marais."}, "description courte": "Ce nom rappelle un ancien chemin rural bordé d'arbres qui traversait les cultures maraîchères de la plaine de la Roquette avant l'urbanisation du quartier.", "description longue": "Le nom 'Chemin Vert' est un toponyme descriptif qui nous renvoie au passé rural du XIe arrondissement. Avant l'urbanisation intensive du XIXe siècle, cette zone était occupée par des terres agricoles, notamment des potagers et des vergers dépendant de l'abbaye de Saint-Antoine-des-Champs. Le 'chemin vert' désignait une sente ou un sentier non pavé, bordé de haies et de végétation, qui permettait aux maraîchers de circuler au milieu des cultures. Avec le percement de la rue du Chemin-Vert lors de l'extension de Paris, ce nom s'est pérennisé. Contrairement aux stations nommées d'après des personnages illustres, celle-ci témoigne de la topographie champêtre disparue sous le béton lors de la transformation haussmannienne.", "ambiguite": false, "tags": ["Anciens Villages et Hameaux", "Topographie et Urbanisme"]}, "Chevaleret": {"geographie": {"lignes": ["6"], "commune": "Paris", "code_insee": "75056", "latitude": 48.83494516788824, "longitude": 2.3680951237726693}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Le nom de Chevaleret provient du propriétaire d'un domaine ou d'un fief situé dans cette partie reculée de l'ancien XIIIe arrondissement.", "description longue": "La station aérienne fait référence à la rue du Chevaleret. Son toponyme est très ancien et dérive vraisemblablement du nom d'un seigneur local ou du lieu-dit d'un ancien hameau."}, "description courte": "La station tire son nom de la rue du Chevaleret, qui évoque un ancien domaine agricole situé sur le territoire de l'ancien village d'Ivry.", "description longue": "Le nom 'Chevaleret' n'est pas lié à un personnage illustre, mais à une réalité toponymique locale du XIIIe arrondissement. Il provient d'un ancien lieu-dit ou domaine rural, le 'fief du Chevaleret', situé à l'emplacement de l'actuelle rue du Chevaleret. À l'époque où cette zone était encore largement agricole et rattachée aux environs du village d'Ivry, ces terres étaient exploitées par des propriétaires terriens. Au fil de l'urbanisation intense du quartier lors des grands travaux parisiens, les noms des anciennes propriétés foncières ont été conservés pour baptiser les voies nouvelles. La station, ouverte en 1909 sur la ligne 6, pérennise ainsi la mémoire rurale d'un secteur aujourd'hui totalement transformé par l'architecture moderne et la Bibliothèque nationale de France.", "ambiguite": false, "tags": ["Anciens Villages et Hameaux", "Topographie et Urbanisme"]}, "Chevilly-Larue (Marché International)": {"geographie": {"lignes": ["14"], "commune": "Chevilly-Larue", "code_insee": "94021", "latitude": 48.75848356146962, "longitude": 2.367374604185919}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Chevilly-Larue est une ville du Val-de-Marne, réputée pour accueillir une large part du gigantesque marché de gros de Rungis (Marché International).", "description longue": "La station, construite pour le prolongement de la ligne 14, reprend le nom de la commune qu'elle dessert tout en soulignant judicieusement sa proximité stratégique avec l'immense MIN de Rungis."}, "description courte": "La station tire son nom de la commune de Chevilly-Larue et de la proximité immédiate du célèbre Marché International de Rungis.", "description longue": "Le nom de la station est un nom composé hybride. 'Chevilly' provient du latin 'Civiliacus', domaine gallo-romain. Le suffixe 'Larue' fut ajouté officiellement en 1920, faisant référence au hameau de La Rue situé au sein de la commune. L'ajout entre parenthèses '(Marché International)' souligne la transformation profonde de ce territoire rural en pôle logistique mondial depuis le déménagement des Halles de Paris vers Rungis en 1969. Cette dualité illustre le passage d'un terroir villageois historique à une infrastructure économique de rang international, desservie aujourd'hui par le prolongement de la ligne 14.", "ambiguite": false, "tags": ["Anciens Villages et Hameaux", "Topographie et Urbanisme"]}, "Château Landon": {"geographie": {"lignes": ["7"], "commune": "Paris", "code_insee": "75056", "latitude": 48.87845059378512, "longitude": 2.3620450936034145}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Le château Landon était une demeure seigneuriale, appartenant autrefois au sieur Landon, bâtie au nord de Paris sous l'Ancien Régime.", "description longue": "La station tire son nom de la rue de Château-Landon, construite jadis sur l'ancienne route reliant Paris à Saint-Denis et longeant une opulente propriété rurale de la famille Landon."}, "description courte": "La station tire son nom de la rue du Château-Landon, qui mène vers l'ancien village de Landon en Seine-et-Marne, jadis étape sur la route royale.", "description longue": "Le nom de la station fait référence à la rue du Château-Landon, une voie historique du 10e arrondissement. Historiquement, ce nom provient de la commune de Château-Landon, située en Seine-et-Marne. Cette ville, autrefois étape importante sur la route reliant Paris à Orléans et au Berry, doit son nom à son ancien château médiéval. Le toponyme a été importé à Paris par la configuration urbaine des faubourgs du Nord. Une anecdote marquante concerne la station elle-même : ouverte en 1910 sur la ligne 7, elle se distingue par sa grande profondeur et son accès direct via un long couloir à la gare de l'Est, illustrant la stratégie de la CMP (Compagnie du chemin de fer métropolitain de Paris) pour faciliter les correspondances avec les grandes lignes ferroviaires de l'époque.", "ambiguite": false, "tags": ["Anciens Villages et Hameaux", "Architecture urbaine : Les grandes gares"]}, "Château Rouge": {"geographie": {"lignes": ["4"], "commune": "Paris", "code_insee": "75056", "latitude": 48.887241930648955, "longitude": 2.3495819680256593}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Le Château Rouge était un gentilhommière de briques construite vers 1780. Elle fut le lieu de célèbres banquets républicains en 1847.", "description longue": "La station porte le nom de l'ancien quartier et de l'élégant domaine du Château Rouge, une bâtisse malheureusement détruite en 1889 mais restée célèbre pour son rôle dans la Révolution de 1848."}, "description courte": "La station tire son nom d'un hôtel particulier aux briques rouges construit en 1780, devenu lieu de ralliement révolutionnaire sous la Terreur.", "description longue": "Le nom 'Château Rouge' fait référence à un hôtel particulier édifié en 1780 sur le territoire de l'ancienne commune de Montmartre. Le bâtiment, construit en briques rouges apparentes, se distinguait nettement des habitations environnantes. Au-delà de son architecture, le lieu est entré dans l'histoire lors de la Révolution française : il devint un centre d'activité politique intense, notamment sous la Terreur, où les révolutionnaires locaux s'y réunissaient. Plus tard, au XIXe siècle, le bâtiment fut transformé en salle de bal populaire, célèbre dans le quartier de la Goutte d'Or, avant d'être finalement démoli en 1889. La station de métro, ouverte en 1908 sur la ligne 4, perpétue ainsi le souvenir de cette demeure emblématique du patrimoine montmartrois.", "ambiguite": false, "tags": ["Monuments et Lieux Emblématiques", "Révolution et République"]}, "Château d'Eau": {"geographie": {"lignes": ["4"], "commune": "Paris", "code_insee": "75056", "latitude": 48.87244691759551, "longitude": 2.3560517414015862}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Le nom évoque la fontaine du Château d'eau de la place de la République, monument détruit en 1867 qui distribuait l'eau dans le quartier.", "description longue": "La station doit son nom à la rue du Château-d'Eau, rappelant l'édifice monumental de la fontaine aux Lions, installé là avant la gigantesque restructuration haussmannienne de l'actuelle place de la République."}, "description courte": "Le nom évoque la fontaine monumentale dessinée par Girard, installée en 1811 sur la place du Château-d'Eau, actuelle place de la République.", "description longue": "La station tire son nom de la place du Château-d'Eau, l'ancienne dénomination de la place de la République. Le monument en question était une fontaine monumentale en fonte, œuvre de l'ingénieur Pierre-Simon Girard, érigée en 1811 pour agrémenter le carrefour. Elle était située à l'intersection des boulevards du Temple et Saint-Martin. Bien que la fontaine ait été déplacée vers la place Daumesnil en 1867 lors des grands travaux d'urbanisme du baron Haussmann — pour laisser place à l'imposante statue de la République — le nom est resté attaché à la station de la ligne 4. Cette toponymie souligne l'importance des aménagements hydrauliques utilitaires et esthétiques dans le Paris du début du XIXe siècle.", "ambiguite": false, "tags": ["Topographie et Urbanisme", "Monuments et Lieux Emblématiques"]}, "Château de Vincennes": {"geographie": {"lignes": ["1"], "commune": "Vincennes", "code_insee": "94080", "latitude": 48.84466007577258, "longitude": 2.438792280541146}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Le château de Vincennes est une forteresse royale massive, ancienne résidence des rois de France, dont le donjon médiéval est le plus haut d'Europe.", "description longue": "La station est le terminus oriental historique de la ligne 1. Elle permet d'accéder directement à l'enceinte majestueuse de ce monument historique, haut lieu de la royauté et de la monarchie française."}, "description courte": "La station tire son nom du château royal médiéval situé à proximité immédiate, ancienne résidence des rois de France, surplombant le bois de Vincennes.", "description longue": "Le nom de la station fait référence au château de Vincennes, une forteresse médiévale majeure située à la limite est de Paris. Édifié principalement au XIVe siècle sous les règnes de Philippe VI et de Charles V, ce château a servi de résidence royale jusqu'au règne de Louis XIV, avant d'être transformé en prison d'État puis en arsenal. La station, terminus de la ligne 1, marque l'entrée historique dans la commune de Vincennes. Une anecdote notable est que le donjon de Vincennes, avec ses 52 mètres de haut, demeure le plus haut donjon médiéval d'Europe, témoignant de la puissance politique et militaire de la monarchie française face à la menace anglaise lors de la guerre de Cent Ans.", "ambiguite": false, "tags": ["Châteaux et Palais historiques", "Monuments et Lieux Emblématiques"]}, "Châtelet": {"geographie": {"lignes": ["1", "11", "14", "4", "7"], "commune": "Paris", "code_insee": "75056", "latitude": 48.858579763589525, "longitude": 2.347881677716951}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Le Grand Châtelet de Paris était un imposant château fort médiéval situé sur la rive droite, servant de tribunal et de prison jusqu'en 1802.", "description longue": "La station se trouve sous la place du Châtelet, aménagée à l'emplacement exact de la forteresse démolie par Napoléon. Elle constitue aujourd'hui le plus grand et labyrinthique pôle d'échanges souterrain."}, "description courte": "La station tire son nom de l'ancien Grand Châtelet, forteresse médiévale qui abritait la prévôté de Paris, située jadis près du pont au Change.", "description longue": "Le nom 'Châtelet' fait référence au Grand Châtelet, un édifice fortifié construit au IXe siècle pour protéger l'accès à l'île de la Cité. Véritable verrou stratégique, il servit de siège à la justice du prévôt de Paris et de prison insalubre jusqu'à sa démolition en 1802 sous Napoléon Bonaparte. L'espace libéré permit la création de la place du Châtelet et l'installation de la fontaine du Palmier. Historiquement, le site est au cœur de la stratification urbaine parisienne, reliant les vestiges médiévaux à l'urbanisme haussmannien. Anecdote : la station est l'un des nœuds ferroviaires les plus complexes au monde, véritable labyrinthe souterrain fruit de la fusion progressive des lignes 1, 4, 7, 11 et 14.", "ambiguite": false, "tags": ["Monuments et Lieux Emblématiques", "Institutions Civiques et Politiques", "Topographie et Urbanisme"]}, "Châtillon - Montrouge": {"geographie": {"lignes": ["13"], "commune": "Châtillon", "code_insee": "92020", "latitude": 48.81072820779425, "longitude": 2.301595459041787}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Châtillon et Montrouge sont deux communes mitoyennes des Hauts-de-Seine. Ce point stratégique relie leurs limites à la périphérie immédiate sud de Paris.", "description longue": "Ce terminus névralgique de la ligne 13 porte conjointement le nom des deux villes qu'il dessert, symbolisant parfaitement sa situation transfrontalière et son utilité essentielle pour la desserte de la banlieue sud."}, "description courte": "La station tire son nom des deux communes limitrophes, Châtillon et Montrouge, qu'elle dessert au terminus sud de la ligne 13 du métro parisien.", "description longue": "La station Châtillon - Montrouge, inaugurée en 1976, marque le terminus sud de la ligne 13. Son nom est un toponyme composé qui reflète la double appartenance géographique du site. Châtillon, dont le nom dérive du latin 'castellionem' (petit château), était un village maraîcher médiéval. Montrouge, mentionné dès le XIIe siècle sous le nom de 'Mons Rubeus' (le mont rouge) en référence à la couleur de sa terre argileuse, était une paroisse historiquement liée à Paris. Le choix de ce nom composé répond à une volonté d'équité administrative pour ce pôle multimodal situé à la frontière exacte de ces deux communes historiques de la petite couronne.", "ambiguite": false, "tags": ["Anciens Villages et Hameaux", "Topographie et Urbanisme"]}, "Cité": {"geographie": {"lignes": ["4"], "commune": "Paris", "code_insee": "75056", "latitude": 48.85492106147581, "longitude": 2.347361051762225}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "L'île de la Cité est le berceau historique de Paris. Entourée par la Seine, elle abrite Notre-Dame et la Sainte-Chapelle.", "description longue": "C'est l'unique station de métro implantée sur une île à Paris. Elle porte le nom prestigieux de l'île de la Cité, cœur insulaire, antique et médiéval de la capitale."}, "description courte": "La station tire son nom de l'Île de la Cité, berceau historique de Paris, où s'est installée la tribu gauloise des Parisii durant l'Antiquité.", "description longue": "La station Cité, ouverte en 1910 sur la ligne 4, doit son nom à l'Île de la Cité, cœur géographique et historique de la capitale. Occupée dès l'Antiquité par la tribu celte des Parisii sous le nom de Lutèce, l'île a été le centre du pouvoir royal et religieux pendant des siècles. Cette station est remarquable par sa profondeur importante, nécessaire pour permettre le passage du tunnel sous le lit de la Seine, et par son architecture spécifique de style Art nouveau, bien que moins ornée que d'autres stations de Hector Guimard. Anecdote historique : elle fut l'une des rares stations à être fermée durant la crue historique de la Seine en 1910, juste après son inauguration, en raison d'infiltrations d'eau majeures.", "ambiguite": false, "tags": ["Monuments et Lieux Emblématiques", "Topographie et Urbanisme"]}, "Cluny - La Sorbonne": {"geographie": {"lignes": ["10"], "commune": "Paris", "code_insee": "75056", "latitude": 48.851026876874485, "longitude": 2.3448963012120796}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "La station réunit les termes du musée de Cluny (art médiéval) et de la célèbre université historique de la Sorbonne.", "description longue": "La station, mondialement célèbre pour ses superbes mosaïques au plafond, célèbre l'hôtel des abbés de Cluny et la Sorbonne voisine, institutions académiques et culturelles phares du Quartier latin fondées au Moyen Âge."}, "description courte": "La station tire son nom de l'hôtel de Cluny, riche demeure médiévale, et de la célèbre université de la Sorbonne située à proximité immédiate.", "description longue": "Le nom de la station est une double référence historique au cœur du Quartier latin. 'Cluny' renvoie à l'hôtel de Cluny, un ancien hôtel particulier des abbés de Cluny construit au XVe siècle, qui abrite aujourd'hui le musée national du Moyen Âge, bâti sur les vestiges des thermes romains. 'La Sorbonne' fait référence à la célèbre institution universitaire fondée en 1257 par Robert de Sorbon. Longtemps fermée au public entre 1939 et 1988, la station a rouvert pour faciliter les correspondances avec le RER B, son architecture étant marquée par les mosaïques de Jean Bazaine ornant la voûte, symbolisant le dialogue entre le passé médiéval et la création artistique contemporaine.", "ambiguite": false, "tags": ["Monuments et Lieux Emblématiques", "Arts et Culture"]}, "Colonel Fabien": {"geographie": {"lignes": ["2"], "commune": "Paris", "code_insee": "75056", "latitude": 48.87764980852146, "longitude": 2.370467574793864}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": ["XXe siècle"], "details_personne": {"nom": "Pierre Georges, dit Colonel Fabien", "annee_naissance": 1914, "annee_deces": 1944, "siecles_vecus": ["XXe siècle"]}, "description courte": "Le colonel Fabien (1914-1944), de son vrai nom Pierre Georges, est un héros de la Résistance, célèbre pour le premier attentat meurtrier contre un officier allemand.", "description longue": "La station est située sous la place du Colonel-Fabien, rebaptisée solennellement après la Seconde Guerre mondiale pour honorer le courageux militant communiste mort au combat pour la libération de la France."}, "description courte": "La station honore Pierre Georges, dit le « Colonel Fabien », figure emblématique de la Résistance française, célèbre pour avoir abattu un officier allemand en 1941.", "description longue": "Anciennement nommée 'Combat' en référence à la barrière du Combat, la station a été rebaptisée en 1945 en hommage à Pierre Georges (1919-1944). Communiste engagé dès son jeune âge, il participe à la guerre d'Espagne avant de devenir l'un des premiers acteurs de la lutte armée contre l'occupant nazi à Paris. Son action la plus célèbre reste l'attentat contre l'aspirant de marine Moser à la station Barbès-Rochechouart en août 1941, acte fondateur de la résistance armée du PCF. La place située au-dessus de la station, où se trouve le siège du Parti communiste français conçu par Oscar Niemeyer, porte également son nom, ancrant ainsi cette figure de la Résistance dans la topographie politique du 19e arrondissement.", "ambiguite": false, "tags": ["Les figures de la Résistance", "Institutions Civiques et Politiques"]}, "Commerce": {"geographie": {"lignes": ["8"], "commune": "Paris", "code_insee": "75056", "latitude": 48.84463784771031, "longitude": 2.293687475167137}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "La rue du Commerce était la principale artère commerçante de l'ancienne commune de Grenelle avant son annexion à Paris au XIXe siècle.", "description longue": "La station doit son nom à son implantation directe sous la rue du Commerce. Sa construction architecturale a nécessité des quais décalés car la rue originelle était bien trop étroite pour les placer face à face."}, "description courte": "La station tire son nom de la rue du Commerce, artère commerçante historique du quartier de Grenelle, ancien village annexé à Paris en 1860.", "description longue": "La station Commerce, située sur la ligne 8, tire son nom de la rue du Commerce. Cette voie est l'axe central du quartier de Grenelle. Avant l'annexion de la commune de Grenelle par Paris en 1860, cette rue était déjà le cœur battant de la vie économique du village, accueillant les commerces de proximité nécessaires aux ouvriers des usines environnantes. L'anecdote ferroviaire marquante est la configuration particulière de la station : en raison de l'étroitesse de la rue en surface lors de sa construction, les quais sont décalés l'un par rapport à l'autre, une disposition devenue rare et caractéristique du réseau historique.", "ambiguite": false, "tags": ["Topographie et Urbanisme", "Anciens Villages et Hameaux"]}, "Concorde": {"geographie": {"lignes": ["1", "12", "8"], "commune": "Paris", "code_insee": "75056", "latitude": 48.866166958916516, "longitude": 2.324585310879803}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "La place de la Concorde est la plus grande place de Paris. Son nom symbolise la réconciliation des Français après les violences de la Révolution.", "description longue": "La station est implantée sous la prestigieuse place de la Concorde, lieu d'érection de la redoutable guillotine pendant la Terreur, et judicieusement rebaptisée sous le Directoire pour marquer l'apaisement national tant attendu."}, "description courte": "La station tire son nom de la place de la Concorde, haut lieu historique parisien symbolisant la réconciliation nationale après les troubles de la Révolution.", "description longue": "La station Concorde, desservie par les lignes 1, 8 et 12, tient son nom de la célèbre place éponyme. Initialement nommée 'Place Louis XV' en 1772, elle devint la 'Place de la Révolution' sous la Terreur, où trônait la guillotine. En 1795, pour marquer l'apaisement des conflits, le Directoire la rebaptise 'place de la Concorde'. Le site est célèbre pour son obélisque de Louxor, offert par l'Égypte en 1836. Une anecdote notable concerne la ligne 12 : ses murs sont recouverts de carreaux de faïence blanche comportant les lettres de la Déclaration des droits de l'homme et du citoyen, une œuvre de l'artiste Françoise Schein installée en 1991 pour le bicentenaire de la Révolution française.", "ambiguite": false, "tags": ["Révolution et République", "Monuments et Lieux Emblématiques", "Topographie et Urbanisme"]}, "Convention": {"geographie": {"lignes": ["12"], "commune": "Paris", "code_insee": "75056", "latitude": 48.83713505380496, "longitude": 2.2963913864809173}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "La Convention nationale est l'assemblée constituante qui gouverna la France de 1792 à 1795, marquant la fondation de la Première République.", "description longue": "La station fait référence à la vibrante rue de la Convention qu'elle dessert. Cette longue artère urbaine rend un fier hommage à la grande assemblée fondatrice de la Révolution française."}, "description courte": "La station tire son nom de la rue de la Convention, baptisée ainsi en 1868 en hommage à la Convention nationale, assemblée constituante de la Révolution.", "description longue": "La station Convention, située sur la ligne 12 du métro parisien (anciennement ligne A de la société Nord-Sud), doit son nom à la rue de la Convention qu'elle dessert. Cette voie, située dans le 15e arrondissement, a été nommée par un décret du 10 août 1868 en mémoire de la Convention nationale (1792-1795). Cette assemblée, célèbre pour avoir proclamé la Première République française et aboli la royauté, est l'un des piliers fondateurs de l'identité républicaine moderne. Contrairement à de nombreuses stations parisiennes dont l'origine est liée à une topographie locale, celle-ci porte une charge idéologique forte. La station a été inaugurée le 5 novembre 1910 et conserve encore aujourd'hui, malgré plusieurs rénovations, une atmosphère typique des anciennes stations de la Compagnie Nord-Sud avec son carrelage caractéristique et ses codes couleurs originaux.", "ambiguite": false, "tags": ["Révolution et République", "Institutions Civiques et Politiques"]}, "Corentin Cariou": {"geographie": {"lignes": ["7"], "commune": "Paris", "code_insee": "75056", "latitude": 48.89467266005628, "longitude": 2.382291557164633}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": ["XIXe siècle", "XXe siècle"], "details_personne": {"nom": "Corentin Cariou", "annee_naissance": 1898, "annee_deces": 1942, "siecles_vecus": ["XIXe siècle", "XXe siècle"]}, "description courte": "Corentin Cariou (1898-1942) était un syndicaliste et conseiller municipal communiste du 19e arrondissement, fusillé comme otage par les nazis durant l'Occupation.", "description longue": "L'ancienne station Pont de Flandre a été rebaptisée avec solennité en 1946 pour honorer la mémoire de Corentin Cariou, élu local dévoué assassiné lâchement en représailles par l'occupant allemand."}, "description courte": "La station honore Corentin Cariou, conseiller municipal communiste de Paris, fusillé par les nazis en 1942 en tant qu'otage durant l'Occupation.", "description longue": "Anciennement nommée 'Pont de Flandre', la station a été rebaptisée en 1946 en hommage à Corentin Cariou (1898-1942). Ouvrier métallurgiste, militant syndical et figure de proue du Parti communiste français dans le 19e arrondissement, il fut conseiller municipal de Paris. Arrêté par la police française en 1941, il fut interné au camp de Choisel à Châteaubriant. Le 7 mars 1942, il fut fusillé au Mont-Valérien par les autorités d'occupation allemandes, faisant partie des représailles visant les otages politiques. Ce changement de nom reflète la volonté de la municipalité d'après-guerre d'honorer la mémoire des élus résistants tombés pour la Libération.", "ambiguite": false, "tags": ["Les figures de la Résistance", "Institutions Civiques et Politiques"]}, "Corentin Celton": {"geographie": {"lignes": ["12"], "commune": "Issy-les-Moulineaux", "code_insee": "92040", "latitude": 48.826823295159116, "longitude": 2.2789586605256367}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": ["XXe siècle"], "details_personne": {"nom": "Corentin Celton", "annee_naissance": 1901, "annee_deces": 1943, "siecles_vecus": ["XXe siècle"]}, "description courte": "Corentin Celton (1901-1943) était un syndicaliste hospitalier, figure de la Résistance, fusillé au Mont-Valérien par l'armée d'occupation nazie.", "description longue": "La station a été renommée à la Libération pour rendre un vibrant hommage à l'employé de l'hôpital voisin (établissement également rebaptisé de son nom), tombé en martyr et mort pour la France."}, "description courte": "La station rend hommage à Corentin Celton, employé hospitalier et résistant communiste fusillé en 1943 par les nazis durant l'Occupation.", "description longue": "Anciennement nommée 'Petite Ceinture' lors de son ouverture en 1934, la station a été rebaptisée en 1945. Le nom honore Corentin Celton (1901-1943), un militant communiste et syndicaliste travaillant à l'hospice de la Maison de retraite d'Issy-les-Moulineaux. Résistant actif au sein des FTP, il fut arrêté par la police française en 1943, livré aux autorités d'occupation, puis fusillé au Mont-Valérien. Le nom composé souligne son identité de figure locale devenue martyre de la Résistance, marquant la volonté de la municipalité de pérenniser la mémoire des héros de la lutte antifasciste après la Libération.", "ambiguite": false, "tags": ["Les figures de la Résistance", "Institutions Civiques et Politiques"]}, "Corvisart": {"geographie": {"lignes": ["6"], "commune": "Paris", "code_insee": "75056", "latitude": 48.82986001331238, "longitude": 2.350611225926166}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Jean-Nicolas Corvisart (1755-1821) fut un brillant médecin clinicien et cardiologue de renommée mondiale, connu pour avoir été le médecin personnel de Napoléon Bonaparte.", "description longue": "La station aérienne tire son nom de la rue Corvisart, honorant le pionnier génial de l'auscultation et sans doute l'un des plus grands médecins anatomo-pathologistes français de son temps."}, "description courte": "La station tire son nom de la rue Corvisart, elle-même nommée en hommage au médecin Jean-Nicolas Corvisart, célèbre cardiologue de Napoléon Ier.", "description longue": "La station Corvisart, située sur la ligne 6 du métro parisien, rend hommage à Jean-Nicolas Corvisart (1755-1821). Ce médecin illustre fut le premier médecin personnel de Napoléon Ier. Pionnier de la cardiologie moderne, il est mondialement reconnu pour avoir popularisé l'usage de la percussion thoracique dans le diagnostic médical, une technique héritée d'Auenbrugger. Le nom a été attribué à la rue adjacente en 1867, avant d'être repris par la RATP lors de l'ouverture de la ligne 2 Sud en 1906. Une anecdote notable concerne l'aspect architectural de la station : située sur le viaduc aérien traversant le 13e arrondissement, elle offre un point de vue remarquable sur la ville, contrastant avec l'austérité de la science médicale représentée par le nom de la station.", "ambiguite": false, "tags": ["Sciences, Médecine et Techniques"]}, "Coteaux Beauclair": {"geographie": {"lignes": ["11"], "commune": "Rosny-sous-Bois", "code_insee": "93064", "latitude": 48.88212212689498, "longitude": 2.4673647804495924}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Le nom Coteaux Beauclair désigne le parc et le quartier limitrophe en lisière de Rosny-sous-Bois et Noisy-le-Sec.", "description longue": "La toute nouvelle station de la ligne 11 prolongée prend le nom de ce secteur naturel et résidentiel local, offrant une vue particulièrement dégagée grâce à sa topographie perchée en pente."}, "description courte": "Nommé d'après le coteau éponyme de Rosny-sous-Bois, ce secteur surplombant la Marne était historiquement un lieu privilégié de villégiature et de vignobles renommés.", "description longue": "La station Coteaux Beauclair, située sur le prolongement de la ligne 11, tire son nom de la configuration topographique locale. Le 'Coteau Beauclair' fait référence au relief qui domine la commune de Rosny-sous-Bois. Historiquement, cette zone était réputée pour ses vignes et son ensoleillement, d'où le terme 'Beauclair', évoquant une exposition lumineuse idéale. Avant l'urbanisation intensive du XXe siècle, ce site était une halte champêtre appréciée des Parisiens pour ses points de vue sur la vallée de la Marne. L'appellation consacre ainsi le patrimoine géographique et paysager d'un ancien terroir agricole devenu un nœud de mobilité moderne.", "ambiguite": false, "tags": ["Topographie et Urbanisme", "Anciens Villages et Hameaux"]}, "Cour Saint-Emilion": {"geographie": {"lignes": ["14"], "commune": "Paris", "code_insee": "75056", "latitude": 48.83334999725014, "longitude": 2.386464909364189}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Saint-Émilion est un célèbre vignoble mondialement reconnu. La cour homonyme évoque les anciens entrepôts viticoles de Bercy où arrivaient les fûts de Bordeaux.", "description longue": "La station dessert agréablement Bercy Village, un charmant quartier commercial aménagé à l'emplacement préservé des anciens chais. La Cour Saint-Émilion rappelle l'intense et fructueux commerce de vin qui animait le secteur au XIXe siècle."}, "description courte": "La station tire son nom des anciens entrepôts de vin de Bercy, autrefois plus grand centre de négoce vinicole au monde, situés dans le quartier Saint-Émilion.", "description longue": "La station Cour Saint-Émilion, inaugurée en 1998 sur la ligne 14, tire son nom de la 'Cour Saint-Émilion', une allée centrale au cœur des anciens entrepôts de Bercy. Entre le XIXe siècle et les années 1960, ce site était le plus grand centre de négoce de vins et spiritueux au monde. Les entrepôts étaient organisés en pavillons de pierre, nommés d'après les régions viticoles. Après la désaffectation du site, les chais furent réhabilités par l'architecte Antoine Grumbach pour devenir un pôle culturel et commercial emblématique. Le nom évoque la célèbre cité médiévale de Saint-Émilion, en Gironde, célèbre pour son vignoble classé au patrimoine mondial de l'UNESCO.", "ambiguite": false, "tags": ["Monuments et Lieux Emblématiques", "Architecture urbaine : Les grandes gares"]}, "Courcelles": {"geographie": {"lignes": ["2"], "commune": "Paris", "code_insee": "75056", "latitude": 48.87926525411311, "longitude": 2.3032943624252122}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Courcelles était un ancien hameau champêtre, aujourd'hui disparu, situé sur la route menant au nord-ouest de l'actuelle capitale.", "description longue": "La station se trouve idéalement au carrefour du boulevard de Courcelles, une artère bourgeoise tracée sur l'ancien mur des Fermiers généraux, menant jadis à la petite commune rurale annexée depuis."}, "description courte": "La station tire son nom du boulevard de Courcelles, rappelant l'ancien village de Courcelles, rattaché à Paris lors de l'extension de 1860.", "description longue": "Le nom de la station Courcelles fait référence au boulevard éponyme, qui lui-même doit son titre au village de Courcelles, une ancienne localité située à l'extérieur de l'enceinte des Fermiers généraux. Ce village a été progressivement absorbé par le développement urbain du XVIIe arrondissement. Historiquement, le terme 'Courcelles' est une déformation de 'Corcellis', désignant un lieu où se trouvaient de petites cours ou des exploitations agricoles. L'urbanisation massive du quartier sous le Second Empire a intégré ce toponyme rural à la nomenclature parisienne, pérennisant la mémoire de ce hameau qui marquait la limite nord-ouest du Paris de l'Ancien Régime. Il est intéressant de noter que la station se trouve à proximité de la plaine Monceau, un secteur ayant connu une transformation aristocratique majeure au XIXe siècle.", "ambiguite": false, "tags": ["Anciens Villages et Hameaux", "Topographie et Urbanisme"]}, "Couronnes": {"geographie": {"lignes": ["2"], "commune": "Paris", "code_insee": "75056", "latitude": 48.86919334513237, "longitude": 2.3802889829271936}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "Le toponyme proviendrait du lieu-dit Les Couronnes sous Savies ou bien d'une ancienne enseigne d'auberge très populaire appelée Les Trois Couronnes.", "description longue": "La station porte le nom de la pittoresque rue des Couronnes. C'est malheureusement l'un des lieux marquants de l'histoire du métro, tristement célèbre pour la tragédie de l'incendie meurtrier de 1903."}, "description courte": "La station tire son nom de la rue des Couronnes, autrefois située dans le village de Belleville, où se trouvait une enseigne représentant des couronnes.", "description longue": "Le nom de la station Couronnes trouve son origine dans la rue des Couronnes, une voie ancienne située au cœur de l'ancien village de Belleville, annexé par Paris en 1860. Historiquement, le nom proviendrait d'une enseigne d'auberge ou d'un cabaret célèbre du secteur, orné de deux couronnes, qui servait de point de repère aux voyageurs et aux habitants. Bien que la station soit tristement célèbre pour l'incendie du 10 août 1903, le plus grave de l'histoire du métro parisien avec 84 victimes, son nom reste ancré dans la toponymie locale de ce quartier populaire du 20e arrondissement. Contrairement à d'autres stations, il n'y a pas ici de référence à un personnage illustre, mais plutôt à l'héritage du terroir suburbain pré-haussmannien.", "ambiguite": false, "tags": ["Anciens Villages et Hameaux", "Topographie et Urbanisme"]}, "Crimée": {"geographie": {"lignes": ["7"], "commune": "Paris", "code_insee": "75056", "latitude": 48.890814345621656, "longitude": 2.3770380600019925}, "histoire": {"type_origine": null, "sous_type_origine": null, "siecles": [], "details_personne": null, "description courte": "La Crimée est une presqu'île bordant la mer Noire. Elle fut le théâtre d'une guerre sanglante et victorieuse (1853-1856) pour les troupes françaises.", "description longue": "La station fait référence à la longue rue de Crimée, percée et nommée peu après le lointain conflit pour commémorer brillamment la coalition franco-britannique contre la puissance de l'Empire russe."}, "description courte": "La station tire son nom de la rue de Crimée, elle-même nommée en souvenir de la guerre de Crimée (1853-1856) et du siège de Sébastopol.", "description longue": "La station Crimée, située sur la ligne 7 du métro parisien, doit son nom à la rue de Crimée, l'une des artères les plus longues du 19e arrondissement. Cette dénomination s'inscrit dans la tradition parisienne du Second Empire de commémorer les succès militaires de la France. La guerre de Crimée vit l'alliance de la France, du Royaume-Uni et de l'Empire ottoman contre l'Empire russe. Le nom célèbre notamment la victoire lors du siège de Sébastopol en 1855, un événement majeur qui a consolidé le prestige international de Napoléon III. Contrairement à d'autres stations, le nom n'est pas composé au sens strict (il ne s'agit pas d'un hommage à une personne comme 'Victor Hugo', mais d'une référence topographique et historique à un champ de bataille), ce qui le classe dans la catégorie des noms de voies commémoratives impériales.", "ambiguite": false, "tags": ["Géographie et International", "Les victoires et batailles mili
